 ஒரு சீரற்ற டொமைன் பெறுவீர்கள் (அமைப்புகளில் தனிப்பயனாக்கலாம்)\n\n📘 GitHub Pages (pages.github.com) – இலவசம் \u0026 நம்பகமானது\n1. GitHub இல் ஒரு புதிய களஞ்சியத்தை உருவாக்கவும்\n2. dist/ கோப்புறையின் உள்ளடக்கங்களை களஞ்சியத்தில் பதிவேற்றவும்\n3. களஞ்சிய அமைப்புகள் → பக்கங்கள் என்பதற்கு செல்லவும்\n4. \"ஒரு கிளையிலிருந்து வெளியிடு\" → முக்கிய கிளை என்பதைக் தேர்ந்தெடுக்கவும்\n5. உங்கள் தளத்தை username.github.io/repository-name இல் அணுகவும்\n\n---\n\n🔧 மேம்பட்ட வெளியீடு (ஆக்குநர்களுக்கு):\n\nGit அடிப்படையிலான தானியங்கி வெளியீடு\n1. முழு திட்டத்தையும் (மூல குறியீடு உட்பட) GitHub/GitLab க்கு தள்ளவும்\n2. உங்கள் களஞ்சியத்தை Vercel/Netlify உடன் இணைக்கவும்\n3. கட்டமைப்பு அமைப்புகளை உள்ளமைக்கவும்:\n   - கட்டமைப்பு கட்டளை: npm run build\n   - வெளியீட்டு கோப்புறை: dist\n   - Node.js பதிப்பு: 16.x அல்லது அதற்கு மேல்\n4. ஒவ்வொரு தள்ளலும் தானாகவே கட்டமைப்பு \u0026 வெளியீட்டைத் தொடங்கும்\n\nபாரம்பரிய சேவையக வெளியீடு\nஉங்களுக்கே சொந்தமான சேவையகம் இருந்தால்:\n1. dist/ கோப்புறையின் உள்ளே உள்ள அனைத்து கோப்புகளையும் உங்கள் சேவையகத்தின் வலை வேர் கோப்புறைக்கு பதிவேற்றவும்\n2. சேவையகம் நிலையான கோப்புகளை வழங்க ஆதரிக்கிறதா என்பதை உறுதிப்படுத்தவும்\n3. உங்கள் டொமைன் மூலம் உங்கள் இணையதளத்தை அணுகவும்\n\n---\n\n💰 விலை தகவல்:\n- Vercel: தனிப்பட்ட பயன்பாட்டிற்கு இலவச திட்டம் போதுமானது\n- Cloudflare Pages: முழுமையாக இலவசம், எந்த வரம்புகளும் இல்லை\n- Netlify: இலவச திட்டம் மாதத்திற்கு 100GB பரந்தக்களம் உட்பட\n- GitHub Pages: முழுமையாக இலவசம், மாதத்திற்கு 100GB பரந்தக்களம்\n\n---\n\n🎯 பரிந்துரைகள்:\n- தொடக்க நிலை பயனர்கள்: Vercel அல்லது Netlify (இழுத்து விடு பதிவேற்றம்)\n- வேகத்தை மையமாகக் கொண்டவர்கள்: Cloudflare Pages\n- நீண்டகால திட்டங்கள்: GitHub Pages\n- ஆக்குநர்கள்: Git அடிப்படையிலான தானியங்கி வெளியீடு\n\n---\n\n⚡ குறிப்புகள்:\n- அனைத்து தளங்களும் இலவச HTTPS சான்றிதழ்களை வழங்குகின்றன\n- நீங்கள் தனிப்பயன் டொமைன்களை இணைக்கலாம் (சிலர் கட்டண திட்டங்களை தேவைப்படும்)\n- வெளியீட்டுக்குப் பிறகு, உங்கள் இணையதளத்தை பல்வேறு சாதனங்களில் சோதிக்கவும்\n\n---\n\n🆘 பிழைத்திருத்தம்:\n1. dist/ இன் உள்ளடக்கங்களை பதிவ புகள் கிடைக்கவில்லை\"}}},\"hooks\":{\"tools\":{\"toolsDescription\":{\"inpaint\":\"நீங்கள் அகற்ற விரும்பும் தூரிகை பகுதிகள்.\",\"remove-background\":\"நம்பமுடியாத துல்லியத்துடன் படத்திலிருந்து முக்கிய விஷயத்தைப் பிரித்தெடுக்கவும்.\",\"remove-text\":\"எந்தப் படத்திலிருந்தும் உரையை அகற்று.\",\"replace-background\":\"AI உடன் எங்கும் எதையும் டெலிபோர்ட் செய்யவும்.\",\"upscale\":\"உங்கள் படங்களை சில வினாடிகளில் மேம்படுத்துங்கள்.\",\"upscaling\":\"வினாடிகளில் உங்கள் படத்தை 2X அல்லது 4X ஆக உயர்த்தவும்.\",\"inpainting\":\"மீண்டும் வரைய AI-அடிப்படையிலான மாசுபாடு விளக்கம்.\"},\"toolsNames\":{\"painter\":\"அல்கோரிதம் உருவாக்கி\",\"rmBg\":\"பின்னணி நீக்கி\",\"rmText\":\"உரை அகற்றி\",\"rmBrush\":\"புகைப்பட நீக்கி\",\"upscale\":\"படத்தை மேம்படுத்துபவர்\",\"rpBg\":\"பின்புல மாற்றி\",\"inpaint\":\"இன்பெயின்ட்\",\"textTranslator\":\"AI மொழிபெயர்ப்பாளர்\",\"imageTranslator\":\"பட மொழிபெயர்ப்பாளர்\",\"shortenVideo\":\"ஏஐ வீடியோ குறைப்பான்\",\"writer\":\"ஏஐ கட்டுரை எழுத்தாளர்\"}}},\"chatbox\":{\"tools\":{\"artifacts\":{\"demos\":{\"0\":{\"title\":\"ஒரு கற்பனை ஜிலேபி உருவாக்கவும்\",\"value\":\"{ARTIFACT} இல் வண்ணமய விசைகளை கொண்ட HTML அடிப்படையிலான ஜிலேபியை உருவாக்கவும். அடிக்கப்படும் விசைகளுக்கு காட்சி பின்னூட்டத்தை வழங்கவும், மற்றும் அதிர்வெண் அளவீடுகளின் அடிப்படையில் Web Audio API ஐப் பயன்படுத்தி எளிய, யதார்த்தமான ஒலிகளை உருவாக்கவும். அடிப்படையான வழிமுறைகளை உள்ளடக்கவும்.\"},\"1\":{\"title\":\"ஒரு உணவு சாப்பிடும் எமோஜி விளையாட்டு உருவாக்கவும்\",\"value\":\"{ARTIFACT} இல் Catch the Candy போன்ற எளிய HTML அடிப்படையிலான விளையாட்டை உருவாக்கவும். வீரர் திரையின் கீழே உள்ள ஒரு எமோஜியை கட்டுப்படுத்துகிறார், அதை விரைவாக இடம் மாற்றி, மேலிருந்து விழுந்த உணவுப் பொருட்களை (எ.கா., 🍓, 🍔, 🍎) பிடித்து சாப்பிடுகிறார், குண்டுகளை (💣) தவிர்க்க வேண்டும். வீரர் ஒரு உணவு எமோஜியை பிடித்தால், அவருடைய எமோஜி வெற்றியை குறிக்க மேலும் மிகைப்படுத்தப்பட்ட நேர்மறை வெளிப்பாட்டிற்கு மாறும் (எ.கா., 🤩, 😆, 😋). வீரர் தவறுதலாக ஒரு குண்டை பிடித்தால், எமோஜி முதலில் ஒரு வெடிப்பு (💥) காட்டும், பின்னர் மயக்கம் அடைந்த வெளிப்பாட்டிற்கு (😵‍💫) மாறும்.\"},\"2\":{\"title\":\"ஒரு ஸ்மார்ட்போன் அனுப்பும் வரைபடத்தை உருவாக்கவும்\",\"value\":\"React-ஐப் பயன்படுத்தி பின்வரும் அட்டவணையை அடிப்படையாகக் கொண்டு ஒரு அழகான கோடு வரைபடத்தை ஒரு {ARTIFACT}-இல் உருவாக்கவும்.\\n------\\n\\nகடந்த தசாப்தத்தில் முக்கிய பிராண்டுகளின் ஸ்மார்ட்போன் கப்பல்கள் (பில்லியன்களில்)\\n\\n| ஆண்டு | Samsung | Apple | Huawei | Xiaomi | OPPO |\\n|------|---------|-------|--------|--------|------|\\n| 2014 | 3.24 | 1.76 | 0.75 | 0.50 | 0.40 |\\n| 2015 | 3.36 | 2.00 | 1.00 | 1.00 | 0.80 |\\n| 2016 | 3.43 | 2.16 | 1.40 | 1.50 | 1.20 |\\n| 2017 | 3.20 | 2.10 | 1.60  | 2.00 | 1.50 |\\n| 2018 | 2.94 | 2.20 | 1.70 | 2.50 | 1.80 |\\n| 2019 | 3.00 | 2.50 | 2.20 | 3.00 | 2.00 |\\n| 2020 | 2.80 | 2.80 | 2.50 | 4.00 | 3.00 |\\n| 2021 | 2.90 | 2.90 | 2.00 | 4.50 | 3.50 |\\n| 2022 | 2.60 | 2.25 | 1.60 | 3.50 | 3.00 |\\n| 2023 | 2.26 | 2.34 | 1.20 | 3.00 | 3.50 |\"}},\"desc\":\"புதிய சாளரத்தில் வலைப்பக்கம் அல்லது ஓட்டப்பதிவு போன்ற உள்ளடக்கங்களை எளிதாக உருவாக்கவும் மற்றும் வழங்கவும். நேரடி தொடர்புகள் மற்றும் கவனம் செலுத்தும் வேலைப்பகுதியுடன் உற்பத்தியை மேம்படுத்தவும்.\",\"name\":\"Artifacts\"},\"data_analysis\":{\"demos\":{\"0\":{\"title\":\"கோப்பு தரவைப் படித்து, பல்வேறு செலவுத் திட்டங்களின் விகிதத்தை காட்டும் ஒரு வட்டப் படத்தை உருவாக்கவும்.\",\"value\":\"கோப்பு தரவைப் படித்து, பல்வேறு செலவுத் திட்டங்களின் விகிதத்தை காட்டும் ஒரு வட்டப் படத்தை உருவாக்கவும்.\"}},\"desc\":\"மேம்பட்ட கணிதம், புள்ளியியல், இயந்திர கற்றல் மற்றும் தரவுப் செயலாக்கத்திற்காக நேரடியாக Python குறியீட்டை இயக்கவும், பல்வேறு வடிவங்களில் பணிகளை ஒழுங்குபடுத்தவும்.\",\"name\":\"தரவு பகுப்பாய்வு\"},\"search\":{\"demos\":{\"0\":{\"title\":\"\",\"value\":\"தற்போது U.S. திரையரங்குகளில் உள்ள சிறந்த மதிப்பீடு செய்யப்பட்ட திரைப்படங்கள் என்ன?\"},\"1\":{\"title\":\"\",\"value\":\"இன்று குறிப்பிடத்தக்க அதிகரிப்புகளை அனுபவித்த பங்குகள் எவை?\"},\"2\":{\"title\":\"\",\"value\":\"இன்று வெளியிடப்பட்ட மிக முக்கியமான புதிய மின்னணு தயாரிப்பு என்ன?\"}},\"desc\":\"முன்னேற்பாடான தரவுகளைத் தாண்டி நேரடி தகவல் ாளர், ai எழுத்து, படைப்பாற்றல் எழுத்து, இலவச ai எழுத்து உருவாக்கி\"},\"content-out-of-limit\":\"உள்ளடக்கம் வார்த்தை வரம்பை மீறுகிறது (20,000). தயவுசெய்து குறைத்து மீண்டும் முயற்சிக்கவும்.\",\"generating-image\":\"படத்தை உருவாக்குகிறது...\",\"loading-image\":\"படத்தை ஏற்றுகிறது...\",\"home-title\":\"ஏஐ எழுத்தாளர்\",\"searched\":\"{count} தளங்களை தேடியது\",\"link\":{\"copy\":\"இணைப்பை நகலெடுக்கவும்\",\"edit\":\"இணைப்பை திருத்தவும்\",\"remove\":\"இணைப்பை நீக்கவும்\",\"invalid\":\"தரமான URL ஐ உள்ளிடவும்.\",\"placeholder\":\"உரை உள்ளிடவும்\",\"copied\":\"இணைப்பு கிளிப்போர்டுக்கு நகலெடுக்கப்பட்டது\",\"text\":\"உரை\",\"url\":\"யூஆர்.எல்\",\"insert\":\"இணைப்பை சேர்க்கவும்\"},\"search-tip\":\"தேவையானால் இணையத்தில் தேடுங்கள்\",\"searching\":\"தேடுகிறது...\",\"chat\":\"சாட்\",\"write\":\"எழுது\",\"chat-mode\":\"சாட் முறை: AI உரையாடலில் பதிலளிக்கிறது, உரை தொகுப்பின் உள்ளடக்கத்தை பாதிக்காமல்\",\"write-mode\":\"எழுதும் முறை: AI உரை தொகுப்பில் உள்ளடக்கத்தை திருத்தலாம்\",\"no-file\":\"எந்த முடிவுகளும் கிடைக்கவில்லை, வேறு விசைப்பதிவுகளை முயற்சிக்கவும்\",\"title-limit\":\"தலைப்பு மிகவும் நீளமாக உள்ளது (அதிகபட்சம் 255 எழுத்துகள்)\",\"share\":{\"tooltip-private\":\"பொதுவாக பகிரவும்\",\"tooltip-published\":\"இணைப்பு உருவாக்கப்பட்டது\",\"popover-title\":\"பகிரக்கூடிய இணைப்பு தயாராக உள்ளது\",\"popover-desc\":\"இணைப்பை வைத்திருக்கும் யாரும் ஆவணத்தை காணலாம்.\",\"copy-link\":\"இணைப்பை நகலெடுக்கவும்\",\"or\":\"அல்லது\",\"stop-sharing\":\"பகிர்வை நிறுத்தவும்\",\"stop-title\":\"பகிர்வை நிறுத்தும் இணைப்பு\",\"stop-desc\":\"நீங்கள் பகிர்வதை நிறுத்தும் போது, ஆவணம் தனிப்பட்டதாக மாறும் மற்றும் மற்றவர்கள் அணுக முடியாது.\",\"stop-confirm\":\"பகிர்வை நிறுத்தவும்\",\"statement\":\"நீங்கள் சரிபார்க்கப்படாத அல்லது பாதுகாப்பற்றதாக இருக்கக்கூடிய பயனர் உருவாக்கிய உள்ளடக்கத்தைப் பார்க்கிறீர்கள்.\",\"report\":\"அறிக்கையிடவும்\",\"no-permission-1\":\"பகிர்வு நிறுத்தப்பட்டதால் ஆவணம் இனி அணுக முடியாது.\",\"no-permission-2\":\"நீங்கள் முகப்புப் பக்கம் செல்லலாம் அல்லது அணுகலுக்கு உரிமையாளர் தொடர்பு கொள்ளலாம்.\",\"go-home\":\"முகப்புப் பக்கத்திற்கு செல்லவும்\",\"network-error\":\"நெட்வொர்க் பிழை. உங்கள் இணைப்பை சரிபார்க்கவும் மற்றும் பக்கத்தை புதுப்பிக்கவும்.\",\"media\":\"Sider AI மூலம் இதை எழுதினேன்—நீங்கள் என்ன நினைக்கிறீர்கள் என்று தெரிந்து கொள்ள ஆர்வமாக இருக்கிறேன். இதைப் பாருங்கள்!\",\"handle-login-edit\":\"திருத்துவதற்கு உள்நுழைக\",\"handle-edit\":\"மூலத்தை திருத்து\",\"handle-copy\":\"ஒரு நகலை உருவாக்கு\",\"title-suffix\":\"(பதிப்பு)\"},\"image-load-error\":\"படம் ஏற்ற முடியவில்லை\"},\"error\":{\"auth-failed\":\"அங்கீகாரம் தோல்வியடைந்தது\",\"common-error\":\"சேவையில் ஒரு பிரச்சினை ஏற்பட்டுள்ளது, தயவுசெய்து பின்னர் மீண்டும் முயற்சிக்கவும்.\",\"CREATE_TEMPLATE_WISEBASE_FAILED\":\"நெட்வொர்க் பிழை, இயல்புநிலை WiseBase உருவாக்க முடியவில்லை\",\"USER_NOT_FOUND\":\"மன்னிக்கவும், உங்கள் பயனர் தகவலைக் கண்டுபிடிக்க முடியவில்லை. தயவுசெய்து மீண்டும் உள்நுழைய முயற்சிக்கவும்.\",\"USER_UNAUTHORIZED\":\"உங்கள் உள்நுழைவு அமர்வு காலாவதியானது. தொடர மீண்டும் உள்நுழையவும்.\",\"USER_ID_DECODE_FAILED\":\"நாங்கள் ஒரு அங்கீகார சிக்கையை எதிர்கொண்டோம். தயவுசெய்து மீண்டும் உள்நுழைந்து மீண்டும் முயற்சிக்கவும்.\",\"CREATE_ONE_FAILED\":\"உருவாக்கம் தோல்வியடைந்தது. தயவுசெய்து பின்னர் மீண்டும் முயற்சிக்கவும். பிரச்சினை தொடர்ந்தால், ஆதரவை தொடர்பு கொள்ளவும்.\",\"GET_ONE_FAILED\":\"தரவை மீட்டெடுக்க முடியவில்லை. தயவுசெய்து பக்கத்தை புதுப்பித்து மீண்டும் முயற்சிக்கவும்.\",\"UPDATE_ONE_FAILED\":\"தரவை மீட்டெடுக்க முடியவில்லை. தயவுசெய்து பக்கத்தை புதுப்பித்து பின்னர் மீண்டும் முயற்சிக்கவும்.\",\"BasicUserQuotaInsufficient\":\"உங்கள் அடிப்படை ஒதுக்கீடு முடிந்துவிட்டது. மேலும் பயன்பாட்டிற்கு உங்கள் கணக்கை மேம்படுத்தவும்.\",\"QuotaRateLimitExceeded\":\"நீங்கள் தற்போதைய பயன்பாட்டு வரம்பை அடைந்துவிட்டீர்கள். இந்த வரம்பு அனைத்து பயனர்களுக்கும் சமச்சீர் பயன்பாட்டை உறுதிசெய்கிறது. தயவுசெய்து பின்னர் மீண்டும் முயற்சிக்கவும்.\",\"QuotaAdvancedRateLimit\":\"நீங்கள் மேம்பட்ட உரைக்கு தற்போதைய பயன்பாட்டு வரம்பை அடைந்துவிட்டீர்கள். நீங்கள் உடனடியாக மற்ற மாடலைப் பயன்படுத்த முடியும்.\",\"QuotaBasicRateLimit\":\"நீங்கள் அடிப்ப :\"கோப்பை நகர்த்த முடியவில்லை. இலக்கை சரிபார்த்து மீண்டும் முயற்சிக்கவும்.\",\"SAVE_FILE_TO_S3_ERROR\":\"கோப்பை சேமிக்க முடியவில்லை. தயவுசெய்து பின்னர் மீண்டும் முயற்சிக்கவும்.\",\"OSS_SIGN_COOKIE_FAILED\":\"சேமிப்பு அங்கீகாரம் தோல்வியடைந்தது. தயவுசெய்து பின்னர் மீண்டும் முயற்சிக்கவும்.\",\"PRE_SIGN_ERROR\":\"கோப்பு முன் செயலாக்கம் தோல்வியடைந்தது. தயவுசெய்து மீண்டும் பதிவேற்ற முயற்சிக்கவும்.\",\"START_RAG_ERROR\":\"கோப்பு செயலாக்கத்தை துவக்க முடியவில்லை. தயவுசெய்து மீண்டும் முயற்சிக்கவும்.\",\"DOWNLOAD_URL_ERROR\":\"இந்த URL-இல் இருந்து பதிவிறக்க முடியாது. முகவரியை சரிபார்க்கவும்.\",\"URL_WAS_REPEATED\":\"இந்த வலைப்பக்கம் ஏற்கனவே சேமிக்கப்பட்டுள்ளது. நகல்களை தவிர்க்கவும்.\",\"FILE_DOWNLOAD_ERROR\":\"கோப்பு பதிவிறக்கம் தோல்வியடைந்தது. உங்கள் நெட்வொர்க்கை சரிபார்த்து மீண்டும் முயற்சிக்கவும்.\",\"URL_NOT_SUPPORT_REQUEST\":\"இந்த வகை URL ஆதரிக்கப்படவில்லை. வேறு இணைப்பைப் பயன்படுத்தவும்.\",\"SyncUrlError\":\"தகவலை ஒத்திசைக்க முடியவில்லை. தயவுசெய்து பின்னர் மீண்டும் முயற்சிக்கவும்.\",\"AUTO_CLASSIFICATION_FAILED\":\"AI வகைப்படுத்தல் தோல்வியடைந்தது. தயவுசெய்து பின்னர் மீண்டும் முயற்சிக்கவும்.\",\"TOO_MANY_REQUEST\":\"இப்போது இணைப்பு பயன்படுத்தப்படுகிறது. கணினியில் ஒரு செயல்பாட்டில் உள்ள இணைப்பு உள்ளது. தயவுசெய்து மற்ற தாவல்களை மூடி மீண்டும் முயற்சிக்கவும்.\"},\"siderbar\":{\"expand\":\"விரிவாக்கம்\",\"fold\":\"சுருக்கம்\",\"main\":{\"chat\":\"அரட்டை\",\"home\":{\"home\":\"முகப்பு\",\"recent\":\"சமீபத்திய Wisebase\",\"tools\":\"பொதுவான கருவிகள்\",\"collections\":\"செயலில் உள்ள Wisebase\"},\"history\":\"அரட்டை வரலாறு\"},\"tools\":{\"tools\":\"உருவாக்கு\",\"write\":\"ஏஐ எழுத்தாளர்\",\"video\":\"வீடியோ\",\"ppt\":\"PPT\",\"all-tools\":\"அனைத்து கருவிகள்\",\"image\":\"படம்\",\"translator\":\"மொழிபெயர்ப்பாளர்\",\"slides\":\"ஸ்லைட்கள்\"},\"projects\":{\"projects\":\"Wisebase\",\"inbox\":\"ஏ.ஐ. இன்பாக்ஸ்\",\"more\":\"மேலும்\",\"add-project\":\"புதிய Wisebase\",\"all-projects\":\"அனைத்து Wisebases\",\"deep-research\":\"ஆழ்ந்த ஆராய்ச்சி\",\"all-files\":\"அனைத்து கோப்புகள்\"}},\"comm உருவாக்குகிறது.\",\"translate-into\":\"{lang} மொழிக்கு மொழிபெயர்க்கவும்\",\"unlimited\":\"வரம்பற்றது\",\"retry\":\"மீண்டும் முயற்சிக்கவும்\",\"time\":{\"today\":\"இன்று\",\"thisWeek\":\"இந்த வாரம்\",\"thisMonth\":\"இந்த மாதம்\",\"earlier\":\"முந்தைய\"},\"search\":\"தேடல்\",\"close\":\"மூடு\",\"whats-new\":{\"audio\":{\"btnText\":\"iOS செயலியை பதிவிறக்கம் செய்யவும்\",\"text\":{\"title\":\"Wisebase இல் ஒலிப்பதிவுகள்: குரலுடன் அறிவு பரிமாணங்களை விரிவாக்குங்கள்\",\"desc1\":\"தானாக உரைமாற்றம் செய்ய audio பதிவுகளை பதிவேற்றவும், உங்கள் பல்வேறு அறிவு அடிப்படையை எளிதாக வளமாக்கவும்.\",\"desc2\":\"உங்கள் பதிவுகளுடன் உரையாடவும், விவரங்களை தவறவிடாமல் ஆழமான உள்ளடக்கங்களை கண்டறியவும்.\",\"desc3\":\"iOS Wisebase ஒத்திசைவு இப்போது கிடைக்கிறது, எப்போது வேண்டுமானாலும் குறிப்புகளை வசதியாக பதிவு செய்யவும் மற்றும் அறிவை இணைக்கவும்.\"}},\"gotit\":\"சரி\",\"text\":{\"title\":\"வீடியோ பதிவேற்றங்கள் \u0026 உரை உரையாடல் ஆதரவு\",\"desc1\":\"YouTube சுருக்கம் அம்சத்திலிருந்து Wisebase-க்கு நேரடியாக YouTube வீடியோக்களை சேமிக்கவும்\",\"desc2\":\"Wisebase-க்கு வீடியோக்களைச் சேர்க்க உள்ளூர் வீடியோ கோப்புகளை பதிவேற்றவும் அல்லது YouTube இணைப்புகளை ஒட்டவும்\",\"desc3\":\"உரைப்பட்ட YouTube வீடியோக்களில் இருந்து உபதிதிகளை Pull செய்யவும் அல்லது பதிவேற்றப்பட்ட எந்த வீடியோவிலிருந்தும் உரையை உரையாடவும்\",\"desc4\":\"உங்கள் வீடியோக்களின் உள்ளடக்கத்துடன் நேரடியாக உரையாடவும் — உள்ளூர் அல்லது உபதிதிகளுடன் YouTube-ல் இருந்து\"},\"web-creator\":{\"btnText\":\"இலவசமாக தொடங்குங்கள்\",\"text\":{\"title\":\"GPT-5 உடன் இணையதளங்களை உருவாக்குங்கள் — காலவரையறையுடன் இலவசம்\",\"desc1\":\"GPT-5 மூலம் மேம்பட்டது — புத்திசாலித்தனமான யோசனைகள், வலுவான வடிவமைப்புகள், சிறந்த ஓட்டம்\",\"desc2\":\"கோடுகள் தேவையில்லை — எளிய வார்த்தைகளைப் பயன்படுத்தி எந்தப் பக்கத்தையும் உருவாக்குங்கள்\",\"desc3\":\"காட்சிப்படுத்தல் தொகுப்பு — உங்கள் விருப்பப்படி படங்கள் மற்றும் கூறுகளை மாற்றுங்கள்\"}},\"not-now\":\"இப்போது வேண்டாம்\",\"ai-slides\":{\"btnText\":\"இப்போது முயற்சிக்கவும்\",\"text\":{\"title\":\"AI Slides இப்போது செயல்பாட்டில் உள்ளது: 10 மடங்கு வேகமாக அற்புதமான பிரசண்டேஷன்களை உருவாக்குங்கள்\",\"desc1\":\"உங்கள் யோசனையை பகுப்பாய்வு செய்து கட்டமைக்கப்பட்ட சுருக்கமாக மாற்றுகிறது\",\"desc2\":\"ஒவ்வொரு ஸ்லைடுக்கும் சரியான படங்கள் மற்றும் வீடியோக்களை தானாக சேர்க்கிறது\",\"desc3\":\"AI உரையாடல் அல்லது கைமுறையில் திருத்துவதற்கான நெகிழ்வான விருப்பங்களை வழங்குகிறது\"}},\"share-wisebase\":{\"text\":{\"title\":\"Wisebase பகிர்வு அறிமுகம்\",\"desc\":\"ஒரு Wisebase மற்றும் அதன் கோப்புகளை ஒரே இணைப்புடன் பகிரவும். உங்கள் சகோதரர்கள் ஆவணங்களுடன் உடனடியாக உரையாட தொடங்க அவர்களுக்கு சொந்த நகல் கிடைக்கும்.\",\"desc1\":\"உங்கள் Wisebase இல் உள்ள கோப்புகளை உங்கள் சகோதரர்களுடன் ஒரு எளிய இணைப்பைப் பயன்படுத்தி பகிரவும்.\",\"desc2\":\"அவர்கள் தங்களுக்கே உரிய நகலைப் பெறுவார்கள், இதனால் அவர்கள் ஆவணங்களுடன் உடனடியாக உரையாடத் தொடங்கலாம்.\"}},\"learnMore\":\"மேலும் அறிக\",\"elite-credit\":{\"text\":{\"title\":\"எலிட் கிரெடிட்களை அறிமுகப்படுத்துதல்\",\"desc1\":\"எல்லோருக்கும் நம்பகமான செயல்திறனை உறுதி செய்ய, Deep Research மற்றும் AI Slides போன்ற முகவர் அம்சங்களுக்கு எலிட் கிரெடிட்களை அறிமுகப்படுத்துகிறோம். உங்கள் தற்போதைய திட்டம் மாற்றமின்றி இருக்கும், மேலும் இந்த முகவர்களை பயன்படுத்த தொடர எலிட் கிரெடிட்களை மாதம் ஒன்றுக்கு நீங்கள் பெறுவீர்கள். நாங்கள் மேம்படுத்துவதில் தொடர்ந்தும் உங்கள் புரிதலுக்கு நன்றி.\"}},\"pdf-inbox\":{\"text\":{\"title\":\"ChatPDF/Inbox முக்கிய புதுப்பிப்பு: ஆவண ஒத்துழைப்பை புத்திசாலித்தனமாக மாற்றுதல்\",\"desc1\":\"கூட்ட ஆவண உரையாடல்: பல கோப்புகளை ஒரே நேரத்தில் தேர்ந்தெடுத்து கேள்விகள் கேட்கவும், AI உங்களுக்கு ஆவணங்களில் தகவல்களை ஒருங்கிணைக்க உதவுகிறது.\",\"desc2\":\"பக்கத்தொகுப்பு கோப்பு மேலாண்மை: பக்கத்தின் இடது புறத்தில் உள்ள கோப்பு தேர்வு பகுதி பல கோப்புகளை தேர்ந்தெடுக்க ஆதரிக்கிறது, அனைத்து ஆவணங்களின் முழு கண்ணோட்டத்தை வழங்குகிறது\",\"desc3\":\"புத்திசாலி ஆவண முன்னோட்டம்: கோப்புகளை மிதக்கும் போது AI சுருக்கங்களை காட்சியளிக்கிறது, ஆவணங்களின் மைய உள்ளடக்கத்தை விரைவாக புரிந்துகொள்ள உதவுகிறது\",\"desc4\":\"விரைவு நூலகம் உருவாக்குதல்: Inbox கோப்புகளை தேர்ந்தெடுத்து நேரடியாக Wisebase அறிவு அடிப்படையை உருவாக்கவும், பொருட்களை காப்பாற்றுவதற்கு எந்த தடையும் இல்லாமல்.\"}},\"record-win\":{\"text\":{\"title\":\"Sider for Windows: கூட்டங்கள் மற்றும் வீடியோக்களுக்கு Rec Note-ஐ அறிமுகப்படுத்துகிறது\",\"desc1\":\"தானாக தொடக்கம்: உங்கள் மைக்ரோபோன் பயன்பாட்டுடன் எளிதாக தொடங்குகிறது\",\"desc2\":\"உண்மைக் கால உரை மாற்றம்: உங்கள் பேச்சை உடனுக்குடன் பிடித்து உரை மாற்றுகிறது\",\"desc3\":\"கட்டமைக்கப்பட்ட சுருக்கங்கள்: உங்கள் குறிப்புகள் மற்றும் உரை மாற்றத்திலிருந்து தனிப்பயனாக்கப்பட்ட, ஒழுங்குபடுத்தப்பட்ட சுருக்கங்களை உருவாக்குகிறது\"}},\"try-it-now\":\"இப்போது முயற்சிக்கவும்\",\"nano-banana\":{\"text\":{\"title\":\"ஒரு ஒற்றை காட்சியில் ஒரு ஆவணத்தை விளக்கவும் – Nano Banana Pro இப்போது Wisebase இல் ஒருங்கிணைக்கப்பட்டுள்ளது\",\"desc1\":\"ஒரு ஒற்றை கோப்பிலிருந்து முக்கிய உள்ளடக்கத்தை எடுக்கவும் மற்றும் Nano Banana Pro அதை ஒரு தகவலுக்கோவையில் மாற்றவும்.\",\"desc2\":\"கோப்புகள், உரையாடல் வரலாறு, இணைய முடிவுகள் அல்லது ஒரு உத்தியைப் பயன்படுத்தி படங்களை உருவாக்க Nano Banana Pro ஐ நேரடியாக உரையாடலில் பயன்படுத்தவும்.\",\"desc3\":\"சிறந்த முடிவுகளுக்காக, Nano Banana Pro இயல்பாக Gemini 3 Pro ஐப் பயன்படுத்துகிறது.\"}},\"all-files\":{\"text\":{\"title\":\"எல்லா கோப்புகள், ஒரு பார்வை\",\"desc1\":\"இப்போது உங்கள் அறிவு அடிப்படையில் உள்ள அனைத்து கோப்புகளையும் ஒரே இடத்தில் காணலாம்.\",\"desc2\":\"முந்தையதைவிட எளிதாக ஒவ்வொரு ஆவணத்தையும் உலாவவும், தேடவும் மற்றும் நிர்வகிக்கவும்.\"}}},\"upgrade35\":{\"text\":\"35% தள்ளுபடி\",\"btn\":\"மேம்படுத்தல் 35% தள்ளுபடி\",\"banner-text\":\"அதிகபட்சம் \u003ccount\u003e35% தள்ளுபடி!\u003c/count\u003e காலவரையற்றது\",\"time-limited\":\"காலவரையற்றது\",\"grab-deal\":\"சலுகையை பிடிக்கவும்\",\"upf\":\"ப்ரோ அம்சங்களை திறக்கவும்\",\"fs\":\"பிளாஷ் விற்பனை\"},\"copy\":\"பதிவு\",\"share\":\"பகிர்\",\"download\":\"இனிமேல் பதிவிறக்கம் செய்\",\"on-sale\":\"விற்பனைக்கு\",\"free-trial\":{\"tl\":\"கவுண்ட்டவுன்\",\"ft\":\"இலவச சோதனை\",\"dr-chat\":{\"start-ft\":\"இலவச சோதனையை தொடங்கவும்\",\"title\":\"மேலும் ஆழமான கல்வி பார்வைகளைத் திறக்கவும்\",\"desc\":\"உங்கள் 3 நாள் இலவச சோதனை காலம் \u003 செய்து பிறகு மீண்டும் முயற்சிக்கவும்\",\"CHAT_PROMPT_TEMPLATES_INVALID\":\"AI பதில் தோல்வியுற்றது. தயவுசெய்து மீண்டும் முயற்சிக்கவும்\",\"CHAT_REQUEST_PARAMS_INVALID\":\"செல்லுபடியாகாத உரையாடல் கோரிக்கையின் அளவுருக்கள். தயவுசெய்து புதுப்பித்து மீண்டும் முயற்சிக்கவும்\",\"errSiderFREEUserLimitTitle1\":\"இலவச சோதனை காலம் முடிந்துவிட்டது. ஆழமான ஆராய்ச்சிக்காக மேம்படுத்துங்கள்! முன்னணி மாதிரிகளை திறக்கவும்: GPT5, Gemini2.5 Pro, Claude 4 மற்றும் மேலும் Sider ப்ரீமியம் அம்சங்கள். ஏற்கனவே மில்லியன்கள் மேம்படுத்தியுள்ளனர்.\",\"errSiderFREEUserLimitTitle2\":\"இலவச சோதனை பயன்பாடுகள்:\",\"errSiderFREEUserLimitDesc2\":\"ஒவ்வொரு பயன்பாட்டும் 10 எலிட் கிரெடிட்களை உபயோகிக்கும்.\",\"errSiderFREEUserLimitDesc1\":\"எல்லா இலவச சோதனைகள் முடிந்த பிறகு, ஒவ்வொரு பயன்பாட்டும் 10 எலிட் கிரெடிட்களை உபயோகிக்கும்.\",\"errSiderProAdvancedLimit\":\"மேம்படுத்தவும் அல்லது நண்பர்களை அழைக்கவும், மேலும் Advanced Credits ஐ திறக்க தொடரவும்.\",\"errSiderUltraAdvancedLimit\":\"நீங்கள் ஆழ்ந்த ஆராய்ச்சிக்கான மாதாந்திர வரம்பை அடைந்துள்ளீர்கள். இந்த அம்சம் மாதாந்திர முன்னணி கிரெடிட் பயன்பாடு 1500 க்குக் கீழே இருக்கும் போது கிடைக்கிறது (பூஸ்டர் பேக் கிரெடிட்கள் பாதிக்கப்படவில்லை). தொடர, தயவுசெய்து பூஸ்டர் பேக் வாங்கவும்.\",\"enoughQuotaTipsTitle\":\"உங்களிடம் போதுமான கிரெடிட்கள் உள்ளன.\",\"enoughQuotaTipsDesc\":\"தயவுசெய்து Deep Research ஐ தொடருங்கள்.\",\"orderBtn\":\"இப்போது ஆர்டர் செய்யவும்\",\"FreeVisualizationUsageLimitReached\":\"இலவச காட்சி பயன்பாட்டின் வரம்பு அடைந்தது. இந்த அம்சத்தை தொடர பயன்படுத்த மேம்படுத்தவும்.\",\"freeGetMoreDeepResearchBtn\":\"மேலும் ஆழமான ஆராய்ச்சியை பெறுங்கள்\",\"imageFileFormatError\":\"ஆதரிக்கப்படாத கோப்பு வடிவம். PNG, JPG அல்லது JPEG வடிவத்தில் உள்ள படங்களை ஒட்டவும்.\",\"CHAT_NOTE_TOO_MANY\":\"நீங்கள் தேர்ந்தெடுத்த குறிப்புகளின் மொத்த நீளம் உரையாடல் ஆதரவு வரம்பை மீறுகிறது. தயவுசெய்து தேர்ந்தெடுத்த குறிப்புகளின் எண்ணிக்கையை அதற்கேற்ப குறைக்கவும்.\",\"CHAT_FILES_UNAVAILABLE\":\"உங்கள் தற்போதைய Wisebase-ல் உள்ளனவாக உள்ளன, உரைமாற்றப்படாத ஒலியோ அல்லது வீடியோ கோப்புகள் மட்டுமே உள்ள \":\"அழிக்கவும்\",\"my-creations\":\"என் உருவாக்கங்கள்\",\"community\":\"சமூகம்\",\"loading\":\"ஏற்றுகிறது...\",\"stop-generating\":\"உருவாக்கத்தை நிறுத்து\",\"published\":\"பதிவு செய்யப்பட்டது\",\"view-website\":\"வலைத்தளம் காண்க\",\"publishing\":\"பதிப்பீடு செய்கிறேன்...\",\"updating\":\"புதுப்பிக்கிறது...\",\"updated\":\"புதுப்பிக்கப்பட்டது\",\"loading-creations-failed-title\":\"ஓஹோ! ஏதோ தவறு ஏற்பட்டது.\",\"loading-creations-failed-desc\":\"தயவுசெய்து பக்கம் புதுப்பிக்கவும் அல்லது பிறகு மீண்டும் முயற்சிக்கவும்.\",\"retry\":\"மீண்டும் முயற்சிக்கவும்\",\"creations-empty\":\"இன்னும் எந்த உருவாக்கங்களும் இல்லை—இப்போது ஒன்றை உருவாக்கவும்!\",\"delete-failed\":\"அழிப்பு தோல்வி\",\"delete-success\":\"அழிப்பு வெற்றி\",\"delete-work-title\":\"இந்தப் பணியை நீக்க விரும்புகிறீர்களா?\",\"delete-work-desc\":\"நீக்குவது அனைத்து பகிரப்பட்ட இணைப்புகளையும் தவறானதாக மாற்றும். இந்த செயல்பாட்டை மீண்டும் செய்ய முடியாது.\",\"creations-search-empty\":\"முடிவுகள் எதுவும் கிடைக்கவில்லை, வேறு முக்கிய சொற்களை முயற்சிக்கவும்.\",\"rename-failed\":\"மீண்டும் பெயரிடல் தோல்வி\",\"rename-success\":\"மீண்டும் பெயரிடல் வெற்றி\",\"free-trial-left\":\"இனிய சோதனை மீதமுள்ளது: {count}\",\"free-trial-limit\":\"உங்கள் படைப்பாற்றல் இங்கே நிற்க வேண்டியதில்லை. வரையறையற்ற படைப்புகள் மற்றும் பிரீமியம் அம்சங்களை அன்லாக் செய்யுங்கள்.\",\"invite-friends\":\"நண்பர்களை அழைக்கவும்\",\"team-owner-credit-limit\":\"உங்கள் அனைத்து கிரெடிட்களையும் நீங்கள் பயன்படுத்தி விட்டீர்கள். மேலும் பெறுவதற்கு மேம்படுத்தவும்.\",\"team-user-credit-limit\":\"உங்கள் அனைத்து கிரெடிட்களையும் நீங்கள் பயன்படுத்தி விட்டீர்கள். மேலும் பெற உங்கள் குழு உரிமையாளரை மேம்படுத்துமாறு கேளுங்கள்.\",\"basic-credit-limit\":\"உங்கள் அடிப்படை கிரெடிட்கள் முடிந்துவிட்டன. மேலும் பெற மேம்படுத்தவும்.\",\"advanced-credit-limit\":\"உங்கள் மேம்பட்ட கிரெடிட்கள் முடிந்துவிட்டன. மேலும் பெற மேம்படுத்தவும்.\",\"unlimited-advanced-credit-limit\":\"அம்ச அணுகல் வரம்பு எட்டப்பட்டுள்ளது. மாதாந்திர மேம்பட்ட கிரெடிட்கள் 1500 க்குக் குறைவாக பயன்படுத்தப்படும் போது இந்த அம்சம் கிடைக்கும் (Booster Pack கிரெடிட்கள் விலக்கப்பட்டுள்ளன). தொடர, தயவுசெய்து ஒரு Booster Pack வாங்கவும்.\",\"elite-credit-limit\":\"உங்களின் எலீட் கிரெடிட்கள் முடிந்துவிட்டன. மேலும் பெற மேம்படுத்தவும்.\",\"unlimited-elite-credit-limit\":\"உங்கள் உயர்தர கிரெடிட்கள் முடிந்துவிட்டன. உங்கள் கிரெடிட்கள் மீண்டும் அமைக்கப்பட்ட பிறகு, நீங்கள் அடுத்த மாதம் மீண்டும் முயற்சிக்கலாம்.\",\"try-these\":\"இதனை முயற்சிக்கவும்:\",\"intelligence\":\"நுண்ணறிவு\",\"cost\":\"செலவு\",\"model-no-image\":\"தற்போதைய முறை படத்தைப் புரிந்துகொள்வதை ஆதரிக்கவில்லை\",\"model-desc-free\":\"அடிப்படை கிரெடிட் மாறுபடும் பில்லிங்கைப் பயன்படுத்தி, தினசரி பணிகளுக்கு ஏற்றது.\",\"model-desc-advanced\":\"எலிட் கிரெடிட் மாறுபடும் பில்லிங்கைப் பயன்படுத்தி, சிக்கலான மற்றும் முழுமையான திட்டங்களுக்கு ஏற்றது.\",\"preset-create-prompt\":[{\"name\":\"தனிப்பட்ட முகப்பு பக்கம்\",\"prompt\":\"தனிப்பட்ட அறிமுகம், திறன்கள் காட்சி, திட்டப் போர்ட்ஃபோலியோ, மற்றும் தொடர்பு தகவல்களை உள்ளடக்கிய நவீன தனிப்பட்ட முகப்பு பக்கத்தை உருவாக்கவும். வடிவமைப்பு தேவைகள்: குறைந்தபட்ச நவீன பாணி, இருண்ட தீம், மென்மையான ஸ்க்ரோல் அனிமேஷன்கள்.\"},{\"name\":\"நிறுவனத்தின் இணையதளம்\",\"prompt\":\"முகப்பு காட்சி, தயாரிப்புகள் \u0026 சேவைகள், எங்களை பற்றி, தீர்வுகள், மற்றும் தொடர்பு பக்கங்களை உள்ளடக்கிய தொழில்நுட்ப நிறுவனத்தின் இணையதளத்தை வடிவமைக்கவும். காட்சி பாணி: வணிக தொழில்முறை, நீல நிறம், நம்பிக்கை மற்றும் தொழில்முறைமையை வலியுறுத்துகிறது.\"},{\"name\":\"மின்வணிக தளம்\",\"prompt\":\"தயாரிப்பு காட்சி, ஷாப்பிங் கார்ட், பயனர் அமைப்பு, ஆர்டர் மேலாண்மை, மற்றும் கட்டண செயல்முறை ஆகியவற்றை உள்ளடக்கிய முழுமையான மின்வணிக ஷாப்பிங் இணையதளத்தை உருவாக்கவும். வடிவமைப்பு தேவைகள்: பயனர் நட்பு அனுபவம், தெளிவான காட்சி வரிசை, மொபைல் பதிலளிப்பு.\"},{\"name\":\"வலைப்பதிவு அமைப்பு\",\"prompt\":\"கட்டுரை வெளியீடு, வகை குறிச்சொற்கள், கருத்து செயல்பாடு, மற்றும் பயனர் மேலாண்மையை ஆதரிக்கும் தனிப்பட்ட வலைப்பதிவு இணையதளத்தை உருவாக்கவும். இடைமுக பாணி: சுத்தமான வாசிப்பு அனுபவம், பதிலளிப்பு வடிவமைப்பு, இருண்ட/ஒளி தீம் மாற்றம்.\"},{\"name\":\"டாஷ்போர்டு\",\"prompt\":\"தரவு புள்ளிவிவர வரைபடங்கள், பயனர் மேலாண்மை, அமைப்பு அமைப்புகள், மற்றும் தனிப்பட்ட மையத்தை உள்ளடக்கிய மேலாண்மை டாஷ்போர்டை உருவாக்கவும். இடைமுக பாணி: நவீன சமவெளி வடிவமைப்பு, பக்கப்பட்டி வழிசெலுத்தல், இருண்ட/ஒளி தீம் மாற்றம்.\"},{\"name\":\"ஆன்லைன் கல்வி தளம்\",\"prompt\":\"பாடக்காட்சி, வீடியோ பிளேபேக், கற்றல் முன்னேற்றம், பயிற்சியாளர் மேலாண்மை, மற்றும் சமூக அம்சங்களை உள்ளடக்கிய ஆன்லைன் கல்வி கற்றல் தளத்தை உருவாக்கவும். தொழில்நுட்ப தேவைகள்: மென்மையான வீடியோ பிளேபேக், முன்னேற்ற கண்காணிப்பு, பல சாதன ஒத்திசைவு.\"},{\"name\":\"உணவகம் இணையதளம்\",\"prompt\":\"உயர்தர உணவக வலைத்தளத்தை வடிவமைக்கவும், இதில் மெனு காட்சி, ஆன்லைன் முன்பதிவு, உணவக அறிமுகம் மற்றும் இடம் தொடர்பான தகவல்கள் அடங்கும். வடிவமைப்பு பாணி: சூடான மற்றும் நெகிழ்வானது, உணவு புகைப்படக்கலை, சூடான நிறங்கள், தரத்தை முன்னிலைப்படுத்துதல்.\"},{\"name\":\"ஜிம் மேலாண்மை அமைப்பு\",\"prompt\":\"உறுப்பினர் மேலாண்மை, வகுப்பு முன்பதிவு, பயிற்சியாளர் அமைப்பு மற்றும் உபகரண மேலாண்மை ஆகியவற்றை உள்ளடக்கிய ஜிம் மேலாண்மை அமைப்பை உருவாக்கவும். முக்கிய அம்சங்கள்: QR குறியீடு செக்-இன், உடற்பயிற்சி கண்காணிப்பு, உடற்பயிற்சி திட்ட உருவாக்கம்.\"},{\"name\":\"தனிப்பட்ட இணையதளம்\",\"prompt\":\"வடிவமைப்பாளர் தனிப்பட்ட இணையதளம், இதில் திட்ட காட்சி, வடிவமைப்பு தத்துவம், பணிச்சூழல் மற்றும் வாடிக்கையாளர் சான்றுகள் அடங்கும். காட்சிப் பயன்கள்: படைப்பாற்றல் அமைப்பு, உயர்தர பட காட்சி, தொடர்பாடல் அனிமேஷன்கள்.\"},{\"name\":\"செய்தி தளம்\",\"prompt\":\"கட்டுரை பட்டியல், வகை வடிகட்டி, தேடல் செயல்பாடு மற்றும் பரிந்துரைகள் ஆகியவற்றை உள்ளடக்கிய செய்தி வலைத்தளத்தை உருவாக்கவும். வடிவமைப்பு தேவைகள்: தெளிவான தகவல் கட்டமைப்பு, வேகமான ஏற்றம், சிறந்த வாசிப்பு அனுபவம்.\"},{\"name\":\"சமூக ஊடக தளம்\",\"prompt\":\"பதிவு வெளியீடு, பின்தொடர்பு அமைப்பு, செய்தி அரட்டை மற்றும் பயனர் சுயவிவரங்கள் ஆகியவற்றை உள்ளடக்கிய சமூக ஊடக பயன்பாட்டை உருவாக்கவும். தொடர்பாடல் அம்சங்கள்: விருப்பங்கள் \u0026 கருத்துகள், உள்ளடக்க பகிர்வு, நேரடி அறிவிப்புகள், நவீன மொபைல்-முதன்மை வடிவமைப்பு.\"},{\"name\":\"பயண முன்பதிவு இணையதளம்\",\"prompt\":\"இலக்கு தேடல், ஹோட்டல் முன்பதிவுகள், பயண திட்டமிடல் மற்றும் ப
