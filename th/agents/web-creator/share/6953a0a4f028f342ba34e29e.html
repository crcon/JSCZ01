y (netlify.com) – ใช้งานง่าย\n1. ไปที่ netlify.com และสมัครสมาชิก\n2. ลากและวางโฟลเดอร์ dist/ ลงในพื้นที่อัปโหลดของหน้าแรก\n3. รอการอัปโหลดให้เสร็จสิ้น\n4. คุณจะได้รับโดเมนแบบสุ่ม (สามารถปรับแต่งได้ในตั้งค่า)\n\n📘 GitHub Pages (pages.github.com) – ฟรีและเชื่อถือได้\n1. สร้างรีโพสิทอรีใหม่บน GitHub\n2. อัปโหลดเนื้อหาของโฟลเดอร์ dist/ ไปยังรีโพ\n3. ไปที่การตั้งค่าของรีโพสิทอรี → Pages\n4. เลือก \"Deploy from a branch\" → main branch\n5. เข้าถึงเว็บไซต์ของคุณที่ username.github.io/repository-name\n\n---\n\n🔧 การปรับใช้ขั้นสูง (สำหรับนักพัฒนา):\n\nการปรับใช้อัตโนมัติด้วย Git\n1. ส่งโปรเจกต์ทั้งหมด (รวมถึงซอร์สโค้ด) ไปยัง GitHub/GitLab\n2. เชื่อมต่อรีโพของคุณกับ Vercel/Netlify\n3. กำหนดค่าการสร้าง:\n   - คำสั่งสร้าง: npm run build\n   - ไดเรกทอรีเผยแพร่: dist\n   - เวอร์ชัน Node.js: 16.x หรือสูงกว่า\n4. ทุกการส่งจะทริกเกอร์การสร้างและการปรับใช้อัตโนมัติ\n\nการปรับใช้เซิร์ฟเวอร์แบบดั้งเดิม\nหากคุณมีเซิร์ฟเวอร์ของคุณเอง:\n1. อัปโหลดไฟล์ทั้งหมดในไดเรกทอรี dist/ ไปยังรากเว็บของเซิร์ฟเวอร์ของคุณ\n2. ตรวจสอบให้แน่ใจว่าเซิร์ฟเวอร์รองรับการโฮสต์ไฟล์สแตติก\n3. เข้าถึงเว็บไซต์ของคุณผ่านโดเมนของคุณ\n\n---\n\n💰 ข้อมูลราคา:\n- Vercel: แผนฟรีเพียงพอสำหรับการใช้งานส่วนตัว\n- Cloudflare Pages: ฟรีทั้งหมด ไม่มีข้อจำกัด\n- Netlify: แผนฟรีรวมถึงแบนด์วิดท์ 100GB/เดือน\n- GitHub Pages: ฟรีทั้งหมด แบนด์วิดท์ 100GB/เดือน\n\n---\n\n🎯 คำแนะนำ:\n- ผู้เริ่มต้น: Vercel หรือ Netlify (อัปโหลดแบบลากและวาง)\n- เน้นความเร็ว: Cloudflare Pages\n- โปรเจกต์ระยะยาว: GitHub Pages\n- นักพัฒนา: การปรับใช้อัตโนมัติด้วย Git\n\n---\n\n⚡ เคล็ดลับ:\n- ทุกแพลตฟอร์มให้ใบรับรอง HTTPS ฟรี\n- คุณสามารถผูกโดเมนที่กำหนดเองได้ (บางแพลนต้องชำระเงิน)\n- หลังการปรับใช้ ทดสอบเว็บไซต์ของคุณบนอุปกรณ์ต่างๆ\n\n---\n\n🆘 การแก้ไขปัญหา:\n1. ตรวจสอบให้แน่ใจว่าคุณอัปโหลดเนื้อหาของ dist/ ไม่ใช่โปรเจกต์ทั้งหมด\n2. ตรวจสอบว่า index.html อยู่ในไดเรกทอรีราก\n3. ตรวจสอบบันทึกข้อผิดพลาดบนแพลตฟอร์มโฮสติ้ง\n4. ตรวจสอบให้แน่ใจว่าไฟล์ทั้งหมดถูกอัปโหลดอย่างถูกต้อง"])</script><script>self.__next_f.push([1,"2c:{\"file-desc\":\"$2d\",\"deploy-guide\": ารจัดการเนื้อหาของ OpenAI โปรดแก้ไขคำสั่งของคุณและลองอีกครั้ง\",\"errOpenaiFailToFetch\":\"ไม่สามารถรับการตอบสนองจาก OpenAI ผ่านคีย์ API ของคุณ\",\"errServiceUnavailable\":\"เซิร์ฟเวอร์ Openai ไม่ว่าง โปรดลองอีกครั้งในภายหลัง หรือเปลี่ยนไปใช้ Sider API และใช้ {model} ในช่วงที่ OpenAI หยุดทำงาน\",\"errSiderAdminKickout\":\"คุณถูกเตะออก กรุณาเข้าสู่ระบบใหม่\",\"errSiderAdvancedTextLimit\":\"คุณได้ถึงขีดจำกัดการใช้งานสำหรับเครดิตขั้นสูงแล้ว ขณะนี้มีข้อจำกัดที่{count}ข้อความทุก ๆ 60 นาที หรือคุณสามารถใช้เครดิตพื้นฐานและกลับมาใหม่ในภายหลัง\",\"errSiderApiHighLoad\":\"ขณะนี้เซิร์ฟเวอร์ OpenAI ไม่ว่าง กรุณาลองใหม่อีกครั้งในภายหลัง.\",\"errSiderApiImageLimit\":\"คุณได้ใช้เครดิตพื้นฐานทั้งหมดแล้ว โปรดอัปเกรดเพื่อใช้งานคุณสมบัตินี้ต่อไป\",\"errSiderApiImgLimitPremiumUltra\":\"คุณได้ใช้เครดิตพื้นฐานสูงสุดแล้ว โปรดรอการรีเซ็ตครั้งถัดไปเพื่อใช้งานต่อ\",\"errSiderApiLimitDevice\":\"กรุณาเข้าสู่ระบบเพื่อใช้งาน\",\"errSiderApiLimitLogin\":\"คุณได้ใช้เครดิตฟรีทั้งหมดในวันนี้แล้ว อัปเกรดหรือเชิญเพื่อนเพื่อรับเพิ่มเติม หรือรอการรีเซ็ตเครดิตในวันพรุ่งนี้\",\"errSiderApiLimitPremium\":\"เครดิตพื้นฐานของคุณสำหรับเดือนนี้ถูกใช้หมดแล้ว เปลี่ยนไปใช้เครดิตขั้นสูง รอการรีเซ็ตในเดือนถัดไป (วันที่สมัครสมาชิก) หรืออัปเกรดเพื่อรับเพิ่มเติม\",\"errSiderApiLimitPremiumDiscount\":\"คุณได้ใช้เครดิตทั้งหมดของคุณแล้ว อัปเกรดตอนนี้เพื่อรับเครดิตไม่จำกัดพร้อมส่วนลด \u003cb\u003e$1\u003c/b\u003e\",\"errSiderApiOcrLimit\":\"คุณได้ใช้เครดิตพื้นฐานทั้งหมดของคุณแล้ว โปรดอัปเกรดเพื่อเข้าถึงคุณสมบัตินี้ต่อไป\",\"errSiderApiSummaryVideoLimit\":\"คุณได้ใช้เครดิตทั้งหมดของคุณแล้ว โปรดอัปเกรดหรือเชิญเพื่อนเพื่อรับเพิ่มเติม\",\"errSiderApiTrialFeatLimit\":\"คุณได้ถึงขีดจำกัดการทดลองใช้สำหรับฟีเจอร์พรีเมียมแล้ว อัปเกรดเพื่อปลดล็อกฟีเจอร์ทั้งหมด\",\"errSiderAudioAdvancedLimit\":\"คุณต้องการเครดิตขั้นสูงเพิ่มเติม ทุก 10 นาที (หรือน้อยกว่า) ของเสียงใช้ 1 เครดิตขั้นสูง อัปเกรดหรือเชิญเพื่อนเพื่อรับเพิ่มเติม!\",\"errSiderBasicTextLimit\":\"คุณได้ถึงขีดจำกัดการใช้งานสำหรับเครดิตพื้นฐานแล้ว ขณะนี้มีข้อจำกัดที่{count}ข้อความทุก ๆ 60 นาที หรือคุณสามารถใช้เครดิตขั้นสูงและกลับมาใหม่ในภายหลัง\",\"errSiderCreditFreqLimit\":\"คุณถึงขีดจำกัดการใช้งานปัจจุบันแล้ว ขีดจำกัดนี้เพื่อให้แน่ใจว่ามีการใช้งานที่เป็นธรรมสำหรับผู้ใช้ทุกคน กรุณาลองใหม่หลังจาก{count}นาที\",\"errSiderCreditUsageLimit\":\"ถึงขีดจำกัดการใช้งานแล้ว\",\"errSiderDataAnalysisCredit\":\"คำตอบนี้ต้องการการวิเคราะห์ข้อมูล (1 เครดิตขั้นสูง) คุณหมดเครดิตขั้นสูงแล้ว อัปเกรดหรือเชิญเพื่อนเพื่อรับเพิ่มเติม!\",\"errSiderDeviceBinded\":\"กรุณาเข้าสู่ระบบเพื่อใช้งาน\",\"errSiderDeviceLimitLogout\":\"คุณถูกออกจากระบบเนื่องจากถึงขีดจำกัดของอุปกรณ์ คุณสามารถเข้าสู่ระบบใหม่และนี่จะออกจากระบบอุปกรณ์ที่ใช้งานอยู่ที่เก่าที่สุดในบัญชีของคุณ\",\"errSiderGPT4HighLoad\":\"ขณะนี้เซิร์ฟเวอร์ OpenAI ไม่ว่าง กรุณาลองใหม่อีกครั้งในภายหลัง.\",\"errSiderGPT4LimitDevice\":\"โปรด \u003cb\u003eเข้าสู่ระบบ\u003c/b\u003e ก่อน และ \u003camb\u003eเชิญเพื่อนของคุณ\u003c/amb\u003e หรือ \u003cta\u003eอัปเกรดเป็นพรีเมียม\u003c/ta\u003e เพื่อรับเครดิตขั้นสูงเพิ่มเติม\",\"errSiderGPT4LimitLogin\":\"อัปเกรดหรือเชิญเพื่อนเพื่อปลดล็อกเครดิตขั้นสูงเพิ่มเติมสำหรับคำตอบที่มีข้อมูลเชิงลึกมากขึ้น\",\"errSiderGPT4LimitPremium\":\"คุณได้ใช้เครดิตขั้นสูงรายเดือนของคุณหมดแล้ว อัปเกรดแผนของคุณเพื่อรับโควตารายเดือนที่สูงขึ้น หรือซื้อแพ็คเสริมเครดิตขั้นสูงเพื่อใช้งานทันที!\",\"errSiderGPT4LimitPremiumDiscount\":\"เครดิตขั้นสูงของคุณสำหรับเดือนนี้ถูกใช้หมดแล้ว อัปเกรดตอนนี้เพื่อรับเครดิตไม่จำกัดพร้อมส่วนลด \u003cb\u003e$1\u003c/b\u003e หรือรอการรีเซ็ตในเดือนถัดไป (วันที่สมัครสมาชิก)\",\"errSiderHighTrafficError\":\"เนื่องจากมีการเข้าชมสูง โปรดลองอีกครั้งในภายหลังหรืออัปเกรดเป็นบัญชีพรีเมียมเพื่อการเข้าถึงที่รวดเร็วยิ่งขึ้น\",\"errSiderHighTrafficTip\":\"โปรดพิจารณา\u003ca\u003eอัปเกรดเป็นบัญชีพรีเมียม\u003c/a\u003eเพื่อการเข้าถึงที่เสถียรและเพื่อสนับสนุนการพัฒนาของเรา\",\"errSiderLoginExpired\":\"การเข้าสู่ระบบของคุณหมดอายุแล้ว กรุณาเข้าสู่ระบบใหม่\",\"errSiderNeedLogin\":\"กรุณาเข้าสู่ระบบเพื่อใช้งาน\",\"errSiderO1Limit1\":\"โมเดล OpenAI o1 เป็นที่ต้องการสูงและมีการใช้งานถึงขีดจำกัดแล้ว ไม่ต้องกังวล คุณยังสามารถถามคำถามเกี่ยวกับ OpenAI o1 ได้ฟรีบนเว็บไซต์ถามตอบที่ขับเคลื่อนโดยชุมชนของเรา: \u003ca\u003eask.sider.ai\u003c/a\u003e\",\"errSiderOpenaiFault\":\"เซิร์ฟเวอร์ Openai ไม่ว่าง โปรดเปลี่ยนไปใช้ {model} ในระหว่างที่ OpenAI ขัดข้อง\",\"errSiderPremiumRequired\":\"คุณสมบัตินี้มีให้สำหรับผู้ใช้ระดับพรีเมียมเท่านั้น อัปเกรดทันทีเพื่อปลดล็อกฟังก์ชันนี้\",\"errSiderProcessing\":\"ครั้งละหนึ่งข้อความเท่านั้น โปรดให้คำตอบอื่น ๆ เสร็จสิ้นก่อนที่จะส่งข้อความอื่น หรือรอสักครู่\",\"errSiderTimeout\":\"คำขอหมดเวลา กรุณาลองอีกครั้ง.\",\"errSiderUnlimitedLimit\":\"คุณถึงขีดจำกัดชั่วคราว ({timesToUse}ครั้ง /{periodTime}ชั่วโมง) สำหรับเครดิตขั้นสูง เรากำลังพยายามหาเครดิตเพิ่มเติมให้คุณ เครดิตใหม่จะพร้อมใช้งานที่{resetTime}ต้องการเพิ่มเติมตอนนี้หรือไม่? ลองใช้บูสเตอร์แพ็คดูสิ!\",\"errSiderUserBanned\":\"บัญชีของคุณถูกระงับเนื่องจากตรวจพบกิจกรรมที่ผิดปกติ (เช่น การละเมิดกฎหรือการแชร์บัญชี) หากคุณมีคำถามใด ๆ กรุณาส่งอีเมลถึงเราที่ care@sider.ai พร้อมรายละเอียดบัญชีของคุณ\",\"errTrySiderAPI\":\"เปลี่ยนไปใช้ \u003ci\u003eChatGPT Sidebar API\u003c/i\u003e เพื่อเข้าถึงได้อย่างเสถียร (สำหรับทุกคน)\",\"errTrySiderAPI2\":\"หรือใช้คีย์ API ของคุณเองใน \u003ca\u003eหน้าการตั้งค่า\u003c/a\u003e (สำหรับนักพัฒนาซอฟต์แวร์)\",\"error1139_1\":\"ขอบคุณที่ใช้แผนไม่จำกัด! คุณยังคงสามารถใช้โมเดล AI ขั้นสูงได้ อย่างไรก็ตาม คุณได้ถึงขีดจำกัดความเร็วชั่วคราวแล้ว \u003ca\u003eนี่คือเหตุผลว่าทำไมถึงมีขีดจำกัดความเร็วและเรากำลังพยายามช่วยคุณอย่างไร\u003c/a\u003e โปรด \u003cmx\u003eอ่านมัน\u003c/mx\u003e.\",\"error1139_1_2\":\"ขอบคุณที่ใช้แผนไม่จำกัด! คุณยังคงสามารถใช้โมเดล AI ขั้นสูงได้ อย่างไรก็ตาม คุณได้ถึงขีดจำกัดความเร็วชั่วคราวและใช้คำถามขั้นสูงพิเศษทั้งหมดแล้ว นี่คือ \u003ca\u003eเหตุผลว่าทำไมถึงมีขีดจำกัดความเร็วและเรากำลังพยายามช่วยคุณอย่างไร\u003c/a\u003e โปรด \u003cmx\u003eอ่านมัน\u003c/mx\u003e.\",\"error1139_1_3\":\"ขอบคุณที่ใช้แผนไม่จำกัด! คุณยังคงสามารถใช้โมเดล AI ขั้นสูงได้ อย่างไรก็ตาม คุณได้ถึงขีดจำกัดความเร็วชั่วคราวและใช้คำถามขั้นสูงของขวัญทั้งหมดแล้ว นี่คือ \u003ca\u
