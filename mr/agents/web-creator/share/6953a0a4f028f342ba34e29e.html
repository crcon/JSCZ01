ण्यासाठी कृपया अपग्रेड करा.\",\"team-user-credit-limit\":\"आपण आपल्या सर्व क्रेडिट्सचा वापर केला आहे. अधिक मिळविण्यासाठी कृपया आपल्या टीम मालकाला अपग्रेड करण्यास सांगा.\",\"basic-credit-limit\":\"तुमचे मूलभूत क्रेडिट्स संपले आहेत. अधिक मिळवण्यासाठी अपग्रेड करा.\",\"advanced-credit-limit\":\"तुमचे प्रगत क्रेडिट्स संपले आहेत. अधिक मिळवण्यासाठी अपग्रेड करा.\",\"unlimited-advanced-credit-limit\":\"वैशिष्ट्य प्रवेश मर्यादा गाठली आहे. हे वैशिष्ट्य तेव्हा उपलब्ध आहे जेव्हा मासिक प्रगत क्रेडिट्स 1500 पेक्षा कमी वापरले जातात (बूस्टर पॅक क्रेडिट्स वगळले आहेत). पुढे जाण्यासाठी, कृपया बूस्टर पॅक खरेदी करा.\",\"elite-credit-limit\":\"तुमचे एलिट क्रेडिट्स संपले आहेत. अधिक मिळवण्यासाठी अपग्रेड करा.\",\"unlimited-elite-credit-limit\":\"आपले एलिट क्रेडिट्स संपले आहेत. आपल्या क्रेडिट्स रीसेट झाल्यानंतर आपण पुढील महिन्यात पुन्हा प्रयत्न करू शकता.\",\"try-these\":\"हे प्रयत्न करा:\",\"intelligence\":\"बुद्धिमत्ता\",\"cost\":\"खर्च\",\"model-no-image\":\"सध्याचा मोड प्रतिमा समजून घेण्यास समर्थन देत नाही\",\"model-desc-free\":\"मूलभूत क्रेडिट गतिशील बिलिंग वापरून, दैनंदिन कार्यांसाठी योग्य.\",\"model-desc-advanced\":\"एलिट क्रेडिट गतिशील बिलिंग वापरून, जटिल आणि पूर्ण प्रकल्पांसाठी योग्य.\",\"preset-create-prompt\":[{\"name\":\"वैयक्तिक मुखपृष्ठ\",\"prompt\":\"स्वतःची ओळख, कौशल्य प्रदर्शन, प्रकल्प पोर्टफोलिओ, आणि संपर्क माहिती यांचा समावेश असलेले आधुनिक वैयक्तिक मुखपृष्ठ तयार करा. डिझाइन आवश्यकता: साधे आधुनिक शैली, गडद थीम, गुळगुळीत स्क्रोलिंग अ‍ॅनिमेशन.\"},{\"name\":\"कंपनी वेबसाइट\",\"prompt\":\"मुखपृष्ठ प्रदर्शन, उत्पादने आणि सेवा, आमच्याबद्दल, उपाय, आणि संपर्क पृष्ठे यांचा समावेश असलेली व्यावसायिक तंत्रज्ञान कंपनी वेबसाइट डिझाइन करा. दृश्य शैली: व्यावसायिक, निळा टोन, विश्वास आणि व्यावसायिकतेवर भर देणारी.\"},{\"name\":\"ई-कॉमर्स प्लॅटफॉर्म\",\"prompt\":\"उत्पादन प्रदर्शन, शॉपिंग कार्ट, वापरकर्ता प्रणाली, ऑर्डर व्यवस्थापन, आणि पेमेंट प्रक्रिया यांचा समावेश असलेली संपूर्ण ई-कॉमर्स शॉपिंग वेबसाइट विकसित करा. डिझाइन आवश्यकता: वापरकर्ता-अनुकूल अनुभव, स्पष्ट दृश्य श्रेणी, मोबाइल प्रतिसादक्षम.\"},{\"name\":\"ब्लॉग प्रणाली\",\"prompt\":\"लेख प्रकाशन, श्रेणी टॅग, टिप्पणी कार्यक्षमता, आणि वापरकर्ता व्यवस्थापन समर्थन करणारी वैयक्तिक ब्लॉग वेबसाइट तयार करा. इंटरफेस शैली: स्वच्छ वाचन अनुभव, प्रतिसादक्षम डिझाइन, गडद/प्रकाश थीम टॉगल.\"},{\"name\":\"डॅशबोर्ड\",\"prompt\":\"डेटा सांख्यिकी चार्ट, वापरकर्ता व्यवस्थापन, प्रणाली सेटिंग्ज, आणि वैयक्तिक केंद्र यांचा समावेश असलेला व्यवस्थापन डॅशबोर्ड तयार करा. इंटरफेस शैली: आधुनिक फ्लॅट डिझाइन, साइडबार नेव्हिगेशन, गडद/प्रकाश थीम स्विचिंग.\"},{\"name\":\"ऑनलाइन शिक्षण प्लॅटफॉर्म\",\"prompt\":\"कोर्स प्रदर्शन, व्हिडिओ प्लेबॅक, शिक्षण प्रगती, प्रशिक्षक व्यवस्थापन, आणि समुदाय वैशिष्ट्यांचा समावेश असलेला ऑनलाइन शिक्षण प्लॅटफॉर्म तयार करा. तांत्रिक आवश्यकता: गुळगुळीत व्हिडिओ प्लेबॅक, प्रगती ट्रॅकिंग, मल्टी-डिव्हाइस सिंक.\"},{\"name\":\"रेस्टॉरंट वेबसाइट\",\"prompt\":\"मेनू प्रदर्शन, ऑनलाइन आरक्षण, रेस्टॉरंट परिचय, आणि स्थान माहिती यांचा समावेश असलेली प्रीमियम रेस्टॉरंट वेबसाइट डिझाइन करा. डिझाइन शैली: उबदार आणि मोहक, खाद्य फोटोग्राफी, उबदार रंग, गुणवत्ता हायलाइट करणारी.\"},{\"name\":\"जिम व्यवस्थापन प्रणाली\",\"prompt\":\"सदस्य व्यवस्थापन, वर्ग बुकिंग, प्रशिक्षक प्रणाली, आणि उपकरण व्यवस्थापन यांचा समावेश असलेली जिम व्यवस्थापन प्रणाली विकसित करा. मुख्य वैशिष्ट्ये: QR कोड चेक-इन, फिटनेस ट्रॅकिंग, वर्कआउट योजना निर्मिती.\"},{\"name\":\"पोर्टफोलिओ वेबसाइट\",\"prompt\":\"डिझायनर पोर्टफोलिओ वेबसाइट ज्यामध्ये प्रकल्प प्रदर्शन, डिझाइन तत्त्वज्ञान, कार्यप्रवाह, आणि ग्राहकांच्या प्रशंसापत्रांचा समावेश आहे. दृश्य प्रभाव: सर्जनशील लेआउट, उच्च-गुणवत्तेचे प्रतिमा प्रदर्शन, परस्परसंवादी अॅनिमेशन्स.\"},{\"name\":\"बातम्या पोर्टल\",\"prompt\":\"लेख सूची, श्रेणी फिल्टरिंग, शोध कार्यक्षमता, आणि ट्रेंडिंग शिफारसींचा समावेश असलेली बातम्या वेबसाइट तयार करा. डिझाइन आवश्यकता: स्पष्ट माहिती आर्किटेक्चर, जलद लोडिंग, उत्कृष्ट वाचन अनुभव.\"},{\"name\":\"सामाजिक मीडिया प्लॅटफॉर्म\",\"prompt\":\"पोस्ट प्रकाशन, फॉलो सिस्टम, मेसेजिंग चॅट, आणि वापरकर्ता प्रोफाइल्सचा समावेश असलेली सामाजिक मीडिया अॅप्लिकेशन विकसित करा. परस्परसंवादी वैशिष्ट्ये: लाईक्स आणि टिप्प
