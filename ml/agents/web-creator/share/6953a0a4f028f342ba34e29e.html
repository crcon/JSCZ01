 കോഡ് ഉൾപ്പെടെ) GitHub/GitLab-ലേക്ക് പുഷ് ചെയ്യുക\n2. നിങ്ങളുടെ റീപോ Vercel/Netlify-യുമായി ബന്ധിപ്പിക്കുക\n3. നിർമ്മാണ ക്രമീകരണങ്ങൾ കോൺഫിഗർ ചെയ്യുക:\n   - നിർമ്മാണ കമാൻഡ്: npm run build\n   - പ്രസിദ്ധീകരണ ഡയറക്ടറി: dist\n   - Node.js പതിപ്പ്: 16.x അല്ലെങ്കിൽ അതിനുമുകളിലേത്\n4. ഓരോ പുഷും നിർമ്മാണവും വിന്യാസവും സ്വയമേവ ആരംഭിക്കും\n\nപരമ്പരാഗത സെർവർ വിന്യാസം\nനിങ്ങൾക്ക് നിങ്ങളുടെ സ്വന്തം സെർവർ ഉണ്ടെങ്കിൽ:\n1. dist/ ഡയറക്ടറിയിലെ എല്ലാ ഫയലുകളും നിങ്ങളുടെ സെർവറിന്റെ വെബ് റൂട്ടിലേക്ക് അപ്ലോഡ് ചെയ്യുക\n2. സെർവർ സ്റ്റാറ്റിക് ഫയൽ ഹോസ്റ്റിംഗ് പിന്തുണയ്ക്കുന്നുണ്ടെന്ന് ഉറപ്പാക്കുക\n3. നിങ്ങളുടെ ഡൊമെയ്ൻ വഴി നിങ്ങളുടെ വെബ്സൈറ്റ് ആക്സസ് ചെയ്യുക\n\n---\n\n💰 വില വിവരങ്ങൾ:\n- Vercel: വ്യക്തിഗത ഉപയോഗത്തിന് സൗജന്യ പ്ലാൻ മതിയാകും\n- Cloudflare Pages: പൂർണ്ണമായും സൗജന്യം, പരിധികളില്ല\n- Netlify: സൗജന്യ പ്ലാൻ 100GB ബാൻഡ്വിഡ്ത്ത്/മാസം ഉൾക്കൊള്ളുന്നു\n- GitHub Pages: പൂർണ്ണമായും സൗജന്യം, 100GB ബാൻഡ്വിഡ്ത്ത്/മാസം\n\n---\n\n🎯 ശുപാർശകൾ:\n- തുടക്കക്കാർ: Vercel അല്ലെങ്കിൽ Netlify (ഡ്രാഗ്-ആൻഡ്-ഡ്രോപ്പ് അപ്ലോഡ്)\n- വേഗത-കേന്ദ്രിതം: Cloudflare Pages\n- ദീർഘകാല പ്രോജക്റ്റുകൾ: GitHub Pages\n- ഡെവലപ്പർമാർ: Git അടിസ്ഥാനത്തിലുള്ള ഓട്ടോ വിന്യാസം\n\n---\n\n⚡ നിർദ്ദേശങ്ങൾ:\n- എല്ലാ പ്ലാറ്റ്ഫോമുകളും സൗജന്യ HTTPS സർട്ടിഫിക്കറ്റുകൾ നൽകുന്നു\n- നിങ്ങൾക്ക് ഇഷ്ടാനുസൃത ഡൊമെയ്ൻ ബൈൻഡ് ചെയ്യാം (ചിലത് പെയ്ഡ് പ്ലാനുകൾ ആവശ്യപ്പെടുന്നു)\n- വിന്യാസത്തിന് ശേഷം, വ്യത്യസ്ത ഉപകരണങ്ങളിൽ നിങ്ങളുടെ വെബ്സൈറ്റ് പരിശോധിക്കുക\n\n---\n\n🆘 പ്രശ്ന പരിഹാരം:\n1. നിങ്ങൾ dist/യുടെ ഉള്ളടക്കം അപ്ലോഡ് ചെയ്യുന്നതാണെന്ന് ഉറപ്പാക്കുക, മുഴുവൻ പ്രോജക്റ്റ് അല്ല\n2. index.html റൂട്ട് ഡയറക്ടറിയിൽ ഉണ്ടെന്ന് പരിശോധിക്കുക\n3. ഹോസ്റ്റിംഗ് പ്ലാറ്റ്ഫോമിലെ പിശക് ലോഗുകൾ പരിശോധിക്കുക\n4. എല്ലാ ഫയലുകളും ശരിയായി അപ്ലോഡ് ചെയ്തിട്ടുണ്ടെന്ന് ഉറപ്പാക്കുക"])</script><script>self.__next_f.push([1,"21:{\"name\":\"വ്യക്തിഗത ഹോംപേജ്\",\"prompt\":\"സ്വയം പരിചയം, കഴിവുകളുടെ പ്രദർശനം, പ്രോജക്റ്റ് പോർട്ട്ഫോളിയോ, ബന്ധപ്പെടാനുള്ള വിവരങ്ങൾ എന്നിവ ഉൾപ്പെടുന്ന ആധുനിക വ്യക്തിഗത ഹോംപേജ് സൃഷ്ടിക്കുക. ഡിസൈൻ ആവശ്യകതകൾ: മിനിമലിസ്റ്റ് ആധുനിക ശൈലി, ഇരുണ്ട തീം, മൃദുവായ സ്ക്രോളിംഗ് അനിമേ  കാത്തിരിക്കുക\n4. നിങ്ങൾക്ക് ഒരു റാൻഡം ഡൊമെയ്ൻ ലഭിക്കും (സെറ്റിംഗ്സിൽ ഇഷ്ടാനുസൃതമാക്കാം)\n\n📘 GitHub Pages (pages.github.com) – സൗജന്യവും വിശ്വസനീയവും\n1. GitHub-ൽ ഒരു പുതിയ റീപോസിറ്ററി സൃഷ്ടിക്കുക\n2. dist/ ഫോൾഡറിന്റെ ഉള്ളടക്കം റീപോയിലേക്ക് അപ്ലോഡ് ചെയ്യുക\n3. റീപോസിറ്ററി സെറ്റിംഗ്സിലേക്ക് പോകുക → പേജുകൾ\n4. \"Deploy from a branch\" → മെയിൻ ബ്രാഞ്ച് തിരഞ്ഞെടുക്കുക\n5. നിങ്ങളുടെ സൈറ്റ് username.github.io/repository-name-ൽ ആക്സസ് ചെയ്യുക\n\n---\n\n🔧 വികസിത വിന്യാസം (ഡെവലപ്പർമാർക്കായി):\n\nGit അടിസ്ഥാനത്തിലുള്ള ഓട്ടോ വിന്യാസം\n1. മുഴുവൻ പ്രോജക്റ്റും (സോഴ്സ് കോഡ് ഉൾപ്പെടെ) GitHub/GitLab-ലേക്ക് പുഷ് ചെയ്യുക\n2. നിങ്ങളുടെ റീപോ Vercel/Netlify-യുമായി ബന്ധിപ്പിക്കുക\n3. നിർമ്മാണ ക്രമീകരണങ്ങൾ കോൺഫിഗർ ചെയ്യുക:\n   - നിർമ്മാണ കമാൻഡ്: npm run build\n   - പ്രസിദ്ധീകരണ ഡയറക്ടറി: dist\n   - Node.js പതിപ്പ്: 16.x അല്ലെങ്കിൽ അതിനുമുകളിലേത്\n4. ഓരോ പുഷും നിർമ്മാണവും വിന്യാസവും സ്വയമേവ ആരംഭിക്കും\n\nപരമ്പരാഗത സെർവർ വിന്യാസം\nനിങ്ങൾക്ക് നിങ്ങളുടെ സ്വന്തം സെർവർ ഉണ്ടെങ്കിൽ:\n1. dist/ ഡയറക്ടറിയിലെ എല്ലാ ഫയലുകളും നിങ്ങളുടെ സെർവറിന്റെ വെബ് റൂട്ടിലേക്ക് അപ്ലോഡ് ചെയ്യുക\n2. സെർവർ സ്റ്റാറ്റിക് ഫയൽ ഹോസ്റ്റിംഗ് പിന്തുണയ്ക്കുന്നുണ്ടെന്ന് ഉറപ്പാക്കുക\n3. നിങ്ങളുടെ ഡൊമെയ്ൻ വഴി നിങ്ങളുടെ വെബ്സൈറ്റ് ആക്സസ് ചെയ്യുക\n\n---\n\n💰 വില വിവരങ്ങൾ:\n- Vercel: വ്യക്തിഗത ഉപയോഗത്തിന് സൗജന്യ പ്ലാൻ മതിയാകും\n- Cloudflare Pages: പൂർണ്ണമായും സൗജന്യം, പരിധികളില്ല\n- Netlify: സൗജന്യ പ്ലാൻ 100GB ബാൻഡ്വിഡ്ത്ത്/മാസം ഉൾക്കൊള്ളുന്നു\n- GitHub Pages: പൂർണ്ണമായും സൗജന്യം, 100GB ബാൻഡ്വിഡ്ത്ത്/മാസം\n\n---\n\n🎯 ശുപാർശകൾ:\n- തുടക്കക്കാർ: Vercel അല്ലെങ്കിൽ Netlify (ഡ്രാഗ്-ആൻഡ്-ഡ്രോപ്പ് അപ്ലോഡ്)\n- വേഗത-കേന്ദ്രിതം: Cloudflare Pages\n- ദീർഘകാല പ്രോജക്റ്റുകൾ: GitHub Pages\n- ഡെവലപ്പർമാർ: Git അടിസ്ഥാനത്തിലുള്ള ഓട്ടോ വിന്യാസം\n\n---\n\n⚡ നിർദ്ദേശങ്ങൾ:\n- എല്ലാ പ്ലാറ്റ്ഫോമുകളും സൗജന്യ HTTPS സർട്ടിഫിക്കറ്റുകൾ നൽകുന്നു\n- നിങ്ങൾക്ക് ഇഷ്ടാനുസൃത ഡൊമെയ്ൻ ബൈൻഡ് ചെയ്യാം (ചിലത് പെയ്ഡ് പ്ലാനുകൾ ആവശ്യപ്പെടുന്നു)\n- വിന്യാസത്തിന് ശേഷം, വ്യത്യസ്ത ഉപകരണങ്ങളിൽ നിങ്ങളുടെ വെബ്സൈറ്റ് പരിശോധിക്കുക\n\n---\n\n🆘 പ്രശ്ന പരിഹാരം:\n1. നിങ്ങൾ dist/യുടെ ഉള്ളടക ീക്കം ചെയ്യാൻ ആഗ്രഹിക്കുന്ന ബ്രഷ് ഏരിയകൾ.\",\"remove-background\":\"അവിശ്വസനീയമായ കൃത്യതയോടെ ഒരു ചിത്രത്തിൽ നിന്ന് പ്രധാന വിഷയം വേർതിരിച്ചെടുക്കുക.\",\"remove-text\":\"ഏതെങ്കിലും ചിത്രത്തിൽ നിന്ന് വാചകം നീക്കം ചെയ്യുക.\",\"replace-background\":\"AI ഉപയോഗിച്ച് എവിടെയും എന്തും ടെലിപോർട്ട് ചെയ്യുക.\",\"upscale\":\"നിങ്ങളുടെ ചിത്രങ്ങൾ സെക്കൻഡുകൾക്കുള്ളിൽ ഉയർത്തുക.\",\"upscaling\":\"സെക്കന്റുകൾ കൊണ്ട് നിങ്ങളുടെ ചിത്രം 2X അല്ലെങ്കിൽ 4X കൊണ്ട് ഉയർത്തുക.\",\"inpainting\":\"പുനരാഖ്യായനത്തിനുള്ള AI-ശക്തിയുള്ള മഞ്ഞു വിവരണം.\"},\"toolsNames\":{\"painter\":\"എൽ ഇമേജ് ജനറേറ്റർ\",\"rmBg\":\"പശ്ചാത്തല നീക്കികൾ\",\"rmText\":\"ടെക്സ്റ്റ് നീക്കംചെയ്തൽ\",\"rmBrush\":\"ഫോട്ടോ എറേസർ\",\"upscale\":\"ചിത്രം ഉയർത്തൽ\",\"rpBg\":\"പിന്‍ഭാഗം മാറ്റുന്ന ഉപകരണം\",\"inpaint\":\"ഇൻപെയിന്റ്\",\"textTranslator\":\"AI വിവർത്തകൻ\",\"imageTranslator\":\"ചിത്ര വിവർത്തകൻ\",\"shortenVideo\":\"എഐ വീഡിയോ ഷോർട്ടണർ\",\"writer\":\"എഐ എഴുത്തുകാരൻ\"}}},\"chatbox\":{\"tools\":{\"artifacts\":{\"demos\":{\"0\":{\"title\":\"ഒരു വെർച്വൽ സൈലോഫോൺ സൃഷ്ടിക്കുക\",\"value\":\"{ARTIFACT}-ൽ നിറമുള്ള കീകളുള്ള HTML അടിസ്ഥാനത്തിലുള്ള സൈലോഫോൺ സൃഷ്ടിക്കുക. അടിച്ച കീകൾക്കായി ദൃശ്യ ഫീഡ്‌ബാക്ക് നൽകുക, കൂടാതെ ഫ്രീക്വൻസി പാരാമീറ്ററുകൾ അടിസ്ഥാനമാക്കി വെബ് ഓഡിയോ API ഉപയോഗിച്ച് ലളിതമായ, യാഥാർത്ഥ്യശീലമുള്ള ശബ്ദങ്ങൾ സൃഷ്ടിക്കുക. അടിസ്ഥാന നിർദ്ദേശങ്ങൾ ഉൾപ്പെടുത്തുക.\"},\"1\":{\"title\":\"ഒരു ഭക്ഷണത്തെ കഴിക്കുന്ന ഇമോജി ഗെയിം സൃഷ്ടിക്കുക\",\"value\":\"{ARTIFACT}-ൽ കാച്ച് ദ കാൻഡി പോലുള്ള ഒരു ലളിതമായ HTML അടിസ്ഥാനത്തിലുള്ള ഗെയിം സൃഷ്ടിക്കുക. കളിക്കാരൻ സ്ക്രീന്റെ താഴെ ഒരു ഇമോജിയെ നിയന്ത്രിക്കുന്നു, മുകളിൽ നിന്ന് വീഴുന്ന ഭക്ഷണ വസ്തുക്കൾ (ഉദാഹരണത്തിന്, 🍓, 🍔, 🍎) പിടിക്കാൻ ഇടത്തേക്ക് വേഗത്തിൽ ഇടത്തേക്ക് നീക്കുന്നു, ബോംബുകൾ (💣) ഒഴിവാക്കുന്നു. ഓരോ തവണയും കളിക്കാരൻ ഒരു ഭക്ഷണ ഇമോജി പിടിച്ചാൽ, അവരുടെ ഇമോജി കൂടുതൽ അതിശയകരമായ പോസിറ്റീവ് പ്രകടനത്തിലേക്ക് മാറും (ഉദാഹരണത്തിന്, 🤩, 😆, 😋) വിജയത്തെ സൂചിപ്പിക്കാൻ. കളിക്കാരൻ ബോംബ് പിഴവായി പിടിച്ചാൽ, ഇമോജി ആദ്യം ഒരു പൊട്ടിത്തെറിക്കൽ (💥) കാണിക്കും, പിന്നീട് ഒരു മയക്കം പ്രകടനം (😵‍💫) ആയി മാറും.\"},\"2\":{\"title\":\"ഒരു സ്മാർട്ട്‌ഫോൺ ഷിപ്പ്മെന്റ് ചാർട്ട് സൃഷ്ടിക്കുക\",\"value\":\"React ഉപയോഗിച്ച് താഴെ കൊടുത്തിരിക്കുന്ന പട്ടികയുടെ അടിസ്ഥാനത്തിൽ ഒരു മനോഹരമായ ലൈന്ചാർട്ട് ഒരു {ARTIFACT}-ൽ സൃഷ്ടിക്കുക.\\n------\\n\\nകഴിഞ്ഞ ദശകത്തിൽ പ്രധാന ബ്രാൻഡുകളുടെ സ്മാർട്ട്ഫോൺ ഷിപ്പ്മെന്റുകൾ (ബില്ല്യണുകളിൽ)\\n\\n| വർഷം | Samsung | Apple | Huawei | Xiaomi | OPPO |\\n|------|---------|-------|--------|--------|------|\\n| 2014 | 3.24 | 1.76 | 0.75 | 0.50 | 0.40 |\\n| 2015 | 3.36 | 2.00 | 1.00 | 1.00 | 0.80 |\\n| 2016 | 3.43 | 2.16 | 1.40 | 1.50 | 1.20 |\\n| 2017 | 3.20 | 2.10 | 1.60  | 2.00 | 1.50 |\\n| 2018 | 2.94 | 2.20 | 1.70 | 2.50 | 1.80 |\\n| 2019 | 3.00 | 2.50 | 2.20 | 3.00 | 2.00 |\\n| 2020 | 2.80 | 2.80 | 2.50 | 4.00 | 3.00 |\\n| 2021 | 2.90 | 2.90 | 2.00 | 4.50 | 3.50 |\\n| 2022 | 2.60 | 2.25 | 1.60 | 3.50 | 3.00 |\\n| 2023 | 2.26 | 2.34 | 1.20 | 3.00 | 3.50 |\"}},\"desc\":\"വെബ് പേജുകൾ അല്ലെങ്കിൽ ഫ്ലോചാർട്ടുകൾ പോലുള്ള ഉള്ളടക്കം എളുപ്പത്തിൽ സൃഷ്ടിക്കുകയും അവതരിപ്പിക്കുകയും ചെയ്യുക. യഥാർത്ഥ സമയ ഇടപെടലുകളും ശ്രദ്ധ കേന്ദ്രീകരിച്ചുള്ള പ്രവർത്തനസ്ഥലവും ഉപയോഗിച്ച് ഉൽപ്പാദനക്ഷമത വർദ്ധിപ്പിക്കുക.\",\"name\":\"ഒരു പുതിയ വിൻഡോയിൽ ഉള്ളടക്കം (ഉദാ: വെബ് പേജുകൾ, ഫ്ലോചാർട്ടുകൾ) സൃഷ്ടിക്കുകയും പ്രദർശിപ്പിക്കുകയും ചെയ്യുക.\"},\"data_analysis\":{\"demos\":{\"0\":{\"title\":\"ഫയൽ ഡാറ്റ വായിച്ച് വിവിധ ചെലവു ബജറ്റുകളുടെ അനുപാതം കാണിക്കുന്ന ഒരു പൈ ചാർട്ട് സൃഷ്ടിക്കുക.\",\"value\":\"ഫയൽ ഡാറ്റ വായിച്ച് വിവിധ ചെലവു ബജറ്റുകളുടെ അനുപാതം കാണിക്കുന്ന ഒരു പൈ ചാർട്ട് സൃഷ്ടിക്കുക.\"}},\"desc\":\"വ്യത്യസ്ത ഫോർമാറ്റുകളിലുടനീളം പ്രവർത്തനങ്ങൾ ലളിതമാക്കുന്നതിനായി, ഉയർന്ന ഗണിതം, സ്ഥിതിവിവരശാസ്ത്രം, മെഷീൻ ലേണിംഗ്, ഡാറ്റ പ്രോസസ്സിംഗ് എന്നിവയ്ക്കായി യഥാർത്ഥ സമയത്ത് Python കോഡ് പ്രവർത്തിപ്പിക്കുക.\",\"name\":\"ഡാറ്റാ വിശകലനം\"},\"search\":{\"demos\":{\"0\":{\"title\":\"\",\"value\":\"ഇപ്പോൾ യു.എസ്. തിയേറ്ററുകളിൽ ഏറ്റവും ഉയർന്ന റേറ്റിംഗ് ലഭിച്ച സിനിമകൾ എന്തൊക്കെയാണ്?\"},\"1\":{\"title\":\"\",\"value\":\"ഇന്ന് ശ്രദ്ധേയമായ വർദ്ധനവ് അനുഭവിച്ച സ്റ്റോകുകൾ ഏവയാണ്?\"},\"2\":{\"title\":\"\",\"value\":\"ഇന്ന് പുറത്തിറങ്ങിയ ഏറ്റവും ശ്രദ്ധേയമായ പുതിയ ഇലക്ട്രോണിക് ഉൽപ്പന്നം എന്താണ്?\"}},\"desc\":\"മുൻകൂട്ടി പരിശീലിപ്പിച്ച ഡാറ്റയ്ക്ക് അതീതമായി യഥാർത്ഥ സമയത്തിൽ洞വിവരങ്ങൾ നേടുക, നിലവിലെ സംഭവങ്ങൾ, അടിയന്തര വാർത്തകൾ, വികസിക്കുന്ന വിഷയങ്ങൾ എന്നിവയ്ക്ക് കൃത്യവും സമയബന്ധിതവുമായ പ്രതികരണങ്ങൾ ഉറപ്പാക്കുക.\",\"name\":\"തിരയുക\"},\"text_to_image\":{\"demos\":{\"0\":{\"title\":\"\",\"value\":\"ഒരു ഭാവി പറക്കുന്ന കാറിന്റെ രൂപകൽപ്പന ചെയ്യുക.\"},\"1\":{\"title\":\"\",\"value\":\"മണ്ണിൽ ഓടുന്ന ഒരു ഗോൾഡൻ റിട്രീവർ സ്കെച്ച് ചെയ്യുക.\"},\"2\":{\"title\":\"\",\"value\":\"ഒരു പ്രായമായ സ്ത്രീ സുഖമായി കാപ്പി കുടിക്കുന്നു.\"}},\"desc\":\"നിങ്ങളുടെ മനസ്സിലുള്ളത് വെളിപ്പെടുത്തുക, ഉയർന്ന നിലവാരമുള്ള ചിത്രങ്ങൾ ഉടൻ സൃഷ്ടിക്കുക. ഡിസൈൻ കഴിവുകൾ ആവശ്യമില്ല – നിങ്ങളുടെ സൃഷ്ടിപരത മാത്രം.\",\"name\":\"ഇമേജ് ജനറേറ്റ് ചെയ്യുക\"},\"thinking_mode\":{\"demos\":{\"0\":{\"title\":\"\",\"value\":\"9.11 അല്ലെങ്കിൽ 9.8, ഏതാണ് വലുത്\"},\"1\":{\"title\":\"\",\"value\":\"'സിക്‌സ് ഡിഗ്രീസ് ഓഫ് സെപ്പറേഷൻ' സിദ്ധാന്തത്തെ മോഡൽ ചെയ്യാൻ ഒരു ഫംഗ്ഷൻ ചിന്തിച്ച് എഴുതുക. ഒരു സോഷ്യൽ നെറ്റ്‌വർക്കിനെ ഗ്രാഫായി കണക്കാക്കി, ഏതെങ്കിലും രണ്ട് ആളുകൾക്കിടയിലെ ഏറ്റവും ചുരുങ്ങിയ പാത കണ്ടെത്തുക.\"}},\"desc\":\"DeepSeek R1 ന്റെ ശക്തമായ തർക്കശേഷി ഉപയോഗിച്ച് ഏതെങ്കിലും ചാറ്റ് മോഡലിനെ മെച്ചപ്പെടുത്തുക. ഇത് സജീവമാക്കിയാൽ, നിങ്ങളുടെ തിരഞ്ഞെടുക്കപ്പെട്ട മോഡൽ R1 ന്റെ Chain of Thought പ്രോസസ്സിംഗ് പ്രാപ്തമാക്കുകയും സങ്കീർണ്ണമായ ചോദ്യങ്ങൾക്ക് കൂടുതൽ കൃത്യവും തർക്കാത്മകവുമായ洞വിവരങ്ങൾ നൽകുകയും ചെയ്യും. ഓരോ ചോദ്യത്തിനും 1 അധിക ക്രെഡിറ്റ് ചെലവാകും.\",\"name\":\"ചിന്തിക്കുക ({NAME})\"},\"create_image\":{\"name\":\"ഇമേജ്\",\"desc\":\"നിങ്ങൾക്ക് ആവശ്യമുള്ളത് വിവരണം നൽകുക മാത്രമല്ല, ഉയർന്ന നിലവാരത്തിലുള്ള ചിത്രങ്ങൾ സൃഷ്ടിക്കുക. ടെക്സ്റ്റ് വിവരണങ്ങളിൽ നിന്ന് പുതിയ ചിത്രങ്ങൾ സൃഷ്ടിക്കുക, അല്ലെങ്കിൽ ടെക്സ്റ്റ് പ്രോംപ്റ്റുകൾ ഉപയോഗിച്ച് നിലവിലുള്ള ചിത്രങ്ങൾ മാറ്റം വരുത്തുക. നമ്മുടെ ഉപകരണം നിങ്ങളുടെ ആശയങ്ങളെ ഉടൻ ജീവൻ നൽകുന്നു.\",\"demos\":[],\"toolName\":\"ചിത്രം സൃഷ്ടിക്കുക\"}},\"auto\":\"ഓട്ടോ\",\"summarize\":\"സംഗഹിക്കുക\",\"describeImage\":\"ഈ ചിത്രം വിവരിക്കുക\",\"attention\":\"ശ്രദ്ധിക്കുക\",\"upgr പ്രവർത്തനങ്ങളിലും മനുഷ്യനും പൊതുവേ അനുഭവപ്പെടുന്നുവെന്ന് കാണിക്കുന്നു.\",\"claude-3-sonnet\":\"Anthropic യുടെ സമത്വം മനോഹരമായ മോഡൽ, ബുദ്ധിമുട്ടും വേഗത്തെക്കുറിച്ച് അത്യാവശ്യമായ ടാസ്കുകളിലേക്ക് ആദർശമാണ്.\",\"claude-3\":{\"5-sonnet\":\"Anthropicന്റെ ഏറ്റവും പുതിയ മോഡൽ, Claude 3 Opusനെക്കാൾ ഇരട്ട വേഗതയും ഉയർന്ന ബുദ്ധിയും നൽകുന്നു, നിരൂപണം, അറിവ്, കോഡിംഗ്, ദൃശ്യ പ്രവർത്തനങ്ങൾ എന്നിവയിൽ ഗണ്യമായ മെച്ചപ്പെടുത്തലുകൾ.\"},\"claude-instant\":\"ആന്ത്രോപിക്, കുറഞ്ഞ ലേറ്റൻസി, ഉയർന്ന ത്രൂപുട്ട് ഉപയോഗ കേസുകളിൽ നിന്നുള്ള അടിസ്ഥാന മോഡൽ.\",\"claude2\":\"സങ്കീർണ്ണമായ ന്യായവാദം ആവശ്യമുള്ള ടാസ്‌ക്കുകളിലെ മികച്ച പ്രകടനം, ആന്ത്രോപിക്കിൽ നിന്നുള്ള മികച്ച ഇൻ-ക്ലാസ് ഓഫർ മോഡൽ.\",\"gemini-1\":{\"5-flash\":\"വേഗതയിലും കാര്യക്ഷമതയിലും മികച്ചതായി ഒപ്റ്റിമൈസ് ചെയ്ത Google-ന്റെ ലൈറ്റ്‌വെയ്റ്റ് മോഡൽ.\",\"5-pro\":\"വ്യാപകമായ പലവിധ ടാസ്കുകളിൽ മെച്ചപ്പെട്ട പ്രകടനത്തിനായി Google-ന്റെ മികച്ച മോഡൽ.\"},\"gemini-pro\":\"Google ന്റെ ഏറ്റവും സന്തുലിതമായ മോഡൽ, കഴിവും കാര്യക്ഷമതയും പൂർണ്ണമായി സമ്മിശ്രണം ചെയ്തത്.\",\"gpt-3\":{\"5\":\"വളരെ വേഗം, മിക്ക ദൈനംദിന ജോലികൾക്കും മികച്ചത്.\"},\"gpt-4\":\"ഏറ്റവും കഴിവുള്ള മോഡൽ, വിപുലമായ ന്യായവാദം ആവശ്യമുള്ള സങ്കീർണ്ണമായ ജോലികൾക്ക് മികച്ചത്.\",\"gpt-4o\":\"OpenAI-യുടെ മികച്ച മോഡൽ, ഗുണനിലവാരം നിലനിർത്തിക്കൊണ്ട് സങ്കീർണ്ണമായ ജോലികൾക്കായി ഏറ്റവും അനുയോജ്യം.\",\"gpt-4o-mini\":\"OpenAI-യുടെ ഏറ്റവും പുതിയ മോഡൽ, ചാറ്റ്, കോഡിംഗ്, reasoning ജോലികൾക്കായി വേഗതയേറിയ, ഉന്നത പ്രകടനം നൽകുന്നു.\",\"gpt-5\":\"OpenAI ന്റെ ഏറ്റവും പുതിയ മോഡൽ, ഗുണനിലവാരം പാലിച്ചുകൊണ്ട് സങ്കീർണ്ണ ചുമതലകൾക്ക് ഉത്തമം.\",\"llama-3\":\"Meta-ന്റെ ഏറ്റവും പുതിയ മോഡൽ, ഗുണനിലവാരം പാലിച്ചുകൊണ്ട് സങ്കീർണ്ണ ചുമതലകൾക്ക് ഉത്തമം.\",\"sider\":\"{SIDER} സജീവമായി GPT-4o mini, Claude 3 Haiku, Gemini 1.5 Flash, അല്ലെങ്കിൽ Llama 3 തിരഞ്ഞെടുക്കുന്നു, സാഹചര്യത്തിന്റെ അടിസ്ഥാനത്തിൽ മികച്ച പ്രതികരണങ്ങൾക്കായി.\"},\"modelCountTip\":{\"gpt-3\":{\"5\":\"ചെലവ് \u003cm\u003e1 അടിസ്ഥാന ക്രെഡിറ്റ്\u003c/m\u003e.\",\"5-n_one\":\"ചെലവ് \u003cm\u003e{count} അടിസ്ഥാന ക്രെഡിറ്റ്\u003c/m\u003e.\",\"5-n_other\":\"ചെലവ് \u003cm\u003e{count} അടിസ്ഥാന ക എഴുത്തുകാരൻ: സെക്കൻഡുകളിൽ ലേഖനങ്ങൾ സൃഷ്ടിക്കുക\",\"description\":\"Sider-ന്റെ ഒരു ക്ലിക്കിൽ AI എഴുത്തുകാരന്റെ സഹായത്തോടെ ഉയർന്ന നിലവാരത്തിലുള്ള ലേഖനങ്ങൾ, ബ്ലോഗ് പോസ്റ്റുകൾ, എന്നിവ സൃഷ്ടിക്കുക. വേഗത്തിൽ, സൗജന്യമായി, ഉപയോഗിക്കാൻ എളുപ്പമാണ്. നിങ്ങളുടെ ഉള്ളടക്കം സൃഷ്ടിക്കൽ ഇന്ന് മാറ്റം വരുത്തൂ!\",\"keywords\":\"ai എഴുത്തുകാരൻ, ai ലേഖന എഴുത്തുകാരൻ, ai എഴുത്ത്, സൃഷ്ടിപരമായ എഴുത്ത്, സൗജന്യ ai എഴുത്ത് ജനറേറ്റർ\"},\"content-out-of-limit\":\"ഉള്ളടക്കം വാക്കുകളുടെ പരിധി (20,000) മറികടക്കുന്നു. ദയവായി കുറച്ച് കുറച്ച് വീണ്ടും ശ്രമിക്കുക.\",\"generating-image\":\"ചിത്രം സൃഷ്ടിക്കുന്നു...\",\"loading-image\":\"ചിത്രം ലോഡ് ചെയ്യുന്നു...\",\"home-title\":\"AI എഴുത്തുകാരൻ\",\"searched\":\"{count} സൈറ്റുകൾ തിരഞ്ഞെടുത്തു\",\"link\":{\"copy\":\"ലിങ്ക് പകർപ്പ്\",\"edit\":\"ലിങ്ക് എഡിറ്റ് ചെയ്യുക\",\"remove\":\"ലിങ്ക് നീക്കം ചെയ്യുക\",\"invalid\":\"ദയവായി ഒരു സാധുവായ URL നൽകുക.\",\"placeholder\":\"വാചകം നൽകുക\",\"copied\":\"ലിങ്ക് ക്ലിപ്പ്ബോർഡിലേക്ക് കോപ്പി ചെയ്തു\",\"text\":\"എഴുത്ത്\",\"url\":\"യൂആർഎൽ\",\"insert\":\"ലിങ്ക് ചേർക്കുക\"},\"search-tip\":\"ആവശ്യമെങ്കിൽ വെബിൽ തിരയുക\",\"searching\":\"തിരയുന്നു...\",\"chat\":\"ചാറ്റ്\",\"write\":\"എഴുതുക\",\"chat-mode\":\"ചാറ്റ് മോഡ്: AI ചാറ്റിൽ മറുപടി നൽകുന്നു, ടെക്സ്റ്റ് എഡിറ്ററിന്റെ ഉള്ളടക്കത്തെ ബാധിക്കാതെ\",\"write-mode\":\"എഴുത്ത് മോഡ്: AI ടെക്സ്റ്റ് എഡിറ്ററിൽ ഉള്ളടക്കം എഡിറ്റ് ചെയ്യാൻ കഴിയും\",\"no-file\":\"ഫലങ്ങൾ കണ്ടെത്തിയില്ല, വ്യത്യസ്ത കീവേഡുകൾ പരീക്ഷിക്കുക\",\"title-limit\":\"ശീർഷകം വളരെ നീളമുള്ളത് (അധികം 255 അക്ഷരം)\",\"share\":{\"tooltip-private\":\"പൊതുവായി പങ്കിടുക\",\"tooltip-published\":\"ലിങ്ക് സൃഷ്ടിച്ചു\",\"popover-title\":\"പങ്കിടാവുന്ന ലിങ്ക് തയ്യാറാണ്\",\"popover-desc\":\"ലിങ്ക് ഉള്ള ആരും ഈ രേഖ കാണാൻ കഴിയും.\",\"copy-link\":\"ലിങ്ക് പകർപ്പ് ചെയ്യുക\",\"or\":\"അല്ലെങ്കിൽ\",\"stop-sharing\":\"പങ്കിടൽ നിർത്തുക\",\"stop-title\":\"പങ്കിടൽ ലിങ്ക് നിർത്തുക\",\"stop-desc\":\"നിങ്ങൾ പങ്കുവയ്ക്കുന്നത് നിർത്തുമ്പോൾ, രേഖ സ്വകാര്യമാകും, മറ്റുള്ളവർക്ക് ആക്സസ് ലഭിക്കില്ല.\",\"stop-confirm\":\"പങ്കിടൽ നിർത്തുക\",\"statement\":\"നിങ്ങൾ പരിശോധിക്കുന്നത് സ്ഥിരീകരിക്കപ്പെടാത്ത അല്ലെങ്കിൽ സുരക്ഷിതമല്ലാത്ത ഉപയോക്തൃ സൃഷ്ടിച്ച ഉള്ളടക്കമാണ്.\",\"report\":\"റിപ്പോർട്ട് ചെയ്യുക\",\"no-permission-1\":\"പങ്കിടൽ നിർത്തിയതിനാൽ രേഖ ഇനി ലഭ്യമല്ല.\",\"no-permission-2\":\"നിങ്ങൾ ഹോംപേജിലേക്ക് പോകാം അല്ലെങ്കിൽ പ്രവേശനത്തിനായി ഉടമയെ ബന്ധപ്പെടാം.\",\"go-home\":\"ഹോംപേജിലേക്ക് പോകുക\",\"network-error\":\"നെറ്റ്‌വർക്കിൽ പിശക്. ദയവായി നിങ്ങളുടെ കണക്ഷൻ പരിശോധിച്ച് പേജ് പുതുക്കുക.\",\"media\":\"Sider AI ഉപയോഗിച്ച് ഇത് എഴുതിയതാണ്—നിങ്ങളുടെ അഭിപ്രായം അറിയാൻ ആകാംക്ഷയുണ്ട്. ഇത് പരിശോധിക്കൂ!\",\"handle-login-edit\":\"എഡിറ്റ് ചെയ്യാൻ ലോഗിൻ ചെയ്യുക\",\"handle-edit\":\"മൂലത്തെ എഡിറ്റ് ചെയ്യുക\",\"handle-copy\":\"ഒരു പകർപ്പ് ഉണ്ടാക്കുക\",\"title-suffix\":\"(കോപ്പി)\"},\"image-load-error\":\"ചിത്രം ലോഡ് ചെയ്യാൻ പരാജയപ്പെട്ടു\"},\"error\":{\"auth-failed\":\"പ്രാമാണീകരണം പരാജയപ്പെട്ടു\",\"common-error\":\"സേവനത്തിൽ ഒരു പ്രശ്നമുണ്ട്, ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"CREATE_TEMPLATE_WISEBASE_FAILED\":\"നെറ്റ്‌വർക്ക് പിശക്, ഡിഫോൾട്ട് WiseBase സൃഷ്ടിക്കാൻ പരാജയപ്പെട്ടു\",\"USER_NOT_FOUND\":\"ക്ഷമിക്കണം, നിങ്ങളുടെ ഉപയോക്തൃ വിവരങ്ങൾ കണ്ടെത്താനായില്ല. ദയവായി വീണ്ടും ലോഗിൻ ചെയ്യാൻ ശ്രമിക്കുക.\",\"USER_UNAUTHORIZED\":\"നിങ്ങളുടെ ലോഗിൻ സെഷൻ കാലഹരണപ്പെട്ടു. തുടർന്നുപോകാൻ ദയവായി വീണ്ടും ലോഗിൻ ചെയ്യുക.\",\"USER_ID_DECODE_FAILED\":\"ഞങ്ങൾ ഒരു പ്രാമാണീകരണ പ്രശ്നം നേരിട്ടു. ദയവായി വീണ്ടും ലോഗിൻ ചെയ്ത് വീണ്ടും ശ്രമിക്കുക.\",\"CREATE_ONE_FAILED\":\"സൃഷ്ടിക്കൽ പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക. പ്രശ്നം തുടർന്നാൽ, ദയവായി പിന്തുണയെ ബന്ധപ്പെടുക.\",\"GET_ONE_FAILED\":\"ഡാറ്റ പുനഃപ്രാപ്തി പരാജയപ്പെട്ടു. ദയവായി പേജ് റിഫ്രെഷ് ചെയ്ത് വീണ്ടും ശ്രമിക്കുക.\",\"UPDATE_ONE_FAILED\":\"ഡാറ്റ പുനഃപ്രാപ്തി പരാജയപ്പെട്ടു. ദയവായി പേജ് റിഫ്രെഷ് ചെയ്ത് പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"BasicUserQuotaInsufficient\":\"നിങ്ങളുടെ അടിസ്ഥാന ക്വോട്ട തീർന്നിരിക്കുന്നു. കൂടുതൽ ഉപയോഗത്തിനായി നിങ്ങളുടെ അക്കൗണ്ട് അപ്‌ഗ്രേഡ് ചെയ്യുക.\",\"QuotaRateLimitExceeded\":\"നിങ്ങൾ നിലവിലെ ഉപയോഗ പരിധിയിലെത്തിയിരിക്കുന്നു. ഈ പരിധി എല്ലാ ഉപയോക്താക്കൾക്കും നീതിയുള്ള ഉപയോഗം ഉറപ്പാക്കുന്നു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"QuotaAdvancedRateLimit\":\"നിങ്ങൾ പ്രഗത്ഭമായ ടെക്സ്റ്റിനുള്ള നിലവിലെ ഉപയോഗ പരിധിയിലെത്തിയിരിക്കുന്നു. നിങ്ങൾക്ക് മറ്റൊരു മോഡൽ ഉടൻ ഉപയോഗിക്കാൻ കഴിയും.\",\"QuotaBasicRateLimit\":\"നിങ്ങൾ അടിസ്ഥാന ടെക്സ്റ്റിനുള്ള നിലവിലെ ഉപയോഗ പരിധിയിലെത്തിയിരിക്കുന്നു. നിങ്ങൾക്ക് മറ്റൊരു മോഡൽ ഉടൻ ഉപയോഗിക്കാൻ കഴിയും.\",\"UPLOAD_FILE_FAILED\":\"ഫയൽ അപ്‌ലോഡ് പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"FILE_ALREADY_EXIST\":\"വെബ്‌പേജ് സംരക്ഷിച്ചിരിക്കുന്നു, ദയവായി ഫയൽ ലിസ്റ്റ് പരിശോധിക്കുക.\",\"UNSUPPORTED_FILE\":\"നിലവിലെ ഫയൽ തരം താത്കാലികമായി പിന്തുണയ്ക്കുന്നില്ല.\",\"OPEN_SEARCH_FAILED\":\"നെറ്റ്‌വർക്ക് കണക്ഷനിൽ ഒരു പ്രശ്നമുണ്ട്. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"CHAT_WITH_LLM_FAILED\":\"AI പ്രതികരണം പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"CHAT_USER_CANCELED\":\"ഉപയോക്താവ द्वारा പ്രവർത്തനം റദ്ദാക്കി.\",\"CHAT_FILES_NOT_COMPLETE\":\"ഈ ഫയൽ AI പ്രോസസ്സ് ചെയ്യുന്നു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"CHAT_RAG_SEARCH_FAILED\":\"ഫയൽ തിരയൽ പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"CHAT_PROMPT_TEMPLATES_INVALID\":\"AI പ്രതികരണം പരാജയപ്പെട്ടു. ദയവായി വീണ്ടും ശ്രമിക്കുക.\",\"CHAT_REQUEST_PARAMS_INVALID\":\"അസാധുവായ ചാറ്റ് അഭ്യർത്ഥന പാരാമീറ്ററുകൾ. ദയവായി റിഫ്രെഷ് ചെയ്ത് വീണ്ടും ശ്രമിക്കുക.\",\"MAX_RESEARCH_TOPICS_REACHED\":\"നിങ്ങൾക്ക് സൃഷ്ടിക്കാവുന്ന പരമാവധി Wisebases-ൽ എത്തിച്ചേർന്നിരിക്കുന്നു. പരിധി വർദ്ധിപ്പിക്കാൻ ദയവായി അപ്‌ഗ്രേഡ് ചെയ്യുക.\",\"CREATION_FAILED\":\"ഗവേഷണ വിഷയം സൃഷ്ടിക്കൽ പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"NETWORK_CONNECTION_ERROR\":\"നെറ്റ്‌വർക്ക് കണക്ഷനിൽ ഒരു പ്രശ്നമുണ്ട്. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"OBJECT_WAS_EXISTED\":\"Wisebase പേര് ഇതിനകം ഉപയോഗത്തിലാണ്. ദയവായി മറ്റൊരു പേര് തിരഞ്ഞെടുക്കുക.\",\"WISEBASE_NOT_EXIST\":\"Wisebase കണ്ടെത്താനായില്ല. ഇത് നിലവിലുണ്ടോ എന്ന് ദയവായി സ്ഥിരീകരിക്കുക.\",\"DEL_ONE_FAILED\":\"ഡിലീറ്റ് പ്രവർത്തനം പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"DeductQuota\":\"സിസ്റ്റം പ്രോസസ്സിംഗ് പിശക്. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"PROTO_UNMARSHAL_FAILED\":\"ഡാറ്റ പാഴ്സിംഗ് പരാജയപ്പെട്ടു. ദയവായി റിഫ്രെഷ് ചെയ്ത് വീണ്ടും ശ്രമിക്കുക.\",\"MOVE_ERROR\":\"ഫയൽ നീക്കുന്നതിൽ പരാജയപ്പെട്ടു. ദയവായി ലക്ഷ്യസ്ഥാനം പരിശോധിച്ച് വീണ്ടും ശ്രമിക്കുക.\",\"SAVE_FILE_TO_S3_ERROR\":\"ഫയൽ സംരക്ഷിക്കുന്നതിൽ പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"OSS_SIGN_COOKIE_FAILED\":\"സ്റ്റോറേജ് അനുമതി പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"PRE_SIGN_ERROR\":\"ഫയൽ മുൻകൂർ പ്രോസസ്സിംഗ് പരാജയപ്പെട്ടു. ദയവായി വീണ്ടും അപ്ലോഡ് ചെയ്യാൻ ശ്രമിക്കുക.\",\"START_RAG_ERROR\":\"ഫയൽ പ്രോസസ്സിംഗ് ആരംഭിക്കുന്നതിൽ പരാജയപ്പെട്ടു. ദയവായി വീണ്ടും ശ്രമിക്കുക.\",\"DOWNLOAD_URL_ERROR\":\"ഈ URL-ൽ നിന്ന് ഡൗൺലോഡ് ചെയ്യാൻ കഴിയില്ല. ദയവായി വിലാസം പരിശോധിക്കുക.\",\"URL_WAS_REPEATED\":\"ഈ വെബ്‌പേജ് ഇതിനകം സംരക്ഷിച്ചിട്ടുണ്ട്. ദയവായി പുനരാവർത്തനങ്ങൾ ഒഴിവാക്കുക.\",\"FILE_DOWNLOAD_ERROR\":\"ഫയൽ ഡൗൺലോഡ് പരാജയപ്പെട്ടു. ദയവായി നിങ്ങളുടെ നെറ്റ്‌വർക്ക് പരിശോധിച്ച് വീണ്ടും ശ്രമിക്കുക.\",\"URL_NOT_SUPPORT_REQUEST\":\"ഈ തരം URL പിന്തുണയ്ക്കുന്നില്ല. ദയവായി മറ്റൊരു ലിങ്ക് ഉപയോഗിക്കുക.\",\"SyncUrlError\":\"വിവരങ്ങൾ സമന്വയിപ്പിക്കുന്നതിൽ പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"AUTO_CLASSIFICATION_FAILED\":\"AI വർഗ്ഗീകരണം പരാജയപ്പെട്ടു. ദയവായി പിന്നീട് വീണ്ടും ശ്രമിക്കുക.\",\"TOO_MANY_REQUEST\":\"കണക്ഷൻ നിലവിൽ ഉപയോഗത്തിലുണ്ട്. സിസ്റ്റത്തിൽ ഒരു സജീവ കണക്ഷൻ ഉണ്ട്. ദയവായി മറ്റ് ടാബുകൾ അടച്ചുപൂട്ടി വീണ്ടും ശ്രമിക്കുക.\"},\"siderbar\":{\"expand\":\"വിപുലീകരിക്കുക\",\"fold\":\"ചുരുക്കുക\",\"main\":{\"chat\":\"ചാറ്റ്\",\"home\":{\"home\":\"ഹോം\",\"recent\":\"സമീപകാല വൈസ്ബേസ്\",\"tools\":\"പൊതുവായ ഉപകരണങ്ങൾ\",\"collections\":\"സജീവമായ വൈസ്ബേസ്\"},\"history\":\"ചാറ്റ് ചരിത്രം\"},\"tools\":{\"tools\":\"സൃഷ്ടിക്കുക\",\"write\":\"എഐ റൈറ്റർ\",\"video\":\"വീഡിയോ\",\"ppt\":\"PPT\",\"all-tools\":\"എല്ലാ ഉപകരണങ്ങളും\",\"image\":\"ചിത്രം\",\"translator\":\"ഭാഷാന്തരക്കാരൻ\",\"slides\":\"സ്ലൈഡുകൾ\"},\"projects\":{\"projects\":\"വൈസ്ബേസ്\",\"inbox\":\"എഐ ഇൻബോക്സ്\",\"more\":\"കൂടുതൽ\",\"add-project\":\"പുതിയ വൈസ്ബേസ്\",\"all-projects\":\"എല്ലാ വൈസ്ബേസുകളും\",\"deep-research\":\"ഗഹന ഗവേഷണം\",\"all-files\":\"എല്ലാ ഫയലുകളും\"}},\"common\":{\"chat\":\"ഫയലുകളുമായി ചാറ്റ് ചെയ്യുക അല്ലെങ്കിൽ മറ്റെന്തെങ്കിലും ചോദിക്കുക\",\"modal\":{\"new\":\"ഒരു വൈസ്ബേസ് ചേർക്കുക\",\"placeholder\":\"വൈസ്ബേസ് പേര്\",\"empty\":\"ദയവായി ഒരു പേര് നൽകുക\",\"error\":\"സൃഷ്ടിക്കൽ പരാജയപ്പെട്ടു, ദയവായി വീണ്ടും ശ്രമിക്കുക.\",\"success\":\"സൃഷ്ടിക്കൽ വിജയകരം\",\"cancel\":\"റദ്ദാക്കുക\",\"create\":\"സൃഷ്ടിക്കുക\",\"delete\":\"ഇല്ലാതാക്കുക\",\"confirm-delete\":\"ഇല്ലാതാക്കൽ സ്ഥിരീകരിക്കുക\",\"delete-tips\":\"വൈസ്ബേസിലെ എല്ലാ ഫയലുകളും ഒരേസമയം ഇല്ലാതാക്കും. ഈ പ്രവർത്തി തിരികെ എടുക്കാൻ കഴിയില്ല.\",\"confirm\":\"സ്ഥിരീകരിക്കുക\",\"edit\":\"തിരുത്തുക\",\"name-exist\":\"വൈസ്ബേസ് പേര് ഇതിനകം നിലവിലുണ്ട്.\",\"delete-check\":\"ഫയലുകൾ എഐ ഇൻബോക്സിൽ സൂക്ഷിക്കുക\",\"what-is-wisebase\":\"Wisebase എന്താണ്?\",\"wisebase-desc\":\"വൈസ്ബേസ് ഒരു AI നോളേജ് മാനേജ്മെന്റ് ഉപകരണമാണ്, ഇത് മൾട്ടി-ഡോക്യുമെന്റ് ചാറ്റ്, തിരയൽ എന്നിവ പിന്തുണയ്ക്കുന്നു, ഉപയോക്താക്കൾക്ക് വിവരങ്ങൾ സമർത്ഥമായി ശേഖരിക്കാൻ, ക്രമീകരിക്കാൻ, പ്രവർത്തിക്കാൻ സഹായിക്കുന്നു, ഒരു ലളിതമായ പ്രവൃത്തി പ്രവാഹത്തിനായി.\",\"nameCannotBeEmpty\":\"പേര് ശൂന്യമായിരിക്കരുത്\",\"deleteConfirmTips\":\"ഈ വസ്തു നീക്കം ചെയ്യാൻ നിങ്ങൾ ഉറപ്പാണോ?\",\"rename\":\"പുതുക്കുക\",\"pin\":\"പിന്‍\",\"unpin\":\"അപിന്‍\",\"save\":\"സേവ്\"},\"plan-desc\":\"കൂടുതൽ ക്രെഡിറ്റുകൾ നേടാൻ അപ്ഗ്രേഡ് ചെയ്യുക\",\"credits-used\":\"{count} ക്രെഡിറ്റുകൾ ഉപയോഗിച്ചു\",\"device-multiple\":\"ഡെസ്ക്ടോപ്പ്/മൊബൈൽ ആപ്പ് ഡൗൺലോഡ് ചെയ്യുക\",\"device-desc\":\"ഡെസ്ക്ടോപ്പ്/മൊബൈൽ ആപ്പ്\",\"settings\":\"ക്രമീകരണങ്ങൾ\",\"personalPop\":{\"marketingText1\":\"സുഹൃത്തുക്കളെ ക്ഷണിക്കുക\",\"marketingText2\":\"സൗജന്യ ക്രെഡിറ്റുകൾ നേടുക\",\"list1\":\"പുതിയത് എന്താണ്\",\"list2\":\"എന്റെ അക്കൗണ്ട്\",\"list3\":\"സഹായ കേന്ദ്രം\",\"list4\":\"പ്രതികരണം\",\"list5\":\"ലോഗ് ഔട്ട് ചെയ്യുക\"},\"wisebase-desc\":\"വൈസ്ബേസ് ഒരു AI-നിർമ്മിത നോളേജ് ബേസ് ആണ്, ഇത് വെബ് ഫ്രാഗ്മെന്റുകൾ, കുറിപ്പുകൾ, PDF-കൾ, മറ്റ് ഉള്ളടക്കങ്ങൾ എന്നിവയിൽ നിന്ന് വ്യക്തിഗത ലൈബ്രറി നിർമ്മിച്ച്, നിങ്ങൾക്ക് സമർത്ഥമായി നോളേജ് മാനേജ്മെന്റ് നടത്താൻ സഹായിക്കുന്നു.\",\"translate-into\":\"{lang} ലേക്ക് വിവർത്തനം ചെയ്യുക\",\"unlimited\":\"അപരിമിതം\",\"retry\":\"വീണ്ടും ശ്രമിക്കുക\",\"time\":{\"today\":\"ഇന്ന്\",\"thisWeek\":\"ഈ ആഴ്ച\",\"thisMonth\":\"ഈ മാസം\",\"earlier\":\"മുമ്പ്\"},\"search\":\"ശോധന\",\"close\":\"അടയ്ക്കുക\",\"whats-new\":{\"audio\":{\"btnText\":\"iOS ആപ്പ് ഡൗൺലോഡ് ചെയ്യുക\",\"text\":{\"title\":\"Wisebase-ൽ ഓഡിയോ ഫയലുകൾ: ശബ്ദം ഉപയോഗിച്ച് അറിവിന്റെ അളവുകൾ വിപുലീകരിക്കുക\",\"desc1\":\"സ്വയംപ്രവർത്തന ട്രാൻസ്ക്രിപ്ഷൻക്കായി ഓഡിയോ അപ്‌ലോഡ് ചെയ്യുക, നിങ്ങളുടെ വൈവിധ്യമാർന്ന അറിവിന്റെ അടിസ്ഥാനത്തെ എളുപ്പത്തിൽ സമ്പന്നമാക്കുക.\",\"desc2\":\"നിങ്ങളുടെ റെക്കോർഡിംഗുകളുമായി സംവദിക്കുക, വിശദാംശങ്ങൾ നഷ്ടപ്പെടാതെ ആഴത്തിലുള്ള洞察ങ്ങൾ കണ്ടെത്തുക.\",\"desc3\":\"iOS Wisebase സിങ്ക് ഇപ്പോൾ ലഭ്യമാണ്, എളുപ്പത്തിൽ കുറിപ്പുകൾ റെക്കോർഡ് ചെയ്യുക, എപ്പോഴും അറിവുമായി ബന്ധപ്പെടുക.\"}},\"gotit\":\"ശരി\",\"text\":{\"title\":\"വീഡിയോ അപ്‌ലോഡുകളും ട്രാൻസ്ക്രിപ്റ്റ് ചാറ്റ് പിന്തുണയും\",\"desc1\":\"YouTube സാരാംശ ഫീച്ചർ ഉപയോഗിച്ച് Wisebase-ലേക്ക് നേരിട്ട് YouTube വീഡിയോകൾ സംരക്ഷിക്കുക\",\"desc2\":\"Wisebase-ലേക്ക് വീഡിയോകൾ ചേർക്കാൻ പ്രാദേശിക വീഡിയോ ഫയലുകൾ അപ്‌ലോഡ് ചെയ്യുക അല്ലെങ്കിൽ YouTube ലിങ്കുകൾ പേസ്റ്റ് ചെയ്യുക\",\"desc3\":\"ശീർഷകമുള്ള YouTube വീഡിയോകളിൽ നിന്ന് ഉപശീർഷകങ്ങൾ എടുക്കുക അല്ലെങ്കിൽ അപ്‌ലോഡ് ചെയ്ത ഏതെങ്കിലും വീഡിയോയിൽ നിന്നുള്ള സംസാരത്തെ ട്രാൻസ്ക്രൈബ് ചെയ്യുക\",\"desc4\":\"നിങ്ങളുടെ വീഡിയോകളുടെ ഉള്ളടക്കവുമായി നേരിട്ട് ചാറ്റ് ചെയ്യുക — പ്രാദേശികമായതോ അല്ലെങ്കിൽ ഉപശീർഷകങ്ങളുള്ള YouTube-ലിരുന്നോ\"},\"web-creator\":{\"btnText\":\"മൂല്യരഹിതമായി ആരംഭിക്കുക\",\"text\":{\"title\":\"GPT-5 ഉപയോഗിച്ച് വെബ്സൈറ്റുകൾ സൃഷ്ടിക്കുക — സമയപരിധിയുള്ള സൗജന്യം\",\"desc1\":\"GPT-5 ഉപയോഗിച്ച് മെച്ചപ്പെട്ടത് — കൂടുതൽ ബുദ്ധിമാനായ ആശയങ്ങൾ, ശക്തമായ ഡിസൈനുകൾ, മെച്ചപ്പെട്ട പ്രവാഹം\",\"desc2\":\"കോഡ് ആവശ്യമില്ല — ഏതെങ്കിലും പേജ് നിർമ്മിക്കാൻ സാധാരണ വാക്കുകൾ ഉപയോഗിക്കുക\",\"desc3\":\"ദൃശ്യ എഡിറ്റിംഗ് — ചിത്രങ്ങളും ഘടകങ്ങളും നിങ്ങൾക്ക് ഇഷ്ടമുള്ള രീതിയിൽ മാറ്റിസ്ഥാപിക്കുക\"}},\"not-now\":\"ഇപ്പോൾ വേണ്ട\",\"ai-slides\":{\"btnText\":\"ഇപ്പോൾ പരീക്ഷിക്കുക\",\"text\":{\"title\":\"AI Slides ഇപ്പോൾ ലൈവ്: അത്ഭുതകരമായ പ്രെസന്റേഷനുകൾ 10X വേഗത്തിൽ സൃഷ്ടിക്കുക\",\"desc1\":\"നിങ്ങളുടെ ആശയം വിശകലനം ചെയ്ത് ഘടനാപരമായ ഔട്ട്‌ലൈൻ ആക്കുന്നു\",\"desc2\":\"ഓരോ സ്ലൈഡിലും അനുയോജ്യമായ ചിത്രങ്ങളും വീഡിയോകളും സ്വയമേവ ചേർക്കുന്നു\",\"desc3\":\"AI ചാറ്റ് അല്ലെങ്കിൽ മാനുവൽ മോഡ് ഉപയോഗിച്ച് ഇഷ്ടാനുസൃതമായി എഡിറ്റ് ചെയ്യാനുള്ള സൗകര്യം നൽകുന്നു\"}},\"share-wisebase\":{\"text\":{\"title\":\"Wisebase Sharing പരിചയപ്പെടുത്തുന്നു\",\"desc\":\"ഒരു ഏകീകൃത ലിങ്ക് ഉപയോഗിച്ച് ഒരു വൈസ്ബേസ് അതിന്റെ ഫയലുകളുമായി പങ്കിടുക. നിങ്ങളുടെ സഹപ്രവർത്തകർ രേഖകളുമായി ഉടൻ ചാറ്റ് ചെയ്യാൻ അവരുടെ സ്വന്തം പകർപ്പ് ലഭിക്കും.\",\"desc1\":\"നിങ്ങളുടെ Wisebase-ൽ ഉള്ള ഫയലുകൾ ഒരു ഏക, ലളിതമായ ലിങ്ക് ഉപയോഗിച്ച് നിങ്ങളുടെ സഹപ്രവർത്തകരുമായി പങ്കിടുക.\",\"desc2\":\"അവർക്ക് അവരുടെ സ്വന്തം പകർപ്പ് ലഭിക്കും, ഇത് അവരെ രേഖകളുമായി ഉടൻ ചാറ്റ് ചെയ്യാൻ അനുവദിക്കും.\"}},\"learnMore\":\"കൂടുതൽ അറിയുക\",\"elite-credit\":{\"text\":{\"title\":\"എലൈറ്റ് ക്രെഡിറ്റുകൾ അവതരിപ്പിക്കുന്നു\",\"desc1\":\"എല്ലാവർക്കും വിശ്വസനീയമായ പ്രകടനം ഉറപ്പാക്കാൻ, ഡീപ് റിസർച്ച്, എഐ സ്ലൈഡുകൾ പോലുള്ള ഏജന്റ് ഫീച്ചറുകൾക്കായി എലൈറ്റ് ക്രെഡിറ്റുകൾ അവതരിപ്പിക്കുന്നു. നിങ്ങളുടെ നിലവിലെ പദ്ധതി മാറ്റമില്ലാതെ തുടരുന്നു, ഈ ഏജന്റുകൾ ഉപയോഗിക്കാൻ നിങ്ങൾക്ക് മാസത്തിൽ എലൈറ്റ് ക്രെഡിറ്റുകൾ ലഭിക്കും. നാം മെച്ചപ്പെടുത്തുന്നതിൽ തുടരുമ്പോൾ നിങ്ങളുടെ സഹകരണത്തിന് നന്ദി.\"}},\"pdf-inbox\":{\"text\":{\"title\":\"ChatPDF/Inbox പ്രധാന അപ്ഡേറ്റ്: രേഖാ സഹകരണത്തെ കൂടുതൽ ബുദ്ധിമുട്ടാക്കുന്നു\",\"desc1\":\"ബാച്ച് രേഖാ സംഭാഷണം: ഒരേസമയം നിരവധി ഫയലുകൾ തിരഞ്ഞെടുക്കുക, AI നിങ്ങളെ രേഖകളുടെ വിവരങ്ങൾ സംയോജിപ്പിക്കാൻ സഹായിക്കുന്നു.\",\"desc2\":\"സൈഡ്‌ബാർ ഫയൽ മാനേജ്മെന്റ്: പേജിന്റെ ഇടത് ഭാഗത്ത് ഫയൽ തിരഞ്ഞെടുക്കൽ മേഖല, നിരവധി ഫയലുകൾ തിരഞ്ഞെടുക്കാൻ പിന്തുണ നൽകുന്നു, എല്ലാ രേഖകളുടെയും സമഗ്ര ദൃശ്യവൽക്കരണം നൽകുന്നു\",\"desc3\":\"സ്മാർട്ട് രേഖാ പ്രിവ്യൂ: ഫയലുകൾക്ക് മുകളിൽ ഹോവർ ചെയ്യുമ്പോൾ AI സംഗ്രഹങ്ങൾ പ്രദർശിപ്പിക്കുന്നു, രേഖകളുടെ പ്രധാന ഉള്ളടക്കം വേഗത്തിൽ മനസ്സിലാക്കാൻ\",\"desc4\":\"ക്വിക്ക് ലൈബ്രറി സൃഷ്ടിക്കൽ: ഇൻബോക്സ് k-desc\":\"ഇത് മായ്ക്കുന്നതോടെ എല്ലാ പങ്കിട്ട ലിങ്കുകളും അസാധുവാകും. ഈ പ്രവർത്തി തിരികെ എടുക്കാൻ കഴിയില്ല.\",\"creations-search-empty\":\"ഫലങ്ങൾ ഒന്നും കണ്ടെത്തിയില്ല, വ്യത്യസ്തമായ കീവേഡുകൾ പരീക്ഷിക്കുക.\",\"rename-failed\":\"പുനർനാമകരണം പരാജയപ്പെട്ടു\",\"rename-success\":\"പുനർനാമകരണം വിജയിച്ചു\",\"free-trial-left\":\"മുക്ത പരീക്ഷണം ബാക്കി: {count}\",\"free-trial-limit\":\"നിങ്ങളുടെ സൃഷ്ടിപരത ഇതിൽ അവസാനിക്കേണ്ടതില്ല. പരിധിയില്ലാത്ത സൃഷ്ടികളും പ്രീമിയം സവിശേഷതകളും അൺലോക്ക് ചെയ്യൂ.\",\"invite-friends\":\"സുഹൃത്തുക്കളെ ക്ഷണിക്കുക\",\"team-owner-credit-limit\":\"നിങ്ങളുടെ ക്രെഡിറ്റുകൾ മുഴുവൻ ഉപയോഗിച്ചു കഴിഞ്ഞു. കൂടുതൽ ലഭിക്കാൻ അപ്ഗ്രേഡ് ചെയ്യുക.\",\"team-user-credit-limit\":\"നിങ്ങളുടെ ക്രെഡിറ്റുകൾ മുഴുവൻ ഉപയോഗിച്ചു കഴിഞ്ഞു. കൂടുതൽ ലഭിക്കാൻ നിങ്ങളുടെ ടീം ഉടമയെ അപ്ഗ്രേഡ് ചെയ്യാൻ അഭ്യർത്ഥിക്കുക.\",\"basic-credit-limit\":\"നിങ്ങളുടെ അടിസ്ഥാന ക്രെഡിറ്റുകൾ തീർന്നിരിക്കുന്നു. കൂടുതൽ ലഭിക്കാൻ അപ്ഗ്രേഡ് ചെയ്യുക.\",\"advanced-credit-limit\":\"നിങ്ങളുടെ ആഡ്വാൻസ്ഡ് ക്രെഡിറ്റുകൾ തീർന്നിരിക്കുന്നു. കൂടുതൽ ലഭിക്കാൻ അപ്ഗ്രേഡ് ചെയ്യുക.\",\"unlimited-advanced-credit-limit\":\"ഫീച്ചർ ആക്സസ് പരിധി എത്തിച്ചേർന്നു. ഈ ഫീച്ചർ മാസത്തിൽ 1500-ൽ താഴെ ആഡ്വാൻസ്ഡ് ക്രെഡിറ്റുകൾ ഉപയോഗിക്കുമ്പോൾ ലഭ്യമാണ് (ബൂസ്റ്റർ പാക്ക് ക്രെഡിറ്റുകൾ ഒഴിവാക്കുന്നു). തുടരാൻ, ദയവായി ഒരു ബൂസ്റ്റർ പാക്ക് വാങ്ങുക.\",\"elite-credit-limit\":\"നിങ്ങളുടെ എലീറ്റ് ക്രെഡിറ്റുകൾ തീർന്നിരിക്കുന്നു. കൂടുതൽ ലഭിക്കാൻ അപ്ഗ്രേഡ് ചെയ്യുക.\",\"unlimited-elite-credit-limit\":\"നിങ്ങളുടെ എലീറ്റ് ക്രെഡിറ്റുകൾ മുഴുവൻ ഉപയോഗിച്ചിരിക്കുന്നു. ക്രെഡിറ്റുകൾ പുനഃസജ്ജമാക്കുന്നതിന് ശേഷം അടുത്ത മാസം വീണ്ടും ശ്രമിക്കാം.\",\"try-these\":\"ഇവ പരീക്ഷിക്കുക:\",\"intelligence\":\"ബുദ്ധി\",\"cost\":\"ചെലവ്\",\"model-no-image\":\"നിലവിലെ മോഡ് ചിത്രങ്ങളെ മനസ്സിലാക്കുന്നത് പിന്തുണയ്ക്കുന്നില്ല\",\"model-desc-free\":\"അടിസ്ഥാന ക്രെഡിറ്റ് ഡൈനാമിക് ബില്ലിംഗ് ഉപയോഗിച്ച്, ദൈനംദിന പ്രവർത്തനങ്ങൾക്ക് അനുയോജ്യം.\",\"model-desc-advanced\":\"എലൈറ്റ് ക്രെഡിറ്റ് ഡൈനാമിക് ബില്ലിംഗ് ഉപയോഗിച്ച്, സങ്കീർണ്ണവും സമ്പൂർണ്ണവുമായ പദ്ധതികൾക്ക് അനുയോജ്യം.\",\"preset-create-prompt\":[{\"name\":\"വ്യക്തിഗത ഹോംപേജ്\",\"prompt\":\"സ്വയം പരിചയം, കഴിവുകളുടെ പ്രദർശനം, പ്രോജക്റ്റ് പോർട്ട്ഫോളിയോ, ബന്ധപ്പെടാനുള്ള വിവരങ്ങൾ എന്നിവ ഉൾപ്പെടുന്ന ആധുനിക വ്യക്തിഗത ഹോംപേജ് സൃഷ്ടിക്കുക. ഡിസൈൻ ആവശ്യകതകൾ: മിനിമലിസ്റ്റ് ആധുനിക ശൈലി, ഇരുണ്ട തീം, മൃദുവായ സ്ക്രോളിംഗ് അനിമേഷനുകൾ.\"},{\"name\":\"കമ്പനി വെബ്സൈറ്റ്\",\"prompt\":\"ഹോംപേജ് പ്രദർശനം, ഉൽപ്പന്നങ്ങളും സേവനങ്ങളും, ഞങ്ങളെക്കുറിച്ച്, പരിഹാരങ്ങൾ, ബന്ധപ്പെടാനുള്ള പേജുകൾ എന്നിവ ഉൾപ്പെടുന്ന പ്രൊഫഷണൽ ടെക് കമ്പനി വെബ്സൈറ്റ് രൂപകൽപ്പന ചെയ്യുക. ദൃശ്യ ശൈലി: ബിസിനസ് പ്രൊഫഷണൽ, നീല നിറം, വിശ്വാസവും പ്രൊഫഷണലിസവും ഊന്നിപ്പറയുന്നു.\"},{\"name\":\"ഇ-കൊമേഴ്സ് പ്ലാറ്റ്ഫോം\",\"prompt\":\"ഉൽപ്പന്ന പ്രദർശനം, ഷോപ്പിംഗ് കാർട്ട്, ഉപയോക്തൃ സംവിധാനം, ഓർഡർ മാനേജ്മെന്റ്, പേയ്മെന്റ് പ്രക്രിയ എന്നിവ ഉൾപ്പെടുന്ന പൂർണ്ണമായ ഇ-കൊമേഴ്സ് ഷോപ്പിംഗ് വെബ്സൈറ്റ് വികസിപ്പിക്കുക. ഡിസൈൻ ആവശ്യകതകൾ: ഉപയോക്തൃ സൗഹൃദ അനുഭവം, വ്യക്തമായ ദൃശ്യ ക്രമീകരണം, മൊബൈൽ പ്രതികരണശേഷിയുള്ളത്.\"},{\"name\":\"ബ്ലോഗ് സിസ്റ്റം\",\"prompt\":\"ലേഖന പ്രസിദ്ധീകരണം, വിഭാഗ ടാഗുകൾ, അഭിപ്രായ പ്രവർത്തനക്ഷമത, ഉപയോക്തൃ മാനേജ്മെന്റ് എന്നിവ പിന്തുണയ്ക്കുന്ന വ്യക്തിഗത ബ്ലോഗ് വെബ്സൈറ്റ് നിർമ്മിക്കുക. ഇന്റർഫേസ് ശൈലി: ശുദ്ധമായ വായനാനുഭവം, പ്രതികരണശേഷിയുള്ള ഡിസൈൻ, ഇരുണ്ട/വെളിച്ചം തീം മാറ്റം.\"},{\"name\":\"ഡാഷ്ബോർഡ്\",\"prompt\":\"ഡാറ്റാ സ്ഥിതിവിവര കണക്കുകൾ, ഉപയോക്തൃ മാനേജ്മെന്റ്, സിസ്റ്റം ക്രമീകരണങ്ങൾ, വ്യക്തിഗത കേന്ദ്രം എന്നിവ ഉൾപ്പെടുന്ന മാനേജ്മെന്റ് ഡാഷ്ബോർഡ് സൃഷ്ടിക്കുക. ഇന്റർഫേസ് ശൈലി: ആധുനിക ഫ്ലാറ്റ് ഡിസൈൻ, സൈഡ്ബാർ നാവിഗേഷൻ, ഡാർക്ക്/ലൈറ്റ് തീം സ്വിച്ച് ചെയ്യൽ.\"},{\"name\":\"ഓൺലൈൻ വിദ്യാഭ്യാസ പ്ലാറ്റ്ഫോം\",\"prompt\":\"കോഴ്‌സ് പ്രദർശനം, വീഡിയോ പ്ലേബാക്ക്, പഠന പുരോഗതി, ഇൻസ്ട്രക്ടർ മാനേജ്മെന്റ്, കമ്മ്യൂണിറ്റി ഫീച്ചറുകൾ എന്നിവ ഉൾപ്പെടുന്ന ഒരു ഓൺലൈൻ വിദ്യാഭ്യാസ പഠന പ്ലാറ്റ്ഫോം നിർമ്മിക്കുക. സാങ്കേതിക ആവശ്യങ്ങൾ: സ്മൂത്ത് വീഡിയോ പ്ലേബാക്ക്, പുരോഗതി ട്രാക്കിംഗ്, മൾട്ടി-ഡിവൈസ് സിങ്ക്.\"},{\"name\":\"റസ്റ്റോറന്റ് വെബ്സൈറ്റ്\",\"prompt\":\"മെനു പ്രദർശനം, ഓൺലൈൻ റിസർവേഷൻ, റസ്റ്റോറന്റ് പരിചയം, സ്ഥലം വിവരങ്ങൾ എന്നിവ ഉൾപ്പെടുന്ന ഒരു പ്രീമിയം റസ്റ്റോറന്റ് വെബ്സൈറ്റ് രൂപകൽപ്പന ചെയ്യുക. ഡിസൈൻ ശൈലി: ചൂടുള്ളതും സു
