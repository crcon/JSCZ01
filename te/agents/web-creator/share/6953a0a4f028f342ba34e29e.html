es.github.com) – ఉచిత \u0026 నమ్మదగినది\n1. GitHub లో కొత్త రిపోజిటరీని సృష్టించండి\n2. dist/ ఫోల్డర్ యొక్క కంటెంట్‌ను రిపోలో అప్‌లోడ్ చేయండి\n3. రిపోజిటరీ సెట్టింగ్స్ → పేజెస్ కి వెళ్లండి\n4. \"Deploy from a branch\" → మెయిన్ బ్రాంచ్‌ని ఎంచుకోండి\n5. username.github.io/repository-name వద్ద మీ సైట్‌ను యాక్సెస్ చేయండి\n\n---\n\n🔧 అభివృద్ధి చెందిన డిప్లాయ్‌మెంట్ (డెవలపర్ల కోసం):\n\nGit ఆధారిత ఆటో డిప్లాయ్‌మెంట్\n1. మొత్తం ప్రాజెక్ట్ (మూల కోడ్ సహా) GitHub/GitLab కి పుష్ చేయండి\n2. మీ రిపోను Vercel/Netlify తో కనెక్ట్ చేయండి\n3. బిల్డ్ సెట్టింగ్స్‌ను కాన్ఫిగర్ చేయండి:\n   - బిల్డ్ కమాండ్: npm run build\n   - పబ్లిష్ డైరెక్టరీ: dist\n   - Node.js వెర్షన్: 16.x లేదా ఎక్కువ\n4. ప్రతి పుష్ ఆటోమేటిక్‌గా బిల్డ్ \u0026 డిప్లాయ్‌మెంట్‌ను ట్రిగ్గర్ చేస్తుంది\n\nసాంప్రదాయ సర్వర్ డిప్లాయ్‌మెంట్\nమీకు మీ స్వంత సర్వర్ ఉంటే:\n1. dist/ డైరెక్టరీలోని అన్ని ఫైళ్లను మీ సర్వర్ యొక్క వెబ్ రూట్‌కు అప్‌లోడ్ చేయండి\n2. సర్వర్ స్థిర ఫైల్ హోస్టింగ్‌ను మద్దతు ఇస్తుందో లేదో నిర్ధారించుకోండి\n3. మీ డొమైన్ ద్వారా మీ వెబ్‌సైట్‌ను యాక్సెస్ చేయండి\n\n---\n\n💰 ధర సమాచారం:\n- Vercel: వ్యక్తిగత వినియోగానికి ఉచిత ప్లాన్ సరిపోతుంది\n- Cloudflare Pages: పూర్తిగా ఉచితం, పరిమితులు లేవు\n- Netlify: ఉచిత ప్లాన్ 100GB బ్యాండ్‌విడ్త్/నెల కలిగి ఉంది\n- GitHub Pages: పూర్తిగా ఉచితం, 100GB బ్యాండ్‌విడ్త్/నెల\n\n---\n\n🎯 సిఫార్సులు:\n- మొదటివారు: Vercel లేదా Netlify (డ్రాగ్-అండ్-డ్రాప్ అప్‌లోడ్)\n- వేగం-కేంద్రీకృతం: Cloudflare Pages\n- దీర్ఘకాలిక ప్రాజెక్టులు: GitHub Pages\n- డెవలపర్లు: Git ఆధారిత ఆటో డిప్లాయ్‌మెంట్\n\n---\n\n⚡ చిట్కాలు:\n- అన్ని ప్లాట్‌ఫారమ్‌లు ఉచిత HTTPS సర్టిఫికేట్‌లను అందిస్తాయి\n- మీరు అనుకూల డొమైన్‌లను బైండ్ చేయవచ్చు (కొన్ని చెల్లింపు ప్లాన్‌లను అవసరం చేస్తాయి)\n- డిప్లాయ్‌మెంట్ తర్వాత, వివిధ పరికరాల్లో మీ వెబ్‌సైట్‌ను పరీక్షించండి\n\n---\n\n🆘 సమస్య పరిష్కారం:\n1. మీరు dist/ యొక్క కంటెంట్‌ను అప్‌లోడ్ చేస్తున్నారని నిర్ధారించుకోండి, మొత్తం ప్రాజెక్ట్‌ను కాదు\n2. index.html రూట్ డైరెక్టరీలో ఉందని తనిఖీ చేయండి\n3. హోస్టింగ్ ప్లాట్‌ఫారమ్‌లో లోపాల లాగ్‌లను సమీక్షించండి\n4. అన్ని ఫైళ్లు సరిగ్గా అప్‌లోడ్ అయ్యాయో లేదో నిర్ధారించుకోండి"])</script><script>self.__next_f.push([1,"1c:{\"name\":\"వ్యక్తిగత హోమ్‌పేజ్\",\"prompt\":\"ఆత్మపరిచయం, నైపుణ్యాల ప్రదర్శన, ప్రాజెక్ట్ పోర్ట్‌ఫోలియో మరియు సంప్రదింపు సమాచారం కలిగి ఆధునిక వ్యక్తిగత హోమ్‌పేజ్‌ను సృష్టించండి. డిజైన్ అవసరాలు: కనిష్ట ఆధునిక శైలి, డార్క్ థీమ్, స్మూత్ స్క్రోలింగ్ యానిమేషన్లు.\"}\n1d:{\"name\":\"కంపెనీ వెబ్‌సైట్\",\"prompt\":\"హోమ్‌పేజ్ ప్రదర్శన, ఉత్పత్తులు \u0026 సేవలు, మా గురించి, పరిష్కారాలు మరియు సంప్రదింపు పేజీలను కలిగి ఉన్న ప్రొఫెషనల్ టెక్ కంపెనీ వెబ్‌సైట్‌ను డిజైన్ చేయండి. విజువల్ శైలి: వ్యాపార ప్రొఫెషనల్, నీలం టోన్, నమ్మకం మరియు ప్రొఫెషనలిజాన్ని హైలైట్ చేస్తుంది.\"}\n1e:{\"name\":\"ఇ-కామర్స్ ప్లాట్‌ఫారమ్\",\"prompt\":\"ఉత్పత్తి ప్రదర్శన, షాపింగ్ కార్ట్, యూజర్ సిస్టమ్, ఆర్డర్ మేనేజ్‌మెంట్ మరియు చెల్లింపు ప్రక్రియను కలిగి ఉన్న పూర్తి ఇ-కామర్స్ షాపింగ్ వెబ్‌సైట్‌ను అభివృద్ధి చేయండి. డిజైన్ అవసరాలు: వినియోగదారులకు అనుకూలమైన అనుభవం, "])</script><script>self.__next_f.push([1,"స్పష్టమైన విజువల్ హెయిరార్కీ, మొబైల్ రెస్పాన్సివ్.\"}\n1f:{\"name\":\"బ్లాగ్ సిస్టమ్\",\"prompt\":\"వ్యాఖ్యల ఫంక్షనాలిటీ మరియు యూజర్ మేనేజ్‌మెంట్‌తో వ్యాస ప్రచురణను మద్దతు ఇస్తూ వ్యక్తిగత బ్లాగ్ వెబ్‌సైట్‌ను నిర్మించండి. ఇంటర్‌ఫేస్ శైలి: శుభ్రమైన చదవడం అనుభవం, రెస్పాన్సివ్ డిజైన్, డార్క్/లైట్ థీమ్ టోగుల్.\"}\n20:{\"name\":\"డాష్‌బోర్డ్\",\"prompt\":\"డేటా గణాంక చార్టులు, వినియోగదారు నిర్వహణ, సిస్టమ్ సెట్టింగ్స్, మరియు వ్యక్తిగత కేంద్రాన్ని కలిగి ఉన్న నిర్వహణ డాష్‌బోర్డ్‌ను సృష్టించండి. ఇంటర్‌ఫేస్ శైలి: ఆధునిక ఫ్లాట్ డిజైన్, సైడ్‌బార్ నావిగేషన్, డార్క్/లైట్ థీమ్ మార్పిడి.\"}\n21:{\"name\":\"ఆన్‌లైన్ ఎడ్యుకేషన్ ప్లాట్‌ఫారమ్\",\"prompt\":\"కోర్సు ప్రదర్శన, వీడియో ప్లేబ్యాక్, అభ్యాస పురోగతి, ఇన్‌స్ట్రక్టర్ నిర్వహణ, మరియు కమ్యూనిటీ ఫీచర్లను కలిగి ఉన్న ఆన్‌లైన్ ఎడ్యుకేషన్ లెర్నింగ్ ప్లాట్‌ఫారమ్‌ను నిర్మించండి. సాంకేతిక అవ"])</script><script>self.__next_f.push([1,"సరాలు: సజావుగా వీడియో ప్లేబ్యాక్, పురోగతి ట్రాకింగ్, మల్టీ-డివైస్ సింక్.\"}\n22:{\"name\":\"రెస్టారెంట్ వెబ్‌సైట్\",\"prompt\":\"మెనూ ప్రదర్శన, ఆన్‌లైన్ రిజర్వేషన్, రెస్టారెంట్ పరి లింక్ సృష్టించబడింది\",\"popover-title\":\"పంచుకునే లింక్ సిద్ధంగా ఉంది\",\"popover-desc\":\"లింక్ ఉన్న ఎవ్వరైనా ఈ డాక్యుమెంట్‌ను చూడవచ్చు.\",\"copy-link\":\"లింక్ కాపీ చేయండి\",\"or\":\"లేదా\",\"stop-sharing\":\"పంచుకోవడం ఆపండి\",\"stop-title\":\"లింక్ పంచుకోవడం ఆపండి\",\"stop-desc\":\"మీరు పంచుకోవడం ఆపినప్పుడు, డాక్యుమెంట్ ప్రైవేట్‌గా మారుతుంది మరియు ఇతరులకు యాక్సెస్ ఉండదు.\",\"stop-confirm\":\"పంచుకోవడం ఆపండి\",\"statement\":\"మీరు నిర్ధారించబడని లేదా ప్రమాదకరమైన వినియోగదారు-సృష్టిత కంటెంట్‌ను చూస్తున్నారు.\",\"report\":\"నిర్దేశించండి\",\"no-permission-1\":\"పంచుకోవడం ఆపబడినందున పత్రం ఇక అందుబాటులో లేదు.\",\"no-permission-2\":\"మీరు హోమ్ పేజీకి వెళ్లవచ్చు లేదా యజమానిని సంప్రదించవచ్చు.\",\"go-home\":\"హోమ్ పేజీకి వెళ్లండి\",\"network-error\":\"నెట్‌వర్క్ లోపం. దయచేసి మీ కనెక్షన్‌ను తనిఖీ చేసి పేజీని రిఫ్రెష్ చేయండి.\",\"media\":\"Sider AI తో ఇది రాశాను—మీ అభిప్రాయాన్ని తెలుసుకోవడానికి ఆసక్తిగా ఉన్నాను. దీన్ని చూడండి!\",\"handle-login-edit\":\"సవరించడానికి లాగిన్ అవ్వండి\",\"handle-edit\":\"మూలాన్ని సవరించండి\",\"handle-copy\":\"కాపీ చేయండి\",\"title-suffix\":\"(కాపీ)\"},\"image-load-error\":\"చిత్రం లోడ్ కావడంలో విఫలమైంది\"},\"error\":{\"auth-failed\":\"ప్రామాణీకరణ విఫలమైంది\",\"common-error\":\"సర్వీస్‌లో సమస్య ఉంది, దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"CREATE_TEMPLATE_WISEBASE_FAILED\":\"నెట్‌వర్క్ లోపం, డిఫాల్ట్ WiseBase సృష్టించడంలో విఫలమైంది\",\"USER_NOT_FOUND\":\"క్షమించండి, మీ వినియోగదారు సమాచారాన్ని కనుగొనలేకపోయాము. దయచేసి మళ్లీ లాగిన్ అవ్వడానికి ప్రయత్నించండి.\",\"USER_UNAUTHORIZED\":\"మీ లాగిన్ సెషన్ గడువు ముగిసింది. కొనసాగించడానికి దయచేసి మళ్లీ లాగిన్ అవ్వండి.\",\"USER_ID_DECODE_FAILED\":\"మేము ప్రామాణీకరణ సమస్యను ఎదుర్కొన్నాము. దయచేసి మళ్లీ లాగిన్ అవ్వండి మరియు మళ్లీ ప్రయత్నించండి.\",\"CREATE_ONE_FAILED\":\"సృష్టి విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి. సమస్య కొనసాగితే, దయచేసి మద్దతును సంప్రదించండి.\",\"GET_ONE_FAILED\":\"డేటాను పొందడంలో విఫలమైంది. దయచేసి పేజీని రిఫ్రెష్ చేసి మళ్లీ ప్రయత్నించండి.\",\"UPDATE_ONE_FAILED\":\"డేటాను పొందడంలో విఫలమైంది. దయచేసి పేజీని రిఫ్రెష్ చేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"BasicUserQuotaInsufficient\":\"మీరు ప్రాథమిక కోటాను ముగించారు. మరింత వినియోగం కోసం మీ ఖాతాను అప్‌గ్రేడ్ చేయండి.\",\"QuotaRateLimitExceeded\":\"మీరు ప్రస్తుత వినియోగ పరిమితిని చేరుకున్నారు. ఈ పరిమితి అన్ని వినియోగదారులకు సమాన వినియోగాన్ని నిర్ధారిస్తుంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"QuotaAdvancedRateLimit\":\"మీరు అధునాతన టెక్స్ట్ కోసం ప్రస్తుత వినియోగ పరిమితిని చేరుకున్నారు. మీరు వెంటనే ఇతర మోడల్‌ను ఉపయోగించడం కొనసాగించవచ్చు.\",\"QuotaBasicRateLimit\":\"మీరు ప్రాథమిక టెక్స్ట్ కోసం ప్రస్తుత వినియోగ పరిమితిని చేరుకున్నారు. మీరు వెంటనే ఇతర మోడల్‌ను ఉపయోగించడం కొనసాగించవచ్చు.\",\"UPLOAD_FILE_FAILED\":\"ఫైల్ అప్‌లోడ్ విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"FILE_ALREADY_EXIST\":\"వెబ్‌పేజీ సేవ్ చేయబడింది, దయచేసి ఫైల్ జాబితాను తనిఖీ చేయండి.\",\"UNSUPPORTED_FILE\":\"ప్రస్తుత ఫైల్ రకం తాత్కాలికంగా మద్దతు ఇవ్వబడదు.\",\"OPEN_SEARCH_FAILED\":\"నెట్‌వర్క్ కనెక్షన్‌లో సమస్య ఉంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"CHAT_WITH_LLM_FAILED\":\"AI ప్రతిస్పందన విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"CHAT_USER_CANCELED\":\"వినియోగదారుని ద్వారా ఆపరేషన్ రద్దు చేయబడింది.\",\"CHAT_FILES_NOT_COMPLETE\":\"ఈ ఫైల్ AI ద్వారా ప్రాసెస్ చేయబడుతోంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"CHAT_RAG_SEARCH_FAILED\":\"ఫైల్ శోధన విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"CHAT_PROMPT_TEMPLATES_INVALID\":\"AI ప్రతిస్పందన విఫలమైంది. దయచేసి మళ్లీ ప్రయత్నించండి.\",\"CHAT_REQUEST_PARAMS_INVALID\":\"చాట్ అభ్యర్థన పరామితులు చెల్లవు. దయచేసి రిఫ్రెష్ చేసి మళ్లీ ప్రయత్నించండి.\",\"MAX_RESEARCH_TOPICS_REACHED\":\"మీరు సృష్టించగలిగే గరిష్ట Wisebases సంఖ్యను చేరుకున్నారు. పరిమితిని పెంచడానికి దయచేసి అప్‌గ్రేడ్ చేయండి.\",\"CREATION_FAILED\":\"సంసంధాన అంశం సృష్టించడంలో విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"NETWORK_CONNECTION_ERROR\":\"నెట్‌వర్క్ కనెక్షన్‌లో సమస్య ఉంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"OBJECT_WAS_EXISTED\":\"Wisebase పేరు ఇప్పటికే ఉపయోగంలో ఉంది. దయచేసి వేరే పేరు ఎంచుకోండి.\",\"WISEBASE_NOT_EXIST\":\"Wisebase కనుగొనబడలేదు. ఇది ఉందో లేదో దయచేసి ధృవీకరించండి.\",\"DEL_ONE_FAILED\":\"తొలగింపు ఆపరేషన్ విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"DeductQuota\":\"సిస్టమ్ ప్రాసెసింగ్ లోపం. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"PROTO_UNMARSHAL_FAILED\":\"డేటా పార్సింగ్ విఫలమైంది. దయచేసి రిఫ్రెష్ చేసి మళ్లీ ప్రయత్నించండి.\",\"MOVE_ERROR\":\"ఫైల్‌ను తరలించడం విఫలమైంది. గమ్యస్థానాన్ని తనిఖీ చేసి మళ్లీ ప్రయత్నించండి.\",\"SAVE_FILE_TO_S3_ERROR\":\"ఫైల్‌ను సేవ్ చేయడం విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"OSS_SIGN_COOKIE_FAILED\":\"స్టోరేజ్ అనుమతి విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"PRE_SIGN_ERROR\":\"ఫైల్ ప్రీప్రాసెసింగ్ విఫలమైంది. దయచేసి మళ్లీ అప్‌లోడ్ చేయడానికి ప్రయత్నించండి.\",\"START_RAG_ERROR\":\"ఫైల్ ప్రాసెసింగ్ ప్రారంభించడం విఫలమైంది. దయచేసి మళ్లీ ప్రయత్నించండి.\",\"DOWNLOAD_URL_ERROR\":\"ఈ URL నుండి డౌన్‌లోడ్ చేయలేము. చిరునామాను తనిఖీ చేయండి.\",\"URL_WAS_REPEATED\":\"ఈ వెబ్‌పేజీ ఇప్పటికే సేవ్ చేయబడింది. దయచేసి డూప్లికేట్లను నివారించండి.\",\"FILE_DOWNLOAD_ERROR\":\"ఫైల్ డౌన్‌లోడ్ విఫలమైంది. దయచేసి మీ నెట్‌వర్క్‌ను తనిఖీ చేసి మళ్లీ ప్రయత్నించండి.\",\"URL_NOT_SUPPORT_REQUEST\":\"ఈ రకమైన URL మద్దతు ఇవ్వబడలేదు. దయచేసి వేరే లింక్‌ను ఉపయోగించండి.\",\"SyncUrlError\":\"సమాచారాన్ని సమకాలీకరించడం విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"AUTO_CLASSIFICATION_FAILED\":\"AI వర్గీకరణ విఫలమైంది. దయచేసి కొంతసేపటి తర్వాత మళ్లీ ప్రయత్నించండి.\",\"TOO_MANY_REQUEST\":\"ఈ కనెక్షన్ ప్రస్తుతం ఉపయోగంలో ఉంది. వ్యవస్థలో ఒక చురుకైన కనెక్షన్ ఉంది. దయచేసి ఇతర టాబ్‌లను మూసివేయండి మరియు మళ్లీ ప్రయత్నించండి.\"},\"siderbar\":{\"expand\":\"విస్తరించు\",\"fold\":\"సంకోచించు\",\"main\":{\"chat\":\"చాట్\",\"home\":{\"home\":\"హోమ్\",\"recent\":\"ఇటీవలి వైజ్‌బేస్\",\"tools\":\"సాధారణ సాధనాలు\",\"collections\":\"క్రియాశీల వైజ్‌బేస్\"},\"history\":\"చాట్ చరిత్ర\"},\"tools\":{\"tools\":\"సృష్టి ించవచ్చు.\",\"QuotaRateLimitExceeded\":\"మీరు ప్రస్తుత వినియోగ పరిమితిని చేరుకున్నారు. ఈ పరిమితి అన్ని వినియోగదారులకు న్యాయమైన వినియోగాన్ని నిర్ధారిస్తుంది. దయచేసి తర్వాత ప్రయత్నించండి.\",\"commonError\":\"ఒక అప్రత్యాశిత లోపం జరిగింది. దయచేసి తర్వాత ప్రయత్నించండి. ({errorCode})\",\"CHAT_WITH_LLM_FAILED\":\"AI స్పందన విఫలమైంది. దయచేసి తర్వాత ప్రయత్నించండి\",\"CHAT_USER_CANCELED\":\"చర్యను వినియోగదారుని ద్వారా రద్దు చేయబడింది\",\"CHAT_FILES_NOT_COMPLETE\":\"ఈ ఫైల్ AI ద్వారా ప్రాసెస్ చేయబడుతోంది. దయచేసి తర్వాత ప్రయత్నించండి.\",\"CHAT_RAG_SEARCH_FAILED\":\"ఫైల్ శోధన విఫలమైంది. దయచేసి తర్వాత ప్రయత్నించండి\",\"CHAT_PROMPT_TEMPLATES_INVALID\":\"AI స్పందన విఫలమైంది. దయచేసి మళ్లీ ప్రయత్నించండి\",\"CHAT_REQUEST_PARAMS_INVALID\":\"చాట్ అభ్యర్థన పరామితులు చెల్లవు. దయచేసి పునరుద్ధరించండి మరియు మళ్లీ ప్రయత్నించండి\",\"errSiderFREEUserLimitTitle1\":\"ఉచిత ట్రయిల్స్ ముగిసాయి. లోతైన పరిశోధన కోసం అప్‌గ్రేడ్ చేయండి! ఆధునిక మోడల్స్‌ను అన్లాక్ చేయండి: GPT5, Gemini2.5 Pro, Claude 4 మరియు మరిన్ని Sider ప్రీమియం ఫీచర్లు. ఇప్పటికే మిలియన్ల మంది అప్‌గ్రేడ్ చేసుకున్నారు.\",\"errSiderFREEUserLimitTitle2\":\"ఉచిత ట్రయల్ వినియోగాలు:\",\"errSiderFREEUserLimitDesc2\":\"ప్రతి వినియోగం 10 ఎలైట్ క్రెడిట్స్‌ను వినియోగిస్తుంది.\",\"errSiderFREEUserLimitDesc1\":\"సర్వం ఉచిత ట్రయల్స్‌ను ఉపయోగించిన తర్వాత, ప్రతి వినియోగం 10 ఎలైట్ క్రెడిట్స్‌ను వినియోగిస్తుంది.\",\"errSiderProAdvancedLimit\":\"అధిక ప్రగతిశీల క్రెడిట్లను కొనసాగించడానికి అప్‌గ్రేడ్ చేయండి లేదా మిత్రులను ఆహ్వానించండి.\",\"errSiderUltraAdvancedLimit\":\"మీరు డీప్ రీసెర్చ్ కోసం నెలవారీ పరిమితిని చేరుకున్నారు. ఈ ఫీచర్ నెలవారీ అడ్వాన్స్‌డ్ క్రెడిట్స్ వినియోగం 1500 కంటే తక్కువగా ఉన్నప్పుడు అందుబాటులో ఉంటుంది (బూస్టర్ ప్యాక్ క్రెడిట్స్ ప్రభావితం కావు). కొనసాగించడానికి, దయచేసి బూస్టర్ ప్యాక్ కొనుగోలు చేయండి.\",\"enoughQuotaTipsTitle\":\"మీ వద్ద సరిపడా క్రెడిట్లు ఉన్నాయి.\",\"enoughQuotaTipsDesc\":\"దయచేసి Deep Researchని ఉపయోగించడం కొనసాగించండి.\",\"orderBtn\":\"ఇప్పుడు ఆర్డర్ చేయండి\",\"FreeVisualizationUsageLimitReached\":\"ఉచిత విజువలైజేషన్ వినియ ్లీ ప్రయత్నించవచ్చు.\",\"try-these\":\"ఇవి ప్రయత్నించండి:\",\"intelligence\":\"మేధస్సు\",\"cost\":\"ఖర్చు\",\"model-no-image\":\"ప్రస్తుత మోడ్ చిత్రాలను అర్థం చేసుకోవడాన్ని మద్దతు ఇవ్వదు\",\"model-desc-free\":\"ప్రాథమిక క్రెడిట్ డైనమిక్ బిల్లింగ్ ఉపయోగించడం, రోజువారీ పనులకు అనుకూలం.\",\"model-desc-advanced\":\"ఎలైట్ క్రెడిట్ డైనమిక్ బిల్లింగ్ ఉపయోగించడం, సంక్లిష్ట మరియు పూర్తి ప్రాజెక్టులకు అనుకూలం.\",\"preset-create-prompt\":[{\"name\":\"వ్యక్తిగత హోమ్‌పేజ్\",\"prompt\":\"ఆత్మపరిచయం, నైపుణ్యాల ప్రదర్శన, ప్రాజెక్ట్ పోర్ట్‌ఫోలియో మరియు సంప్రదింపు సమాచారం కలిగి ఆధునిక వ్యక్తిగత హోమ్‌పేజ్‌ను సృష్టించండి. డిజైన్ అవసరాలు: కనిష్ట ఆధునిక శైలి, డార్క్ థీమ్, స్మూత్ స్క్రోలింగ్ యానిమేషన్లు.\"},{\"name\":\"కంపెనీ వెబ్‌సైట్\",\"prompt\":\"హోమ్‌పేజ్ ప్రదర్శన, ఉత్పత్తులు \u0026 సేవలు, మా గురించి, పరిష్కారాలు మరియు సంప్రదింపు పేజీలను కలిగి ఉన్న ప్రొఫెషనల్ టెక్ కంపెనీ వెబ్‌సైట్‌ను డిజైన్ చేయండి. విజువల్ శైలి: వ్యాపార ప్రొఫెషనల్, నీలం టోన్, నమ్మకం మరియు ప్రొఫెషనలిజాన్ని హైలైట్ చేస్తుంది.\"},{\"name\":\"ఇ-కామర్స్ ప్లాట్‌ఫారమ్\",\"prompt\":\"ఉత్పత్తి ప్రదర్శన, షాపింగ్ కార్ట్, యూజర్ సిస్టమ్, ఆర్డర్ మేనేజ్‌మెంట్ మరియు చెల్లింపు ప్రక్రియను కలిగి ఉన్న పూర్తి ఇ-కామర్స్ షాపింగ్ వెబ్‌సైట్‌ను అభివృద్ధి చేయండి. డిజైన్ అవసరాలు: వినియోగదారులకు అనుకూలమైన అనుభవం, స్పష్టమైన విజువల్ హెయిరార్కీ, మొబైల్ రెస్పాన్సివ్.\"},{\"name\":\"బ్లాగ్ సిస్టమ్\",\"prompt\":\"వ్యాఖ్యల ఫంక్షనాలిటీ మరియు యూజర్ మేనేజ్‌మెంట్‌తో వ్యాస ప్రచురణను మద్దతు ఇస్తూ వ్యక్తిగత బ్లాగ్ వెబ్‌సైట్‌ను నిర్మించండి. ఇంటర్‌ఫేస్ శైలి: శుభ్రమైన చదవడం అనుభవం, రెస్పాన్సివ్ డిజైన్, డార్క్/లైట్ థీమ్ టోగుల్.\"},{\"name\":\"డాష్‌బోర్డ్\",\"prompt\":\"డేటా గణాంక చార్టులు, వినియోగదారు నిర్వహణ, సిస్టమ్ సెట్టింగ్స్, మరియు వ్యక్తిగత కేంద్రాన్ని కలిగి ఉన్న నిర్వహణ డాష్‌బోర్డ్‌ను సృష్టించండి. ఇంటర్‌ఫేస్ శైలి: ఆధునిక ఫ్లాట్ డిజైన్, సైడ్‌బార్ నావిగేషన్, డార్క్/లైట్ థీమ్ మార్పిడి.\"},{\"name\":\"ఆన్‌లైన్ ఎడ్యుకేషన్ ప్లాట్‌ఫారమ్\",\"prompt\":\"కోర్సు ప్రదర్శన, వీడియో ప్లేబ్యాక్, అభ్యాస పురోగతి, ఇన్‌స్ట్రక్టర్ నిర్వహణ, మరియు కమ్యూనిటీ ఫీచర్లను కలిగి ఉన్న ఆన్‌లైన్ ఎడ్యుకేషన్ లెర్నింగ్ ప్లాట్‌ఫారమ్‌ను నిర్మించండి. సాంకేతిక అవసరాలు: సజావుగా వీడియో ప్లేబ్యాక్, పురోగతి ట్రాకింగ్, మల్టీ-డివైస్ సింక్.\"},{\"name\":\"రెస్టారెంట్ వెబ్‌సైట్\",\"prompt\":\"మెనూ ప్రదర్శన, ఆన్‌లైన్ రిజర్వేషన్, రెస్టారెంట్ పరిచయం, మరియు ప్రదేశ సమాచారం వంటి అంశాలను కలిగి ఉన్న ప్రీమియం రెస్టారెంట్ వెబ్‌సైట్‌ను డిజైన్ చేయండి. డిజైన్ శైలి: హృదయపూర్వక మరియు సొగసైన, ఆహార ఫోటోగ్రఫీ, హృదయపూర్వక రంగులు, నాణ్యతను హైలైట్ చేయడం.\"},{\"name\":\"జిమ్ నిర్వహణ వ్యవస్థ\",\"prompt\":\"సభ్యుల నిర్వహణ, తరగతి బుకింగ్, ట్రైనర్ సిస్టమ్, మరియు పరికరాల నిర్వహణను కలిగి ఉన్న జిమ్ నిర్వహణ వ్యవస్థను అభివృద్ధి చేయండి. ముఖ్య ఫీచర్లు: QR కోడ్ చెక్-ఇన్, ఫిట్‌నెస్ ట్రాకింగ్, వర్కౌట్ ప్లాన్ సృష్టి.\"},{\"name\":\"పోర్ట్‌ఫోలియో వెబ్‌సైట్\",\"prompt\":\"డిజైనర్ పోర్ట్‌ఫోలియో వెబ్‌సైట్‌లో ప్రాజెక్ట్ ప్రదర్శన, డిజైన్ తత్వశాస్త్రం, వర్క్‌ఫ్లో, మరియు క్లయింట్ టెస్టిమోనియల్స్ ఉన్నాయి. విజువల్ ఎఫెక్ట్స్: సృజనాత్మక లేఅవుట్, అధిక-నాణ్యత చిత్ర ప్రదర్శన, ఇంటరాక్టివ్ యానిమేషన్లు.\"},{\"name\":\"న్యూస్ పోర్టల్\",\"prompt\":\"ఆర్టికల్ జాబితాలు, వర్గం ఫిల్టరింగ్, శోధన సామర్థ్యం, మరియు ట్రెండింగ్ సిఫార్సులు కలిగి న్యూస్ వెబ్‌సైట్‌ను నిర్మించండి. డిజైన్ అవసరాలు: స్పష్టమైన సమాచారం నిర్మాణం, వేగవంతమైన లోడ్, అద్భుతమైన చదవడం అనుభవం.\"},{\"name\":\"సోషల్ మీడియా ప్లాట్‌ఫారమ్\",\"prompt\":\"పోస్ట్ ప్రచురణ, ఫాలో సిస్టమ్, మెసేజింగ్ చాట్, మరియు యూజర్ ప్రొఫైల్స్ కలిగి సోషల్ మీడియా అప్లికేషన్‌ను అభివృద్ధి చేయండి. ఇంటరాక్టివ్ ఫీచర్లు: లైక్స్ \u0026 కామెంట్స్, కంటెంట్ షేరింగ్, రియల్-టైమ్ నోటిఫికేషన్లు, ఆధునిక మొబైల్-ఫస్ట్ డిజైన్.\"},{\"name\":\"ట్రావెల్ బుకింగ్ వెబ్‌సైట్\",\"prompt\":\"గమ్యస్థానం శోధన, హోటల్ రిజర్వేషన్లు, ట్రిప్ ప్లానింగ్, మరియు యూజర్ సమీక్షలు కలిగి ట్రావెల్ బుకింగ్ ప్లాట్‌ఫారమ్‌ను సృష్టించండి. డిజైన్ ముఖ్యాంశాలు: అందమైన చిత్రం ప్రదర్శన, సహజమైన బుకింగ్ ప్రక్రియ, మ్యాప్ ఇంటిగ్రేషన్.\"}],\"errors\":{\"upload-file-count\":\"ఫైళ్లు చాలా ఎక్కువ—గరిష్టంగా {count}\",\"upload-file-size\":\"{name} ఫైల్ చాలా పెద్దది—గరిష్ట పరిమాణం {size}MB\",\"upload-file-type\":\"ఫైల్ రకం మద్దతు ఇవ్వబడదు.\",\"upload-file-ca
