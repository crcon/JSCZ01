ુકરણ કરતી AI અનુભવો માટે ડિઝાઇન કરેલી છે\",\"claude-3-opus\":\"એન્થ્રોપિકની સૌથી શક્તિશાળી મોડલ, જે અત્યંત જટિલ કાર્યો પર સ્થાનિક પ્રદર્શન આપે છે અને વાર્તાલાપ અને માનવજૈસી સમજણ દર્શાવે છે.\",\"claude-3-sonnet\":\"એન્થ્રોપિકની સૌથી સામર્થ્યપૂર્ણ મોડલ, જે બુદ્ધિમતા અને ઝડપથીને સુસંગત છે, વિવિધ પ્રકારની કાર્યો માટે આદર્શ છે.\",\"claude-3\":{\"5-sonnet\":\"Anthropic નું તાજેતરનું મોડેલ, Claude 3 Opus કરતા બમણું ઝડપ અને વધુ બુદ્ધિ ધરાવતું, જે તર્ક, જ્ઞાન, કોડિંગ અને દૃશ્ય કાર્યોમાં નોંધપાત્ર સુધારો કરે છે.\"},\"claude-instant\":\"એન્થ્રોપિક, ઓછી વિલંબતા, ઉચ્ચ થ્રુપુટ ઉપયોગના કેસમાંથી મૂળભૂત મોડેલ.\",\"claude2\":\"એન્થ્રોપિક તરફથી શ્રેષ્ઠ-વર્ગ ઓફરિંગ મોડેલ, જટિલ તર્કની જરૂર હોય તેવા કાર્યો પર શ્રેષ્ઠ પ્રદર્શન.\",\"gemini-1\":{\"5-flash\":\"ઝડપ અને કાર્યક્ષમતા માટે અનુકૂલિત Googleનું હલકું મોડેલ.\",\"5-pro\":\"વિવિધ કાર્યોમાં સામાન્ય કામગીરી માટે Googleનું શ્રેષ્ઠ મોડેલ.\"},\"gemini-pro\":\"Googleનું સૌથી સંતુલિત મોડેલ, ક્ષમતા અને કાર્યક્ષમતાનું સંપૂર્ણ મિશ્રણ.\",\"gpt-3\":{\"5\":\"ખૂબ જ ઝડપી, મોટાભાગના રોજિંદા કાર્યો માટે સરસ.\"},\"gpt-4\":\"સૌથી સક્ષમ મોડેલ, અદ્યતન તર્કની જરૂર હોય તેવા જટિલ કાર્યો માટે શ્રેષ્ઠ.\",\"gpt-4o\":\"OpenAI નું શ્રેષ્ઠ મોડલ, ગુણવત્તા જાળવી રાખીને જટિલ કાર્યો માટે શ્રેષ્ઠ.\",\"gpt-4o-mini\":\"OpenAI નું તાજેતરનું મોડલ, ચેટ, કોડિંગ, અને દૈનિક ઉપયોગ માટેના તર્કકાર્ય માટે ઝડપી, શ્રેષ્ઠ પ્રદર્શન આપે છે.\",\"gpt-5\":\"OpenAI નું નવીનતમ મોડેલ, જટિલ કાર્યો માટે શ્રેષ્ઠ જ્યારે ગુણવત્તા જાળવી રાખે છે.\",\"llama-3\":\"Metaનું નવીનતમ મોડેલ, ગુણવત્તા જાળવી રાખતા જટિલ કાર્યો માટે શ્રેષ્ઠ.\",\"sider\":\"{SIDER} ગતિશીલ રીતે GPT-4o મિની, Claude 3 Haiku, Gemini 1.5 Flash, અથવા Llama 3 પસંદ કરે છે પરિસ્થિતિના આધારે શ્રેષ્ઠ જવાબો માટે.\"},\"modelCountTip\":{\"gpt-3\":{\"5\":\"ખર્ચ \u003cm\u003e1 બેસિક ક્રેડિટ\u003c/m\u003e.\",\"5-n_one\":\"ખર્ચ \u003cm\u003e{count} મૂળભૂત ક્રેડિટ\u003c/m\u003e.\",\"5-n_other\":\"ખર્ચ \u003cm\u003e{count} મૂળભૂત ક્રેડિટ્સ\u003c/m\u003e.\"},\"gpt-4\":\"ખર્ચ \u003cm\u003e1 એડવાન્સ્ડ ક્રેડિટ\u003c/m\u003e.\",\"gpt-4-2\":\"ખર્ચ \u003cm ળ. કૃપા કરીને પેજને રિફ્રેશ કરો અને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"BasicUserQuotaInsufficient\":\"તમારા પાસે મૂળ ક્વોટા સમાપ્ત થઈ ગયો છે. વધુ ઉપયોગ માટે તમારું ખાતું અપગ્રેડ કરો.\",\"QuotaRateLimitExceeded\":\"તમે વર્તમાન ઉપયોગ મર્યાદા સુધી પહોંચી ગયા છો. આ મર્યાદા તમામ વપરાશકર્તાઓ માટે ન્યાયી ઉપયોગ સુનિશ્ચિત કરે છે. કૃપા કરીને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"QuotaAdvancedRateLimit\":\"તમે અદ્યતન ટેક્સ્ટ માટે વર્તમાન ઉપયોગ મર્યાદા સુધી પહોંચી ગયા છો. તમે તરત જ બીજું મોડલ ઉપયોગ કરી શકો છો.\",\"QuotaBasicRateLimit\":\"તમે મૂળ ટેક્સ્ટ માટે વર્તમાન ઉપયોગ મર્યાદા સુધી પહોંચી ગયા છો. તમે તરત જ બીજું મોડલ ઉપયોગ કરી શકો છો.\",\"UPLOAD_FILE_FAILED\":\"ફાઇલ અપલોડ નિષ્ફળ. કૃપા કરીને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"FILE_ALREADY_EXIST\":\"વેબપેજ સાચવી લેવામાં આવ્યો છે, કૃપા કરીને ફાઇલ યાદી તપાસો.\",\"UNSUPPORTED_FILE\":\"વર્તમાન ફાઇલ પ્રકારને તાત્કાલિક સપોર્ટ નથી.\",\"OPEN_SEARCH_FAILED\":\"નેટવર્ક કનેક્શન સાથે સમસ્યા છે. કૃપા કરીને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"CHAT_WITH_LLM_FAILED\":\"AI પ્રતિસાદ નિષ્ફળ. કૃપા કરીને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"CHAT_USER_CANCELED\":\"વપરાશકર્તા દ્વારા ઓપરેશન રદ કરવામાં આવ્યું.\",\"CHAT_FILES_NOT_COMPLETE\":\"આ ફાઇલ AI દ્વારા પ્રક્રિયા કરવામાં આવી રહી છે. કૃપા કરીને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"CHAT_RAG_SEARCH_FAILED\":\"ફાઇલ શોધ નિષ્ફળ. કૃપા કરીને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"CHAT_PROMPT_TEMPLATES_INVALID\":\"AI પ્રતિસાદ નિષ્ફળ. કૃપા કરીને ફરી પ્રયાસ કરો.\",\"CHAT_REQUEST_PARAMS_INVALID\":\"અમાન્ય ચેટ વિનંતી પેરામિટર્સ. કૃપા કરીને રિફ્રેશ કરો અને ફરી પ્રયાસ કરો.\",\"MAX_RESEARCH_TOPICS_REACHED\":\"તમે જેટલા Wisebases બનાવી શકો છો તે મર્યાદા સુધી પહોંચી ગયા છો. મર્યાદા વધારવા માટે કૃપા કરીને અપગ્રેડ કરો.\",\"CREATION_FAILED\":\"શોધ વિષય બનાવવામાં નિષ્ફળ. કૃપા કરીને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"NETWORK_CONNECTION_ERROR\":\"નેટવર્ક કનેક્શન સાથે સમસ્યા છે. કૃપા કરીને થોડા સમય પછી ફરી પ્રયાસ કરો.\",\"OBJECT_WAS_EXISTED\":\"Wisebase નામ પહેલેથી જ ઉપયોગમાં છે. કૃપા કરીને અલગ નામ પસંદ કરો.\",\"WISEBASE_NOT_EXIST\":\"Wisebase મળ્ય
