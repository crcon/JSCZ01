ασε το Όριο Χρήσης\",\"errSiderDataAnalysisCredit\":\"Αυτή η απάντηση χρειάζεται Ανάλυση Δεδομένων (1 Προχωρημένη Πίστωση). Έχετε εξαντλήσει τις Προχωρημένες Πιστώσεις, οπότε αναβαθμίστε ή προσκαλέστε φίλους για περισσότερες!\",\"errSiderDeviceBinded\":\"Παρακαλούμε συνδεθείτε για χρήση.\",\"errSiderDeviceLimitLogout\":\"Έχετε αποσυνδεθεί λόγω επίτευξης του ορίου συσκευών. Μπορείτε να συνδεθείτε ξανά και αυτό θα αποσυνδέσει την παλαιότερη ενεργή συσκευή στον λογαριασμό σας.\",\"errSiderGPT4HighLoad\":\"Ο διακομιστής OpenAI είναι απασχολημένος αυτήν τη στιγμή. Παρακαλώ δοκιμάστε ξανά αργότερα.\",\"errSiderGPT4LimitDevice\":\"Παρακαλούμε \u003cb\u003eσυνδεθείτε\u003c/b\u003e πρώτα, και \u003camb\u003eπροσκαλέστε τους φίλους σας\u003c/amb\u003e ή \u003cta\u003eαναβαθμίστε σε premium\u003c/ta\u003e για να αποκτήσετε περισσότερες προηγμένες μονάδες.\",\"errSiderGPT4LimitLogin\":\"Αναβαθμίστε ή προσκαλέστε φίλους για να ξεκλειδώσετε περισσότερες Προηγμένες Μονάδες για πιο διορατικές απαντήσεις.\",\"errSiderGPT4LimitPremium\":\"Έχετε χρησιμοποιήσει όλα τα μηνιαία Advanced Credits σας. Αναβαθμίστε το πλάνο σας για υψηλότερη μηνιαία ποσόστωση ή αγοράστε ένα πακέτο ενίσχυσης Advanced Credits για άμεση χρήση!\",\"errSiderGPT4LimitPremiumDiscount\":\"Οι Προηγμένες Μονάδες σας για αυτόν τον μήνα έχουν εξαντληθεί. Αναβαθμίστε τώρα για απεριόριστες μονάδες με \u003cb\u003e$1\u003c/b\u003e ΕΚΠΤΩΣΗ, ή περιμένετε για την επαναφορά τον επόμενο μήνα (ημερομηνία συνδρομής).\",\"errSiderHighTrafficError\":\"Λόγω μεγάλης επισκεψιμότητας, δοκιμάστε ξανά αργότερα ή πραγματοποιήστε αναβάθμιση σε λογαριασμό premium για ταχύτερη πρόσβαση.\",\"errSiderHighTrafficTip\":\"Εξετάστε το ενδεχόμενο \u003ca\u003eαναβάθμισης σε λογαριασμό premium\u003c/a\u003e για σταθερή πρόσβαση και υποστήριξη της ανάπτυξής μας.\",\"errSiderLoginExpired\":\"Η σύνδεσή σας έχει λήξει, παρακαλώ συνδεθείτε ξανά\",\"errSiderNeedLogin\":\"Παρακαλούμε συνδεθείτε για χρήση.\",\"errSiderO1Limit1\":\"Το μοντέλο OpenAI o1 είναι
