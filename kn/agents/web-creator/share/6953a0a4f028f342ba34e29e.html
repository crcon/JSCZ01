‌ನ ವಿಷಯಗಳನ್ನು ರೆಪೊಗೆ ಅಪ್‌ಲೋಡ್ ಮಾಡಿ\n3. ರೆಪೊಸಿಟರಿ ಸೆಟ್ಟಿಂಗ್‌ಗಳಿಗೆ ಹೋಗಿ → ಪುಟಗಳು\n4. \"ಶಾಖೆಯಿಂದ ನಿಯೋಜಿಸಿ\" → ಮುಖ್ಯ ಶಾಖೆ ಆಯ್ಕೆಮಾಡಿ\n5. ನಿಮ್ಮ ಸೈಟ್ ಅನ್ನು username.github.io/repository-name ನಲ್ಲಿ ಪ್ರವೇಶಿಸಿ\n\n---\n\n🔧 ಸುಧಾರಿತ ನಿಯೋಜನೆ (ವಿಕಸಕರಿಗಾಗಿ):\n\nGit ಆಧಾರಿತ ಸ್ವಯಂ ನಿಯೋಜನೆ\n1. ಸಂಪೂರ್ಣ ಪ್ರಾಜೆಕ್ಟ್ (ಮೂಲ ಕೋಡ್ ಸೇರಿದಂತೆ) ಅನ್ನು GitHub/GitLab ಗೆ ಪುಶ್ ಮಾಡಿ\n2. ನಿಮ್ಮ ರೆಪೊವನ್ನು Vercel/Netlify ಗೆ ಸಂಪರ್ಕಿಸಿ\n3. ನಿರ್ಮಾಣ ಸೆಟ್ಟಿಂಗ್‌ಗಳನ್ನು ಸಂರಚಿಸಿ:\n   - ನಿರ್ಮಾಣ ಆಜ್ಞೆ: npm run build\n   - ಪ್ರಕಟಣೆ ಡೈರೆಕ್ಟರಿ: dist\n   - Node.js ಆವೃತ್ತಿ: 16.x ಅಥವಾ ಹೆಚ್ಚಿನದು\n4. ಪ್ರತಿಯೊಂದು ಪುಶ್ ನಿರ್ಮಾಣ ಮತ್ತು ನಿಯೋಜನೆಗೆ ಸ್ವಯಂಚಾಲಿತವಾಗಿ ಪ್ರಾರಂಭವಾಗುತ್ತದೆ\n\nಪಾರಂಪರಿಕ ಸರ್ವರ್ ನಿಯೋಜನೆ\nನೀವು ನಿಮ್ಮದೇ ಆದ ಸರ್ವರ್ ಹೊಂದಿದ್ದರೆ:\n1. dist/ ಡೈರೆಕ್ಟರಿಯಲ್ಲಿನ ಎಲ್ಲಾ ಫೈಲ್‌ಗಳನ್ನು ನಿಮ್ಮ ಸರ್ವರ್‌ನ ವೆಬ್ ರೂಟ್‌ಗೆ ಅಪ್‌ಲೋಡ್ ಮಾಡಿ\n2. ಸರ್ವರ್ ಸ್ಥಿರ ಫೈಲ್ ಹೋಸ್ಟಿಂಗ್ ಅನ್ನು ಬೆಂಬಲಿಸುತ್ತದೆಯೇ ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ\n3. ನಿಮ್ಮ ಡೊಮೇನ್ ಮೂಲಕ ನಿಮ್ಮ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ಪ್ರವೇಶಿಸಿ\n\n---\n\n💰 ಬೆಲೆ ಮಾಹಿತಿ:\n- Vercel: ವೈಯಕ್ತಿಕ ಬಳಕೆಗಾಗಿ ಉಚಿತ ಯೋಜನೆ ಸಾಕಷ್ಟು\n- Cloudflare Pages: ಸಂಪೂರ್ಣ ಉಚಿತ, ಯಾವುದೇ ಮಿತಿಗಳಿಲ್ಲ\n- Netlify: ಉಚಿತ ಯೋಜನೆ 100GB ಬ್ಯಾಂಡ್‌ವಿಡ್ತ್/ತಿಂಗಳು ಒಳಗೊಂಡಿದೆ\n- GitHub Pages: ಸಂಪೂರ್ಣ ಉಚಿತ, 100GB ಬ್ಯಾಂಡ್‌ವಿಡ್ತ್/ತಿಂಗಳು\n\n---\n\n🎯 ಶಿಫಾರಸುಗಳು:\n- ಆರಂಭಿಕರು: Vercel ಅಥವಾ Netlify (ಎಳೆ-ಬಿಡಿ ಅಪ್‌ಲೋಡ್)\n- ವೇಗ-ಕೇಂದ್ರಿತ: Cloudflare Pages\n- ದೀರ್ಘಕಾಲಿಕ ಯೋಜನೆಗಳು: GitHub Pages\n- ವಿಕಸಕರು: Git ಆಧಾರಿತ ಸ್ವಯಂ ನಿಯೋಜನೆ\n\n---\n\n⚡ ಸಲಹೆಗಳು:\n- ಎಲ್ಲಾ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್‌ಗಳು ಉಚಿತ HTTPS ಪ್ರಮಾಣಪತ್ರಗಳನ್ನು ಒದಗಿಸುತ್ತವೆ\n- ನೀವು ಕಸ್ಟಮ್ ಡೊಮೇನ್‌ಗಳನ್ನು ಬಾಂಡ್ ಮಾಡಬಹುದು (ಕೆಲವು ಪಾವತಿಸಿದ ಯೋಜನೆಗಳನ್ನು ಅಗತ್ಯವಿರಬಹುದು)\n- ನಿಯೋಜನೆಯ ನಂತರ, ವಿಭಿನ್ನ ಸಾಧನಗಳಲ್ಲಿ ನಿಮ್ಮ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ಪರೀಕ್ಷಿಸಿ\n\n---\n\n🆘 ಸಮಸ್ಯೆ ಪರಿಹಾರ:\n1. ನೀವು dist/ ನ ವಿಷಯಗಳನ್ನು ಅಪ್‌ಲೋಡ್ ಮಾಡುತ್ತಿದ್ದೀರಿ ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ, ಸಂಪೂರ್ಣ ಪ್ರಾಜೆಕ್ಟ್ ಅನ್ನು ಅಲ್ಲ\n2. index.html ಮೂಲ ಡೈರೆಕ್ಟರಿಯಲ್ಲಿದೆ ಎಂದು ಪರಿಶೀಲಿಸಿ\n3. ಹೋಸ್ಟಿಂಗ್ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್‌ನಲ್ಲಿ ದೋಷ ಲಾಗ್‌ಗಳನ್ನು ಪರಿಶೀಲಿಸಿ\n4. ಎಲ್ಲಾ ಫೈಲ್‌ಗಳು ಸರಿಯಾಗಿ ಅಪ್‌ಲೋಡ್ ಆಗಿದ್ದವು ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ"])</script><script>self.__next_f.push([1,"1c:{\"name\":\"ವೈಯಕ್ತಿಕ ಮುಖಪುಟ\",\"prompt\":\"ಸ್ವಯಂ ಪರಿಚಯ, ಕೌಶಲ್ಯ ಪ್ರದರ್ಶನ, ಯೋಜನೆ ಪೋರ್ಟ್ಫೋಲಿಯೋ, ಮತ್ತು ಸಂಪರ್ಕ ಮಾಹಿತಿಯನ್ನು ಒಳಗೊಂಡ ಆಧುನಿಕ ವೈಯಕ್ತಿಕ ಮುಖಪುಟವನ್ನು ರಚಿಸಿ. ವಿನ್ಯಾಸ ಅಗತ್ಯಗಳು: ಕನಿಷ್ಠ ಆಧುನಿಕ ಶೈಲಿ, ಕತ್ತಲೆ ಥೀಮ್, ನಯವಾದ ಸ್ಕ್ರೋಲಿಂಗ್ ಅನಿಮೇಶನ್‌ಗಳು.\"}\n1d:{\"name\":\"ಕಂಪನಿ ವೆಬ್‌ಸೈಟ್\",\"prompt\":\"ಮುಖ್ಯಪುಟ ಪ್ರದರ್ಶನ, ಉತ್ಪನ್ನಗಳು ಮತ್ತು ಸೇವೆಗಳು, ನಮ್ಮ ಬಗ್ಗೆ, ಪರಿಹಾರಗಳು, ಮತ್ತು ಸಂಪರ್ಕ ಪುಟಗಳನ್ನು ಒಳಗೊಂಡ ವೃತ್ತಿಪರ ತಂತ್ರಜ್ಞಾನ ಕಂಪನಿ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಿ. ದೃಶ್ಯ ಶೈಲಿ: ವ್ಯವಹಾರ ವೃತ್ತಿಪರ, ನೀಲಿ ಟೋನ್, ನಂಬಿಕೆ ಮತ್ತು ವೃತ್ತಿಪರತೆಯನ್ನು ಒತ್ತಿಹೇಳುವುದು.\"}\n1e:{\"name\":\"ಇ-ಕಾಮರ್ಸ್ ವೇದಿಕೆ\",\"prompt\":\"ಉತ್ಪನ್ನ ಪ್ರದರ್ಶನ, ಶಾಪಿಂಗ್ ಕಾರ್ಟ್, ಬಳಕೆದಾರ ವ್ಯವಸ್ಥೆ, ಆದೇಶ ನಿರ್ವಹಣೆ, ಮತ್ತು ಪಾವತಿ ಪ್ರಕ್ರಿಯೆಯನ್ನು ಒಳಗೊಂಡ ಸಂಪೂರ್ಣ ಇ-ಕಾಮರ್ಸ್ ಶಾಪಿಂಗ್ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ಅಭಿವೃದ್ಧಿಪಡಿಸಿ. ವಿನ್ಯಾಸ ಅಗತ್ಯಗಳು: ಬಳಕೆದಾರ ಸ್ನೇಹಿ ಅನುಭವ, ಸ್ಪಷ್ಟ ದೃಶ್ಯ ಹಿರಾರ್ಕಿ, ಮೊಬೈಲ್ ಪ್ರತಿಸ್ಪಂದನಶೀಲ.\"}"])</script><script>self.__next_f.push([1,"\n1f:{\"name\":\"ಬ್ಲಾಗ್ ವ್ಯವಸ್ಥೆ\",\"prompt\":\"ಲೇಖನ ಪ್ರಕಟಣೆ, ವರ್ಗ ಟ್ಯಾಗ್‌ಗಳು, ಕಾಮೆಂಟ್ ಕಾರ್ಯಕ್ಷಮತೆ, ಮತ್ತು ಬಳಕೆದಾರ ನಿರ್ವಹಣೆಯನ್ನು ಬೆಂಬಲಿಸುವ ವೈಯಕ್ತಿಕ ಬ್ಲಾಗ್ ವೆಬ್‌ಸೈಟ್ ನಿರ್ಮಿಸಿ. ಇಂಟರ್‌ಫೇಸ್ ಶೈಲಿ: ಸ್ವಚ್ಛವಾದ ಓದು ಅನುಭವ, ಪ್ರತಿಕ್ರಿಯಾಶೀಲ ವಿನ್ಯಾಸ, ಡಾರ್ಕ್/ಲೈಟ್ ಥೀಮ್ ಟಾಗಲ್.\"}\n20:{\"name\":\"ಡ್ಯಾಶ್‌ಬೋರ್ಡ್\",\"prompt\":\"ಡೇಟಾ ಅಂಕಿಅಂಶ ಚಾರ್ಟ್‌ಗಳು, ಬಳಕೆದಾರ ನಿರ್ವಹಣೆ, ವ್ಯವಸ್ಥೆ ಸೆಟ್ಟಿಂಗ್‌ಗಳು, ಮತ್ತು ವೈಯಕ್ತಿಕ ಕೇಂದ್ರವನ್ನು ಒಳಗೊಂಡ ನಿರ್ವಹಣಾ ಡ್ಯಾಶ್‌ಬೋರ್ಡ್ ರಚಿಸಿ. ಇಂಟರ್‌ಫೇಸ್ ಶೈಲಿ: ಆಧುನಿಕ ಫ್ಲಾಟ್ ವಿನ್ಯಾಸ, ಸೈಡ್‌ಬಾರ್ ನ್ಯಾವಿಗೇಶನ್, ಡಾರ್ಕ್/ಲೈಟ್ ಥೀಮ್ ಸ್ವಿಚಿಂಗ್.\"}\n21:{\"name\":\"ಆನ್‌ಲೈನ್ ಶಿಕ್ಷಣ ವೇದಿಕೆ\",\"prompt\":\"ಪಾಠ ಪ್ರದರ್ಶನ, ವೀಡಿಯೊ ಪ್ಲೇಬ್ಯಾಕ್, ಕಲಿಕೆ ಪ್ರಗತಿ, ಉಪನ್ಯಾಸಕ ನಿರ್ವಹಣೆ, ಮತ್ತು ಸಮುದಾಯ ವೈಶಿಷ್ಟ್ಯಗಳನ್ನು ಒಳಗೊಂಡ ಆನ್‌ಲೈನ್ ಶಿಕ್ಷಣ ಕಲಿಕೆ ವೇದಿಕೆ ನಿರ್ಮಿಸಿ. ತಾಂತ್ರಿಕ ಅವಶ್ಯಕತೆಗಳು: ಸ್ಮೂತ್ ವೀಡಿಯೊ ಪ್ಲೇಬ್ಯಾಕ್, ಪ್ರಗತಿ ಟ್ರ್ಯಾಕಿಂಗ್, ಬಹು-ಉಪಕರಣ ಸಿಂಕ್.\"}\n22:{\"name\":\"ಉಪಹಾರ ಗೃಹ ವೆಬ"])</script><script>self.__next_f.push([1,"್‌ಸೈಟ್\",\"prompt\":\"ಪ್ರೀಮಿಯಂ ರೆಸ್ಟೋರೆಂಟ್ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಿ, ಇದರಲ್ಲಿ ಮೆನು ಪ್ರದರ್ಶನ, ಆನ್‌ಲೈನ್ ಮೀಟಿಂಗ್, ರೆಸ್ಟೋರೆಂಟ್ ಪರಿಚಯ ಮತ್ತು ಸ್ಥಳ ಮಾಹಿತಿ ಒಳಗೊಂಡಿರುತ್ತದೆ. ವಿನ್ಯಾಸ ಶೈಲಿ: ಹಿತಕರ ಮತ್ತು ಶ್ರೇಷ್ಠ, ಆಹಾರ ಛಾಯಾಚಿತ್ರ, ಹಿತಕರ ಬಣ್ಣಗಳು, ಗುಣಮಟ್ಟವನ್ನು ಹೈಲೈಟ್ ಮಾಡುವುದು.\"}\n23:{\"name\":\"ಜಿಮ್ ನಿರ್ವಹಣಾ ವ್ಯವಸ್ಥೆ\",\"prompt . \"ಶಾಖೆಯಿಂದ ನಿಯೋಜಿಸಿ\" → ಮುಖ್ಯ ಶಾಖೆ ಆಯ್ಕೆಮಾಡಿ\n5. ನಿಮ್ಮ ಸೈಟ್ ಅನ್ನು username.github.io/repository-name ನಲ್ಲಿ ಪ್ರವೇಶಿಸಿ\n\n---\n\n🔧 ಸುಧಾರಿತ ನಿಯೋಜನೆ (ವಿಕಸಕರಿಗಾಗಿ):\n\nGit ಆಧಾರಿತ ಸ್ವಯಂ ನಿಯೋಜನೆ\n1. ಸಂಪೂರ್ಣ ಪ್ರಾಜೆಕ್ಟ್ (ಮೂಲ ಕೋಡ್ ಸೇರಿದಂತೆ) ಅನ್ನು GitHub/GitLab ಗೆ ಪುಶ್ ಮಾಡಿ\n2. ನಿಮ್ಮ ರೆಪೊವನ್ನು Vercel/Netlify ಗೆ ಸಂಪರ್ಕಿಸಿ\n3. ನಿರ್ಮಾಣ ಸೆಟ್ಟಿಂಗ್‌ಗಳನ್ನು ಸಂರಚಿಸಿ:\n   - ನಿರ್ಮಾಣ ಆಜ್ಞೆ: npm run build\n   - ಪ್ರಕಟಣೆ ಡೈರೆಕ್ಟರಿ: dist\n   - Node.js ಆವೃತ್ತಿ: 16.x ಅಥವಾ ಹೆಚ್ಚಿನದು\n4. ಪ್ರತಿಯೊಂದು ಪುಶ್ ನಿರ್ಮಾಣ ಮತ್ತು ನಿಯೋಜನೆಗೆ ಸ್ವಯಂಚಾಲಿತವಾಗಿ ಪ್ರಾರಂಭವಾಗುತ್ತದೆ\n\nಪಾರಂಪರಿಕ ಸರ್ವರ್ ನಿಯೋಜನೆ\nನೀವು ನಿಮ್ಮದೇ ಆದ ಸರ್ವರ್ ಹೊಂದಿದ್ದರೆ:\n1. dist/ ಡೈರೆಕ್ಟರಿಯಲ್ಲಿನ ಎಲ್ಲಾ ಫೈಲ್‌ಗಳನ್ನು ನಿಮ್ಮ ಸರ್ವರ್‌ನ ವೆಬ್ ರೂಟ್‌ಗೆ ಅಪ್‌ಲೋಡ್ ಮಾಡಿ\n2. ಸರ್ವರ್ ಸ್ಥಿರ ಫೈಲ್ ಹೋಸ್ಟಿಂಗ್ ಅನ್ನು ಬೆಂಬಲಿಸುತ್ತದೆಯೇ ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ\n3. ನಿಮ್ಮ ಡೊಮೇನ್ ಮೂಲಕ ನಿಮ್ಮ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ಪ್ರವೇಶಿಸಿ\n\n---\n\n💰 ಬೆಲೆ ಮಾಹಿತಿ:\n- Vercel: ವೈಯಕ್ತಿಕ ಬಳಕೆಗಾಗಿ ಉಚಿತ ಯೋಜನೆ ಸಾಕಷ್ಟು\n- Cloudflare Pages: ಸಂಪೂರ್ಣ ಉಚಿತ, ಯಾವುದೇ ಮಿತಿಗಳಿಲ್ಲ\n- Netlify: ಉಚಿತ ಯೋಜನೆ 100GB ಬ್ಯಾಂಡ್‌ವಿಡ್ತ್/ತಿಂಗಳು ಒಳಗೊಂಡಿದೆ\n- GitHub Pages: ಸಂಪೂರ್ಣ ಉಚಿತ, 100GB ಬ್ಯಾಂಡ್‌ವಿಡ್ತ್/ತಿಂಗಳು\n\n---\n\n🎯 ಶಿಫಾರಸುಗಳು:\n- ಆರಂಭಿಕರು: Vercel ಅಥವಾ Netlify (ಎಳೆ-ಬಿಡಿ ಅಪ್‌ಲೋಡ್)\n- ವೇಗ-ಕೇಂದ್ರಿತ: Cloudflare Pages\n- ದೀರ್ಘಕಾಲಿಕ ಯೋಜನೆಗಳು: GitHub Pages\n- ವಿಕಸಕರು: Git ಆಧಾರಿತ ಸ್ವಯಂ ನಿಯೋಜನೆ\n\n---\n\n⚡ ಸಲಹೆಗಳು:\n- ಎಲ್ಲಾ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್‌ಗಳು ಉಚಿತ HTTPS ಪ್ರಮಾಣಪತ್ರಗಳನ್ನು ಒದಗಿಸುತ್ತವೆ\n- ನೀವು ಕಸ್ಟಮ್ ಡೊಮೇನ್‌ಗಳನ್ನು ಬಾಂಡ್ ಮಾಡಬಹುದು (ಕೆಲವು ಪಾವತಿಸಿದ ಯೋಜನೆಗಳನ್ನು ಅಗತ್ಯವಿರಬಹುದು)\n- ನಿಯೋಜನೆಯ ನಂತರ, ವಿಭಿನ್ನ ಸಾಧನಗಳಲ್ಲಿ ನಿಮ್ಮ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ಪರೀಕ್ಷಿಸಿ\n\n---\n\n🆘 ಸಮಸ್ಯೆ ಪರಿಹಾರ:\n1. ನೀವು dist/ ನ ವಿಷಯಗಳನ್ನು ಅಪ್‌ಲೋಡ್ ಮಾಡುತ್ತಿದ್ದೀರಿ ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ, ಸಂಪೂರ್ಣ ಪ್ರಾಜೆಕ್ಟ್ ಅನ್ನು ಅಲ್ಲ\n2. index.html ಮೂಲ ಡೈರೆಕ್ಟರಿಯಲ್ಲಿದೆ ಎಂದು ಪರಿಶೀಲಿಸಿ\n3. ಹೋಸ್ಟಿಂಗ್ ಪ್ಲಾಟ್‌ಫಾರ್ಮ್‌ನಲ್ಲಿ ದೋಷ ಲಾಗ್‌ಗಳನ್ನು ಪರಿಶೀಲಿಸಿ\n4. ಎಲ್ಲಾ ಫೈಲ್‌ಗಳು ಸರಿಯಾಗಿ ಅಪ್‌ಲೋಡ್ ಆಗಿದ್ದವು ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ"])</script><script>self.__next_f.push([1,"2c:{\"file-desc\":\"$2d\",\"deploy-guide\":\"$2e\"}\n"])</script><script>self.__next_f.push([1,"1a:{\"name\":\"ವೆಬ್ ಕ್ರಿಯೇಟರ್\",\"home-desc\":\"AI ಜೊತೆ ಚಾಟ್ ಮಾಡಿ ":\"ವಿವಿಧ ಸ್ವರೂಪಗಳಲ್ಲಿ ಕಾರ್ಯಗಳನ್ನು ಸುಗಮಗೊಳಿಸಲು, ಪ್ರಗತಿಶೀಲ ಗಣಿತ, ಅಂಕಿಅಂಶ, ಯಂತ್ರ ಕಲಿಕೆ ಮತ್ತು ಡೇಟಾ ಸಂಸ್ಕರಣೆಗೆ ರಿಯಲ್-ಟೈಮ್‌ನಲ್ಲಿ ಪೈಥಾನ್ ಕೋಡ್ ಅನ್ನು ಚಲಾಯಿಸಿ.\",\"name\":\"ಡೇಟಾ ವಿಶ್ಲೇಷಣೆ\"},\"search\":{\"demos\":{\"0\":{\"title\":\"\",\"value\":\"ಈಗ ಅಮೆರಿಕದ ಥಿಯೇಟರ್‌ಗಳಲ್ಲಿ ಶ್ರೇಣೀಬದ್ಧವಾದ ಉತ್ತಮ ಚಿತ್ರಗಳು ಯಾವುವು?\"},\"1\":{\"title\":\"\",\"value\":\"ಇಂದು ಯಾವ ಷೇರುಗಳು ಗಮನಾರ್ಹ ಏರಿಕೆಗಳನ್ನು ಅನುಭವಿಸಿವೆ?\"},\"2\":{\"title\":\"\",\"value\":\"ಇಂದು ಬಿಡುಗಡೆಗೊಂಡ ಅತ್ಯಂತ ಗಮನಾರ್ಹ ಹೊಸ ಎಲೆಕ್ಟ್ರಾನಿಕ್ ಉತ್ಪನ್ನ ಯಾವುದು?\"}},\"desc\":\"ಪೂರ್ವ-ಶಿಕ್ಷಿತ ಡೇಟಾದ ಪಾರ್ಶ್ವದಲ್ಲಿ ನೈಜ-ಸಮಯದ ಒಳನೋಟಗಳನ್ನು ಪಡೆಯಿರಿ, ಪ್ರಸ್ತುತ ಘಟನೆಗಳು, ತುರ್ತು ಸುದ್ದಿಗಳು ಮತ್ತು ಅಭಿವೃದ್ಧಿ ಹೊಂದುತ್ತಿರುವ ವಿಷಯಗಳಿಗೆ ನಿಖರ ಮತ್ತು ಸಮಯೋಚಿತ ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ.\",\"name\":\"ಹುಡುಕಿ\"},\"text_to_image\":{\"demos\":{\"0\":{\"title\":\"\",\"value\":\"ಭವಿಷ್ಯದಲ್ಲಿ ಹಾರುವ ಕಾರಿನ ವಿನ್ಯಾಸವನ್ನು ರೂಪಿಸಿ.\"},\"1\":{\"title\":\"\",\"value\":\"ಹುಲ್ಲಿನಲ್ಲಿ ಓಡುತ್ತಿರುವ ಗೋಲ್ಡನ್ ರಿಟ್ರೀವರ್ನ ಚಿತ್ರಣವನ್ನು ರೇಖಾಚಿತ್ರವಾಗಿ ಬಿಡಿಸಿ.\"},\"2\":{\"title\":\"\",\"value\":\"ಒಬ್ಬ ವೃದ್ಧ ಮಹಿಳೆ ಸುಲಭವಾಗಿ ಕಾಫಿ ಕುಡಿಯುತ್ತಿರುವ ದೃಶ್ಯವನ್ನು ಚಿತ್ರಿಸಿ.\"}},\"desc\":\"ನೀವು ಮನಸ್ಸಿನಲ್ಲಿ ಹೊಂದಿರುವುದನ್ನು ಸರಳವಾಗಿ ವಿವರಿಸಿ, ಮತ್ತು ತಕ್ಷಣವೇ ಉನ್ನತ-ಗುಣಮಟ್ಟದ ಚಿತ್ರಗಳನ್ನು ರಚಿಸಿ. ಯಾವುದೇ ವಿನ್ಯಾಸ ಕೌಶಲ್ಯಗಳ ಅಗತ್ಯವಿಲ್ಲ – ನಿಮ್ಮ ಕಲ್ಪನೆಯಷ್ಟೇ ಸಾಕು.\",\"name\":\"ಚಿತ್ರವನ್ನು ರಚಿಸಿ\"},\"thinking_mode\":{\"demos\":{\"0\":{\"title\":\"\",\"value\":\"9.11 ಅಥವಾ 9.8, ಯಾವುದು ದೊಡ್ಡದು\"},\"1\":{\"title\":\"\",\"value\":\"'ಸಿಕ್ಸ್ ಡಿಗ್ರೀಸ್ ಆಫ್ ಸೆಪರೇಷನ್' ಸಿದ್ಧಾಂತವನ್ನು ಮಾದರಿಯಾಗಿಸಲು ಒಂದು ಕಾರ್ಯವನ್ನು ಯೋಚಿಸಿ ಮತ್ತು ಬರೆಯಿರಿ. ಸಾಮಾಜಿಕ ಜಾಲವನ್ನು ಗ್ರಾಫ್ ಆಗಿ ನೀಡಿದಾಗ, ಯಾವುದೇ ಎರಡು ಜನರ ನಡುವೆ ಅತೀ ಕಡಿಮೆ ದಾರಿ ಕಂಡುಹಿಡಿಯಿರಿ.\"}},\"desc\":\"DeepSeek R1 ನ ಶಕ್ತಿಯುತ ತರ್ಕ ಸಾಮರ್ಥ್ಯವನ್ನು ಯಾವುದೇ ಚಾಟ್ ಮಾದರಿಯೊಂದಿಗೆ ಹೆಚ್ಚಿಸಿ. ಸಕ್ರಿಯಗೊಳಿಸಿದಾಗ, ನಿಮ್ಮ ಆಯ್ಕೆಮಾಡಿದ ಮಾದರಿ R1 ನ ಸುಧಾರಿತ ಚೇನ್ ಆಫ್ ಥಾಟ್ ಪ್ರಕ್ರಿಯೆಯನ್ನು ಸ್ವೀಕರಿಸುತ್ತದೆ, ಸಂಕೀರ್ಣ ಪ್ರಶ್ನೆಗಳಿಗೆ ಹೆಚ್ಚು ನಿಖರ, ತಾರ್ಕಿಕ ಮತ್ತು ಒಳನೋಟಪೂರ್ಣ ಪ್ರತಿಕ್ರಿಯೆಗಳನ್ನು ಒದಗಿಸುತ್ತದೆ. ಪ್ರತಿ ಪ್ರಶ್ನೆಗೆ 1 ಹೆಚ್ಚುವರಿ ಸುಧಾರಿತ ಕ್ರೆಡಿಟ್ ವೆಚ್ಚವಾಗುತ್ತದೆ.\",\"name\":\"ಯೋಚಿಸಿ ({NAME})\"},\"create_image\":{\"name\":\"ಚಿತ್ರ\",\"desc\":\"ನೀವು ಬಯಸಿದ ಚಿತ್ರಗಳನ್ನು ಕೇವಲ ವರ್ಣನೆ ಮೂಲಕವೇ ಉನ್ನತ-ಗುಣಮಟ್ಟದ ಚಿತ್ರಗಳನ್ನು ರಚಿಸಿ. ಪಠ್ಯ ವಿವರಣೆಗಳಿಂದ ಹೊಸ ಚಿತ್ರಗಳನ್ನು ರಚಿಸಿ, ಅಥವಾ ಪಠ್ಯ ಸೂಚನೆಗಳೊಂದಿಗೆ ಇತ್ತೀಚಿನ ಚಿತ್ರಗಳನ್ನು ಪರಿವರ್ತಿಸಿ ಮತ್ತು ಸಂಪಾದಿಸಿ. ನಮ್ಮ ಸಾಧನವು ನಿಮ್ಮ ಕಲ್ಪನೆಗಳನ್ನು ತಕ್ಷಣವೇ ಜೀವಂತವಾಗಿಸುತ್ತದೆ.\",\"demos\":[],\"toolName\":\"ಚಿತ್ರವನ್ನು ರಚಿಸಿ\"}},\"auto\":\"ಆಟೋ\",\"summarize\":\"ಸಾರಾಂಶಗೊಳಿಸಿ\",\"describeImage\":\"ಈ ಚಿತ್ರವನ್ನು ವಿವರಿಸಿ\",\"attention\":\"ಗಮನಿಸಿ\",\"upgrade\":\"ನವೀಕರಿಸಿ\",\"enable\u0026continue\":\"ಸಕ್ರಿಯಗೊಳಿಸಿ ಮತ್ತು ಮುಂದುವರೆಯಿರಿ\",\"cancel\":\"ರದ್ದುಮಾಡು\",\"imageInputHint\":\"ಈ ಚಿತ್ರದ ಬಗ್ಗೆ ಪ್ರಶ್ನೆಗಳನ್ನು ಕೇಳಿ\",\"selectedTextInputHint\":\"ಆಯ್ದ ಪಠ್ಯದ ಬಗ್ಗೆ ಪ್ರಶ್ನೆಗಳನ್ನು ಕೇಳಿ\",\"fileInputHint\":\"ಈ ಫೈಲ್ ಬಗ್ಗೆ ಪ್ರಶ್ನೆಗಳನ್ನು ಕೇಳಿ\",\"ExtractText\":\"ಪಠ್ಯವನ್ನು ಹೊರತೆಗೆಯಿರಿ\",\"describleImage\":\"ವಿವರಿಸಿ\",\"audio-to-text\":\"ಆಡಿಯೋದಿಂದ ಪಠ್ಯಕ್ಕೆ\",\"audio-meeting-minutes\":\"ಸಭೆಯ ನೋಟ್ಸ್\",\"pin\":\"ತಗಲಿ ಹಾಕು\",\"unpin\":\"ಅನ್ಪಿನ್\",\"textFromSelect\":\"ನಿಮ್ಮ ಆಯ್ಕೆಯಿಂದ ಪಠ್ಯ\",\"textFromOCR\":\"OCRನಿಂದ ಪಠ್ಯ\",\"textFromTranslate\":\"ಅನುವಾದದಿಂದ ಪಠ್ಯ\",\"textFromWrite\":\"ಬರೆಯುವಿಂದ ಪಠ್ಯ\",\"textFromGrammar\":\"ವ್ಯಾಕರಣದಿಂದ ಪಠ್ಯ\",\"quoteText\":\"ಉಲ್ಲೇಖದ ಪಠ್ಯ\",\"mentionBot\":\"ಮಾದರಿಯನ್ನು ಉಲ್ಲೇಖಿಸಿ\",\"mentionGPTs\":\"GPT-ಗಳನ್ನು ಉಲ್ಲೇಖಿಸಿ\",\"sidebarPanel\":{\"pressToSubmit\":\"ಸಲ್ಲಿಸಲು {key} ಒತ್ತಿರಿ\",\"stopGenerating\":\"ಉತ್ಪಾದಿಸುವುದನ್ನು ನಿಲ್ಲಿಸಿ\",\"deleteAllConfirmTitle\":\"ಎಲ್ಲವನ್ನು ಅಳಿಸಿ\",\"searchTabLabel\":\"ಹುಡುಕು\",\"regenerate\":\"ಪ್ರತಿಕ್ರಿಯೆಯನ್ನು ಪುನರುತ್ಪಾದಿಸಿ\",\"submitOption\":\"ಆಯ್ಕೆಯನ್ನು ಸಲ್ಲಿಸಿ\",\"addToStarred\":\"ಪ್ರಮುಖವಾಗಿ ಸೇರಿಸಿ\",\"includeStarred\":\"ಪ್ರಮುಖವಾಗಿ ಸೇರಿಸಿ\",\"removeFromStarred\":\"ಪ್ರಮುಖದಿಂದ ತೆಗೆದುಹಾಕಿ\",\"starred\":\"ಪ್ರಮುಖ\",\"all\":\"ಎಲ್ಲಾ\"},\"copied\":\"ನಕಲು ಮಾಡಲಾಗಿದೆ\",\"copy\":\"ನಕಲು ಮಾಡಿ\",\"compareWith\":\"{NAME} ಜೊತೆ ಹೋಲಿಸಿ\",\"stop\":\"ನಿಲ್ಲಿಸು\",\"readAloud\":\"ಜೋರಾಗಿ ಓದಿ\",\"translateInto\":\"ಇದನ್ನು ಅನುವಾದಿಸಿ: {lang}\",\"modelDesc\":{\"bard\":\"Google ನಿಂದ ಮಾಡೆಲ್ (PaLM 2), ಸುಧಾರಿತ ತಾರ್ಕಿಕ ಕಾರ್ಯಗಳಲ್ಲಿ ಉತ್ತಮವಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತದೆ.\",\"claude-3-haiku\":\"ಆಂಥ್ರೋಪಿಕ್ ಅತ್ಯಂತ ಕಂಪ್ಯಾಕ್ಟ್ ಮಾದರಿ, ಹತ್ತಿರದಲ್ಲಿ ತಕ್ಷಣ ಪ್ರತಿಸ್ಪಂದನೆ ಮತ್ತು ಮಾನವ ಪರಿಚಯಗಳನ್ನು ಅನುಕರಿಸುವ ಸ್ವಚ್ಛ ಏಐ ಅನುಭವಗಳಿಗಾಗಿ ರಚಿಸಲಾಗಿದೆ\",\"claude-3-opus\":\"ಅಂಥ್ರೋಪಿಕ್ ಅತ್ಯಂತ ಶಕ್ತಿಶಾಲಿ ಮಾದರಿ, ಅತ್ಯುನ್ನತ ಜಟಿಲ ಕಾರ್ಯಗಳ ಮೇಲೆ ಅತ್ಯುತ್ತಮ ಪ್ರದರ್ಶನ ಮತ್ತು ಮಾನವಕ್ಕೆ ಸಮಾನವಾದ ಅರಿವು ಹೊಂದಿದೆ.\",\"claude-3-sonnet\":\"ಬುದ್ಧಿ ಮತ್ತು ವೇಗದ ನಡುವೆ ಅಂಥ್ರೋಪಿಕ್ ಅತ್ಯಂತ ಸಮತುಲ್ಯ ಮಾದರಿ, ವಿವಿಧ ಕಾರ್ಯಗಳ ಮೇಲೆ ಆದಾಯಕಾರಿ.\",\"claude-3\":{\"5-sonnet\":\"Anthropic ನ ಇತ್ತೀಚಿನ ಮಾದರಿ, Claude 3 Opus ಗಿಂತ ಎರಡು ಪಟ್ಟು ವೇಗ ಮತ್ತು ಹೆಚ್ಚಿನ ಬುದ್ಧಿಮತ್ತೆ,_reasoning, knowledge, coding, ಮತ್ತು visual tasks ಗಳನ್ನು ಬಹಳವಾಗಿ ಸುಧಾರಿಸುತ್ತದೆ.\"},\"claude-instant\":\"ಆಂಥ್ರೊಪಿಕ್, ಕಡಿಮೆ ಲೇಟೆನ್ಸಿ, ಹೆಚ್ಚಿನ ಥ್ರೋಪುಟ್ ಬಳಕೆಯ ಪ್ರಕರಣಗಳಿಂದ ಮೂಲ ಮಾದರಿ.\",\"claude2\":\"ಸಂಕೀರ್ಣ ತಾರ್ಕಿಕತೆಯ ಅಗತ್ಯವಿರುವ ಕಾರ್ಯಗಳಲ್ಲಿ ಆಂಥ್ರೊಪಿಕ್‌ನಿಂದ ಉತ್ತಮ-ವರ್ಗದ ಕೊಡುಗೆಯ ಮಾದರಿ, ಉತ್ತಮ ಕಾರ್ಯಕ್ಷಮತೆ.\",\"gemini-1\":{\"5-flash\":\"ವೇಗ ಮತ್ತು ದಕ್ಷತೆಗಾಗಿ ಅನುಕೂಲಕರವಾದ Google ನ ಲಘು ಮಾದರಿ.\",\"5-pro\":\"ವಿವಿಧ ಕಾರ್ಯಗಳಲ್ಲಿ ಸಾಮಾನ್ಯ ಸಾಧನೆಗಾಗಿ Google ನ ಉತ್ತಮ ಮಾದರಿ.\"},\"gemini-pro\":\"Google ನ ಅತ್ಯಂತ ಸಮತೋಲಿತ ಮಾದರಿ, ಸಾಮರ್ಥ್ಯ ಮತ್ತು ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ಸಮರ್ಪಕವಾಗಿ ಮಿಶ್ರಣ ಮಾಡುತ್ತದೆ.\",\"gpt-3\":{\"5\":\"ಅತ್ಯಂತ ವೇಗವಾಗಿ, ಹೆಚ್ಚಿನ ದೈನಂದಿನ ಕಾರ್ಯಗಳಿಗೆ ಉತ್ತಮವಾಗಿದೆ.\"},\"gpt-4\":\"ಹೆಚ್ಚು ಸಮರ್ಥ ಮಾದರಿ, ಸುಧಾರಿತ ತಾರ್ಕಿಕತೆಯ ಅಗತ್ಯವಿರುವ ಸಂಕೀರ್ಣ ಕಾರ್ಯಗಳಿಗೆ ಉತ್ತಮವಾಗಿದೆ.\",\"gpt-4o\":\"OpenAI ನ ಉತ್ತಮ ಮಾದರಿ, ಗುಣಮಟ್ಟವನ್ನು ಕಾಪಾಡಿಕೊಂಡು ಸಂಕೀರ್ಣ ಕಾರ್ಯಗಳಿಗೆ ಉತ್ತಮ.\",\"gpt-4o-mini\":\"OpenAI ನ ಇತ್ತೀಚಿನ ಮಾದರಿ, ಚಾಟ್, ಕೋಡಿಂಗ್, ಮತ್ತು ತಾರ್ಕಿಕ ಕಾರ್ಯಗಳಿಗೆ ವೇಗವಾದ, ಉತ್ತಮ ಕಾರ್ಯಕ್ಷಮತೆಯನ್ನು ನಿತ್ಯ ಬಳಕೆಗೆ ಒದಗಿಸುತ್ತದೆ.\",\"gpt-5\":\"OpenAI ನ ಹೊಸತಮ ಮಾದರಿ, ಗುಣಮಟ್ಟವನ್ನು ಕಾಪಾಡಿಕೊಂಡು ಸಂಕೀರ್ಣ ಕಾರ್ಯಗಳಿಗೆ ಅತ್ಯುತ್ತಮ.\",\"llama-3\":\"Meta ನ ಹೊಸತಮ ಮಾದರಿ, ಗುಣಮಟ್ಟವನ್ನು ಕಾಪಾಡಿಕೊಂಡು ಸಂಕೀರ್ಣ ಕಾರ್ಯಗಳಿಗೆ ಅತ್ಯುತ್ತಮ.\",\"sider\":\"{SIDER} ಸನ್ನಿವೇಶದ ಆಧಾರದ ಮೇಲೆ ಉತ್ತಮ ಪ್ರತಿಕ್ರಿಯೆಗಾಗಿ GPT-4o mini, Claude 3 Haiku, Gemini 1.5 Flash, ಅಥವಾ Llama 3 ಅನ್ನು ಡೈನಾಮಿಕ್ ಆಯ್ಕೆ ಮಾಡುತ್ತದೆ.\"},\"modelCountTip\":{\"gpt-3\":{\"5\":\"ವೆಚ್ಚ \u003cm\u003e1 ಮೂಲ ಕ್ರೆಡಿಟ್\u003c/m\u003e.\",\"5-n_one\":\"ವೆಚ್ಚ \u003cm\u003e{count} ಮೂಲ ಕ್ರೆಡಿಟ್\u003c/m\u003e.\",\"5-n_other\":\"ವೆಚ್ಚ \u003cm\u003e{count} ಮೂಲ ಕ್ರೆಡಿ r\":{\"auth-failed\":\"ದಾಖಲಾತಿ ಪರಿಶೀಲನೆ ವಿಫಲವಾಗಿದೆ\",\"common-error\":\"ಸೇವೆಯಲ್ಲಿ ಸಮಸ್ಯೆ ಉಂಟಾಗಿದೆ, ದಯವಿಟ್ಟು ನಂತರ ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.\",\"CREATE_TEMPLATE_WISEBASE_FAILED\":\"ಜಾಲತಾಣ ದೋಷ, ಮೂಲಭೂತ WiseBase ರಚನೆ ವಿಫಲವಾಗಿದೆ\",\"USER_NOT_FOUND\":\"ಕ್ಷಮಿಸಿ, ನಿಮ್ಮ ಬಳಕೆದಾರ ಮಾಹಿತಿಯನ್ನು ನಾವು ಕಂಡುಹಿಡಿಯಲಿಲ್ಲ. ದಯವಿಟ್ಟು ಮತ್ತೆ ಲಾಗಿನ್ ಮಾಡಲು ಪ್ರಯತ್ನಿಸಿ.\",\"USER_UNAUTHORIZED\":\"ನಿಮ್ಮ ಲಾಗಿನ್ ಅಧಿವೇಶನ ಅವಧಿ ಮುಗಿದಿದೆ. ಮುಂದುವರಿಸಲು ದಯವಿಟ್ಟು ಮತ್ತೆ ಲಾಗಿನ್ ಮಾಡಿ.\",\"USER_ID_DECODE_FAILED\":\"ನಾವು ದೃಢೀಕರಣ ಸಮಸ್ಯೆಯನ್ನು ಎದುರಿಸಿದ್ದೇವೆ. ದಯವಿಟ್ಟು ಮತ್ತೆ ಲಾಗಿನ್ ಮಾಡಿ ಮತ್ತು ಮತ್ತೊಮ್ಮೆ ಪ್ರಯತ್ನಿಸಿ.\",\"CREATE_ONE_FAILED\":\"ರಚನೆ ವಿಫಲವಾಗಿದೆ. ದಯವಿಟ್ಟು ನಂತರ ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ. ಸಮಸ್ಯೆ ಮುಂದುವರಿದರೆ, ದಯವಿಟ್ಟು ಬೆಂಬಲವನ್ನು ಸಂಪರ್ಕಿಸಿ.\",\"GET_ONE_FAILED\":\"ಡೇಟಾ ಹಿಂಪಡೆಯಲು ವಿಫಲವಾಗಿದೆ. ದಯವಿಟ್ಟು ಪುಟವನ್ನು ತಾಜಾ ಮಾಡಿ ಮತ್ತು ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.\",\"UPDATE_ONE_FAILED\":\"ಡೇಟಾ ಹಿಂಪಡೆಯಲು ವಿಫಲವಾಗಿದೆ. ದಯವಿಟ್ಟು ಪುಟವನ್ನು ತಾಜಾ ಮಾಡಿ ಮತ್ತು ನಂತರ ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.\",\"BasicUserQuotaInsufficient\":\"ನೀವು ಮೂಲಭೂತ ಕೊಟಾದನ್ನು ಮುಗಿಸಿದ್ದೀರಿ. ಹೆಚ್ಚಿನ ಬಳಕೆಗಾಗಿ ನಿಮ್ಮ ಖಾತೆಯನ್ನು ನವೀಕರಿಸಿ.\",\"QuotaRateLimitExceeded\":\"ನೀವು ಪ್ರಸ್ತುತ ಬಳಕೆ ಮಿತಿಯನ್ನು ತಲುಪಿದ್ದೀರಿ. ಈ ಮಿತಿ ಎಲ್ಲಾ ಬಳಕೆದಾರರಿಗೆ ಸಮಾನ ಬಳಕೆಯನ್ನು ಖಚಿತಪಡಿಸುತ್ತದೆ. ದಯವಿಟ್ಟು ನಂತರ ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.\",\"QuotaAdvancedRateLimit\":\"ನೀವು ಪ್ರಸ್ತುತ ಉನ್ನತ ಪಠ್ಯದ ಬಳಕೆ ಮಿತಿಯನ್ನು ತಲುಪಿದ್ದೀರಿ. ನೀವು ತಕ್ಷಣವೇ ಇತರ ಮಾದರಿಯನ್ನು ಬಳಸುವಂತೆ ಮುಂದುವರಿಸಬಹುದು.\",\"QuotaBasicRateLimit\":\"ನೀವು ಪ್ರಸ್ತುತ ಮೂಲಭೂತ ಪಠ್ಯದ ಬಳಕೆ ಮಿತಿಯನ್ನು ತಲುಪಿದ್ದೀರಿ. ನೀವು ತಕ್ಷಣವೇ ಇತರ ಮಾದರಿಯನ್ನು ಬಳಸುವಂತೆ ಮುಂದುವರಿಸಬಹುದು.\",\"UPLOAD_FILE_FAILED\":\"ಕಡತ ಅಪ್ಲೋಡ್ ವಿಫಲವಾಗಿದೆ. ದಯವಿಟ್ಟು ನಂತರ ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.\",\"FILE_ALREADY_EXIST\":\"ವೆಬ್‌ಪುಟವನ್ನು ಉಳಿಸಲಾಗಿದೆ, ದಯವಿಟ್ಟು ಕಡತ ಪಟ್ಟಿ ಪರಿಶೀಲಿಸಿ.\",\"UNSUPPORTED_FILE\":\"ಪ್ರಸ್ತುತ ಕಡತ ಪ್ರಕಾರವನ್ನು ತಾತ್ಕಾಲಿಕವಾಗಿ ಬೆಂಬಲಿಸಲಾಗುವುದಿಲ್ಲ.\",\"OPEN_SEARCH_FAILED\":\"ಜಾಲತಾಣ ಸಂಪರ್ಕದಲ್ಲಿ ಸಮಸ್ಯೆ ಇದೆ. ದಯವಿಟ್ಟು ನಂತರ ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.\",\"CHAT_WITH_LLM_FAILED\":\"AI ಪ್ರತಿಕ್ರಿಯೆ ವಿಫಲವಾಗಿದೆ. ದಯವಿಟ್ಟು ನಂತರ ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಿ.\",\"CHAT_USER_CANCELED\":\"ಬಳಕೆದಾರರಿಂದ ಕಾರ್ಯ ರದ್ದುಗೊಂಡಿದೆ.\",\"CHAT_FILES_NOT_COMPLETE\":\"ಈ ಕಡತವನ್ನು AI ಪ್ರಕ್ರಿಯೆಗೊಳಿಸುತ್ತಿ ‌ಗಳ ಬಳಕೆ 1500 ಕ್ಕಿಂತ ಕಡಿಮೆ ಇದ್ದಾಗ ಲಭ್ಯವಿರುತ್ತದೆ (ಬೂಸ್ಟರ್ ಪ್ಯಾಕ್ ಕ್ರೆಡಿಟ್‌ಗಳು ವಿನಾಯಿತಿ). ಮುಂದುವರಿಸಲು, ದಯವಿಟ್ಟು ಬೂಸ್ಟರ್ ಪ್ಯಾಕ್ ಖರೀದಿಸಿ.\",\"elite-credit-limit\":\"ನೀವು ಎಲೈಟ್ ಕ್ರೆಡಿಟ್‌ಗಳನ್ನು ಮುಗಿಸಿದ್ದೀರಿ. ಇನ್ನಷ್ಟು ಪಡೆಯಲು ಅಪ್‌ಗ್ರೇಡ್ ಮಾಡಿ.\",\"unlimited-elite-credit-limit\":\"ನಿಮ್ಮ ಎಲೈಟ್ ಕ್ರೆಡಿಟ್ಗಳು ಮುಗಿದಿವೆ. ನಿಮ್ಮ ಕ್ರೆಡಿಟ್ಗಳು ಮರುಹೊಂದಿದ ನಂತರ ಮುಂದಿನ ತಿಂಗಳು ಮತ್ತೆ ಪ್ರಯತ್ನಿಸಬಹುದು.\",\"try-these\":\"ಇವುಗಳನ್ನು ಪ್ರಯತ್ನಿಸಿ:\",\"intelligence\":\"ಬುದ್ಧಿಮತ್ತೆ\",\"cost\":\"ವೆಚ್ಚ\",\"model-no-image\":\"ಪ್ರಸ್ತುತ ಮೋಡ್ ಚಿತ್ರಗಳ ಅರ್ಥೈಸುವಿಕೆಯನ್ನು ಬೆಂಬಲಿಸುವುದಿಲ್ಲ\",\"model-desc-free\":\"ಮೂಲ ಕ್ರೆಡಿಟ್ ಡೈನಾಮಿಕ್ ಬಿಲ್ಲಿಂಗ್ ಬಳಸಿ, ದೈನಂದಿನ ಕಾರ್ಯಗಳಿಗೆ ಸೂಕ್ತವಾಗಿದೆ.\",\"model-desc-advanced\":\"ಎಲೈಟ್ ಕ್ರೆಡಿಟ್ ಡೈನಾಮಿಕ್ ಬಿಲ್ಲಿಂಗ್ ಬಳಸಿ, ಸಂಕೀರ್ಣ ಮತ್ತು ಸಂಪೂರ್ಣ ಯೋಜನೆಗಳಿಗೆ ಸೂಕ್ತವಾಗಿದೆ.\",\"preset-create-prompt\":[{\"name\":\"ವೈಯಕ್ತಿಕ ಮುಖಪುಟ\",\"prompt\":\"ಸ್ವಯಂ ಪರಿಚಯ, ಕೌಶಲ್ಯ ಪ್ರದರ್ಶನ, ಯೋಜನೆ ಪೋರ್ಟ್ಫೋಲಿಯೋ, ಮತ್ತು ಸಂಪರ್ಕ ಮಾಹಿತಿಯನ್ನು ಒಳಗೊಂಡ ಆಧುನಿಕ ವೈಯಕ್ತಿಕ ಮುಖಪುಟವನ್ನು ರಚಿಸಿ. ವಿನ್ಯಾಸ ಅಗತ್ಯಗಳು: ಕನಿಷ್ಠ ಆಧುನಿಕ ಶೈಲಿ, ಕತ್ತಲೆ ಥೀಮ್, ನಯವಾದ ಸ್ಕ್ರೋಲಿಂಗ್ ಅನಿಮೇಶನ್‌ಗಳು.\"},{\"name\":\"ಕಂಪನಿ ವೆಬ್‌ಸೈಟ್\",\"prompt\":\"ಮುಖ್ಯಪುಟ ಪ್ರದರ್ಶನ, ಉತ್ಪನ್ನಗಳು ಮತ್ತು ಸೇವೆಗಳು, ನಮ್ಮ ಬಗ್ಗೆ, ಪರಿಹಾರಗಳು, ಮತ್ತು ಸಂಪರ್ಕ ಪುಟಗಳನ್ನು ಒಳಗೊಂಡ ವೃತ್ತಿಪರ ತಂತ್ರಜ್ಞಾನ ಕಂಪನಿ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಿ. ದೃಶ್ಯ ಶೈಲಿ: ವ್ಯವಹಾರ ವೃತ್ತಿಪರ, ನೀಲಿ ಟೋನ್, ನಂಬಿಕೆ ಮತ್ತು ವೃತ್ತಿಪರತೆಯನ್ನು ಒತ್ತಿಹೇಳುವುದು.\"},{\"name\":\"ಇ-ಕಾಮರ್ಸ್ ವೇದಿಕೆ\",\"prompt\":\"ಉತ್ಪನ್ನ ಪ್ರದರ್ಶನ, ಶಾಪಿಂಗ್ ಕಾರ್ಟ್, ಬಳಕೆದಾರ ವ್ಯವಸ್ಥೆ, ಆದೇಶ ನಿರ್ವಹಣೆ, ಮತ್ತು ಪಾವತಿ ಪ್ರಕ್ರಿಯೆಯನ್ನು ಒಳಗೊಂಡ ಸಂಪೂರ್ಣ ಇ-ಕಾಮರ್ಸ್ ಶಾಪಿಂಗ್ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ಅಭಿವೃದ್ಧಿಪಡಿಸಿ. ವಿನ್ಯಾಸ ಅಗತ್ಯಗಳು: ಬಳಕೆದಾರ ಸ್ನೇಹಿ ಅನುಭವ, ಸ್ಪಷ್ಟ ದೃಶ್ಯ ಹಿರಾರ್ಕಿ, ಮೊಬೈಲ್ ಪ್ರತಿಸ್ಪಂದನಶೀಲ.\"},{\"name\":\"ಬ್ಲಾಗ್ ವ್ಯವಸ್ಥೆ\",\"prompt\":\"ಲೇಖನ ಪ್ರಕಟಣೆ, ವರ್ಗ ಟ್ಯಾಗ್‌ಗಳು, ಕಾಮೆಂಟ್ ಕಾರ್ಯಕ್ಷಮತೆ, ಮತ್ತು ಬಳಕೆದಾರ ನಿರ್ವಹಣೆಯನ್ನು ಬೆಂಬಲಿಸುವ ವೈಯಕ್ತಿಕ ಬ್ಲಾಗ್ ವೆಬ್‌ಸೈಟ್ ನಿರ್ಮಿಸಿ. ಇಂಟರ್‌ಫೇಸ್ ಶೈಲಿ: ಸ್ವಚ್ಛವಾದ ಓದು ಅನುಭವ, ಪ್ರತಿಕ್ರಿಯಾಶೀಲ ವಿನ್ಯಾಸ, ಡಾರ್ಕ್/ಲೈಟ್ ಥೀಮ್ ಟಾಗಲ್.\"},{\"name\":\"ಡ್ಯಾಶ್‌ಬೋರ್ಡ್\",\"prompt\":\"ಡೇಟಾ ಅಂಕಿಅಂಶ ಚಾರ್ಟ್‌ಗಳು, ಬಳಕೆದಾರ ನಿರ್ವಹಣೆ, ವ್ಯವಸ್ಥೆ ಸೆಟ್ಟಿಂಗ್‌ಗಳು, ಮತ್ತು ವೈಯಕ್ತಿಕ ಕೇಂದ್ರವನ್ನು ಒಳಗೊಂಡ ನಿರ್ವಹಣಾ ಡ್ಯಾಶ್‌ಬೋರ್ಡ್ ರಚಿಸಿ. ಇಂಟರ್‌ಫೇಸ್ ಶೈಲಿ: ಆಧುನಿಕ ಫ್ಲಾಟ್ ವಿನ್ಯಾಸ, ಸೈಡ್‌ಬಾರ್ ನ್ಯಾವಿಗೇಶನ್, ಡಾರ್ಕ್/ಲೈಟ್ ಥೀಮ್ ಸ್ವಿಚಿಂಗ್.\"},{\"name\":\"ಆನ್‌ಲೈನ್ ಶಿಕ್ಷಣ ವೇದಿಕೆ\",\"prompt\":\"ಪಾಠ ಪ್ರದರ್ಶನ, ವೀಡಿಯೊ ಪ್ಲೇಬ್ಯಾಕ್, ಕಲಿಕೆ ಪ್ರಗತಿ, ಉಪನ್ಯಾಸಕ ನಿರ್ವಹಣೆ, ಮತ್ತು ಸಮುದಾಯ ವೈಶಿಷ್ಟ್ಯಗಳನ್ನು ಒಳಗೊಂಡ ಆನ್‌ಲೈನ್ ಶಿಕ್ಷಣ ಕಲಿಕೆ ವೇದಿಕೆ ನಿರ್ಮಿಸಿ. ತಾಂತ್ರಿಕ ಅವಶ್ಯಕತೆಗಳು: ಸ್ಮೂತ್ ವೀಡಿಯೊ ಪ್ಲೇಬ್ಯಾಕ್, ಪ್ರಗತಿ ಟ್ರ್ಯಾಕಿಂಗ್, ಬಹು-ಉಪಕರಣ ಸಿಂಕ್.\"},{\"name\":\"ಉಪಹಾರ ಗೃಹ ವೆಬ್‌ಸೈಟ್\",\"prompt\":\"ಪ್ರೀಮಿಯಂ ರೆಸ್ಟೋರೆಂಟ್ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ವಿನ್ಯಾಸಗೊಳಿಸಿ, ಇದರಲ್ಲಿ ಮೆನು ಪ್ರದರ್ಶನ, ಆನ್‌ಲೈನ್ ಮೀಟಿಂಗ್, ರೆಸ್ಟೋರೆಂಟ್ ಪರಿಚಯ ಮತ್ತು ಸ್ಥಳ ಮಾಹಿತಿ ಒಳಗೊಂಡಿರುತ್ತದೆ. ವಿನ್ಯಾಸ ಶೈಲಿ: ಹಿತಕರ ಮತ್ತು ಶ್ರೇಷ್ಠ, ಆಹಾರ ಛಾಯಾಚಿತ್ರ, ಹಿತಕರ ಬಣ್ಣಗಳು, ಗುಣಮಟ್ಟವನ್ನು ಹೈಲೈಟ್ ಮಾಡುವುದು.\"},{\"name\":\"ಜಿಮ್ ನಿರ್ವಹಣಾ ವ್ಯವಸ್ಥೆ\",\"prompt\":\"ಸದಸ್ಯ ನಿರ್ವಹಣೆ, ತರಗತಿ ಬುಕ್ಕಿಂಗ್, ತರಬೇತಿ ವ್ಯವಸ್ಥೆ, ಮತ್ತು ಸಾಧನ ನಿರ್ವಹಣೆ ಒಳಗೊಂಡ ಜಿಮ್ ನಿರ್ವಹಣಾ ವ್ಯವಸ್ಥೆಯನ್ನು ಅಭಿವೃದ್ಧಿಪಡಿಸಿ. ಪ್ರಮುಖ ವೈಶಿಷ್ಟ್ಯಗಳು: QR ಕೋಡ್ ಚೆಕ್-ಇನ್, ಫಿಟ್ನೆಸ್ ಟ್ರ್ಯಾಕಿಂಗ್, ವರ್ಕೌಟ್ ಯೋಜನೆ ರಚನೆ.\"},{\"name\":\"ಪೋರ್ಟ್‌ಫೋಲಿಯೊ ವೆಬ್‌ಸೈಟ್\",\"prompt\":\"ವಿನ್ಯಾಸಕರ ಪೋರ್ಟ್‌ಫೋಲಿಯೊ ವೆಬ್‌ಸೈಟ್, ಇದರಲ್ಲಿ ಯೋಜನೆ ಪ್ರದರ್ಶನ, ವಿನ್ಯಾಸ ತತ್ವಶಾಸ್ತ್ರ, ಕಾರ್ಯಪದ್ಧತಿ, ಮತ್ತು ಗ್ರಾಹಕರ ಮೆಚ್ಚುಗೆಗಳು ಒಳಗೊಂಡಿರುತ್ತವೆ. ದೃಶ್ಯ ಪರಿಣಾಮಗಳು: ಸೃಜನಾತ್ಮಕ ವಿನ್ಯಾಸ, ಉನ್ನತ-ಗುಣಮಟ್ಟದ ಚಿತ್ರ ಪ್ರದರ್ಶನ, ಪರಸ್ಪರ ಕ್ರಿಯಾತ್ಮಕ ಅನಿಮೇಶನ್‌ಗಳು.\"},{\"name\":\"ಸುದ್ದಿ ಪೋರ್ಟಲ್\",\"prompt\":\"ಲೇಖನ ಪಟ್ಟಿ, ವರ್ಗ ಶೋಧನೆ, ಹುಡುಕಾಟ ಕಾರ್ಯಕ್ಷಮತೆ, ಮತ್ತು ಟ್ರೆಂಡಿಂಗ್ ಶಿಫಾರಸುಗಳನ್ನು ಒಳಗೊಂಡ ಸುದ್ದಿಯ ವೆಬ್‌ಸೈಟ್ ಅನ್ನು ನಿರ್ಮಿಸಿ. ವಿನ್ಯಾಸ ಅಗತ್ಯಗಳು: ಸ್ಪಷ್ಟ ಮಾಹಿತಿ ವಾಸ್ತುಶಿಲ್ಪ, ವೇಗದ ಲೋಡ್, ಅತ್ಯುತ್ತಮ ಓದು ಅನುಭವ.\"},{\"name\":\"ಸಾಮಾಜಿಕ ಮಾಧ್ಯಮ ವೇದಿಕೆ\",\"prompt\":\"ಪೋಸ್ಟ್ ಪ್ರಕಟಣೆ, ಅನುಸರಣೆ ವ್ಯವಸ್ಥೆ, ಸಂದೇಶ ಚಾಟ್, ಮತ್ತು ಬಳಕೆದಾರ ಪ್ರೊಫೈಲ್‌ಗಳನ್ನು ಒಳಗೊಂಡ ಸಾಮಾಜಿಕ ಮಾಧ್ಯಮ ಅಪ್ಲಿಕೇಶನ್ ಅನ್ನು ಅಭಿವೃದ್ಧಿಪಡಿಸಿ. ಪರಸ್ಪರ ವೈಶಿಷ್ಟ್ಯಗಳು: ಲೈಕ್ಸ್ ಮತ್ತು ಕಾಮೆಂಟ್‌ಗಳು, ವಿಷಯ ಹಂಚಿಕೆ, ರಿಯಲ್-ಟೈಮ್ ಅಧಿಸೂಚನೆಗಳು, ಆಧುನಿಕ ಮೊಬೈಲ್-ಮೊದಲು ವಿನ್ಯಾಸ.\"},{\"name\":\"ಪ್ರಯಾಣ ಬುಕ್ಕಿಂಗ್ ವೆಬ್‌ಸೈಟ್\",\"prompt\":\"ಗಮ್ಯಸ್ಥಾನ ಹುಡುಕಾಟ, ಹೋಟೆಲ್ ಮೀಸಲು, ಪ್ರವಾಸ ಯೋಜನೆ, ಮತ್ತು ಬಳಕೆದಾರ ವಿಮರ್ಶೆಗಳನ್ನು ಒಳಗೊಂಡ ಪ್ರಯಾಣ ಬುಕ್ಕಿಂಗ್ ವೇದಿಕೆಯನ್ನು ರಚಿಸಿ. ವಿನ್ಯಾಸ ವೈಶಿಷ್ಟ್ಯಗಳು: ಸುಂದರ ಚಿತ್ರ ಪ್ರದರ್ಶನ, ಸುಲಭ ಬ
