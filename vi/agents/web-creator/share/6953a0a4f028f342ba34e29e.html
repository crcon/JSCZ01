hanh bên, chuyển đổi chủ đề tối/sáng.\"},{\"name\":\"Nền tảng giáo dục trực tuyến\",\"prompt\":\"Xây dựng một nền tảng học tập giáo dục trực tuyến bao gồm hiển thị khóa học, phát lại video, tiến trình học tập, quản lý giảng viên và các tính năng cộng đồng. Yêu cầu kỹ thuật: phát lại video mượt mà, theo dõi tiến trình, đồng bộ hóa đa thiết bị.\"},{\"name\":\"Trang web nhà hàng\",\"prompt\":\"Thiết kế trang web nhà hàng cao cấp bao gồm hiển thị thực đơn, đặt chỗ trực tuyến, giới thiệu nhà hàng và thông tin địa điểm. Phong cách thiết kế: ấm áp và thanh lịch, nhiếp ảnh thực phẩm, màu sắc ấm áp, nhấn mạnh chất lượng.\"},{\"name\":\"Hệ thống quản lý phòng gym\",\"prompt\":\"Phát triển hệ thống quản lý phòng gym bao gồm quản lý thành viên, đặt lớp học, hệ thống huấn luyện viên và quản lý thiết bị. Các tính năng chính: check-in mã QR, theo dõi thể hình, tạo kế hoạch tập luyện.\"},{\"name\":\"Trang web danh mục đầu tư\",\"prompt\":\"Trang web danh mục đầu tư của nhà thiết kế bao gồm trình bày dự án, triết lý thiết kế, quy trình làm việc và lời chứng thực của khách hàng. Hiệu ứng hình ảnh: bố cục sáng tạo, hiển thị hình ảnh chất lượng cao, hoạt ảnh tương tác.\"},{\"name\":\"Cổng thông tin tin tức\",\"prompt\":\"Xây dựng một trang web tin tức bao gồm danh sách bài viết, lọc danh mục, chức năng tìm kiếm và đề xuất xu hướng. Yêu cầu thiết kế: kiến trúc thông tin rõ ràng, tải nhanh, trải nghiệm đọc tuyệt vời.\"},{\"name\":\"Nền tảng mạng xã hội\",\"prompt\":\"Phát triển một ứng dụng mạng xã hội bao gồm đăng bài, hệ thống theo dõi, trò chuyện nhắn tin và hồ sơ người dùng. Các tính năng tương tác: thích \u0026 bình luận, chia sẻ nội dung, thông báo thời gian thực, thiết kế hiện đại ưu tiên di động.\"},{\"name\":\"Trang web đặt chỗ du lịch\",\"prompt\":\"Tạo một nền tảng đặt chỗ du lịch bao gồm tìm kiếm điểm đến, đặt phòng khách sạn, lập kế hoạch chuyến đi và đánh giá của người dùng. Điểm nhấn thiết kế: trình bày hình ảnh đẹp, quy trình đặt chỗ trực quan, tích hợp bản đồ.\"}],\"erro
