zglītības platforma\",\"prompt\":\"Izveidojiet tiešsaistes izglītības mācību platformu, kas ietver kursu parādīšanu, video atskaņošanu, mācību progresu, instruktoru pārvaldību un kopienas funkcijas. Tehniskās prasības: gluda video atskaņošana, progresa izsekošana, sinhronizācija vairākās ierīcēs.\"},{\"name\":\"Restorāna mājaslapa\",\"prompt\":\"Izstrādājiet augstākās klases restorāna mājaslapu, kas ietver ēdienkartes parādīšanu, tiešsaistes rezervāciju, restorāna ievadu un atrašanās vietas informāciju. Dizaina stils: silts un elegants, ēdienu fotogrāfija, siltas krāsas, uzsverot kvalitāti.\"},{\"name\":\"Sporta zāles pārvaldības sistēma\",\"prompt\":\"Izstrādājiet sporta zāles pārvaldības sistēmu, kas ietver biedru pārvaldību, nodarbību rezervāciju, treneru sistēmu un aprīkojuma pārvaldību. Galvenās funkcijas: QR koda reģistrācija, fitnesa izsekošana, treniņu plāna izveide.\"},{\"name\":\"Portfeļa mājaslapa\",\"prompt\":\"Dizainera portfeļa mājaslapa, kas ietver projektu demonstrāciju, dizaina filozofiju, darba procesu un klientu atsauksmes. Vizuālie efekti: radošs izkārtojums, augstas kvalitātes attēlu parādīšana, interaktīvas animācijas.\"},{\"name\":\"Ziņu portāls\",\"prompt\":\"Izveidojiet ziņu vietni, kas ietver rakstu sarakstus, kategoriju filtrēšanu, meklēšanas funkcionalitāti un populāro ieteikumus. Dizaina prasības: skaidra informācijas arhitektūra, ātra ielāde, lieliska lasīšanas pieredze.\"},{\"name\":\"Sociālo mediju platforma\",\"prompt\":\"Izstrādājiet sociālo mediju lietotni, kas ietver ziņu publicēšanu, sekošanas sistēmu, ziņojumu čatu un lietotāju profilus. Interaktīvās funkcijas: patīk un komentāri, satura koplietošana, reāllaika paziņojumi, moderns mobilajām ierīcēm pirmais dizains.\"},{\"name\":\"Ceļojumu rezervēšanas mājaslapa\",\"prompt\":\"Izveidojiet ceļojumu rezervēšanas platformu, kas ietver galamērķu meklēšanu, viesnīcu rezervācijas, ceļojumu plānošanu un lietotāju atsauksmes. Dizaina akcenti: skaista attēlu parādīšana, intuitīvs rezervēš
