ь зараз для необмежених кредитів зі знижкою \u003cb\u003e$1\u003c/b\u003e.\",\"errSiderApiOcrLimit\":\"Ви використали всі свої базові кредити. Будь ласка, оновіть, щоб продовжити доступ до цієї функції.\",\"errSiderApiSummaryVideoLimit\":\"Ви використали всі свої кредити. Будь ласка, оновіть або запросіть друзів, щоб отримати більше.\",\"errSiderApiTrialFeatLimit\":\"Ви досягли ліміту пробної версії для преміум-функції. Оновіть план, щоб розблокувати всі функції.\",\"errSiderAudioAdvancedLimit\":\"Вам потрібно більше розширених кредитів. Кожні 10 хвилин (або менше) аудіо коштують 1 розширений кредит. Оновіть або запросіть друзів, щоб отримати більше!\",\"errSiderBasicTextLimit\":\"Ви досягли ліміту швидкості для базового кредиту. Наразі існує обмеження у {count} повідомлень кожні 60 хвилин. Альтернативно, ви можете використовувати розширений кредит і повернутися пізніше.\",\"errSiderCreditFreqLimit\":\"Ви досягли поточного ліміту використання. Цей ліміт забезпечує справедливе використання для всіх користувачів. Будь ласка, спробуйте знову через {count} хвилин.\",\"errSiderCreditUsageLimit\":\"Досягнуто ліміту використання\",\"errSiderDataAnalysisCredit\":\"Ця відповідь потребує аналізу даних (1 розширений кредит). У вас закінчилися розширені кредити, тому оновіть або запросіть друзів, щоб отримати більше!\",\"errSiderDeviceBinded\":\"Будь ласка, увійдіть, щоб використовувати.\",\"errSiderDeviceLimitLogout\":\"Вас було виведено через досягнення ліміту пристроїв. Ви можете увійти знову, і це виведе найраніший активний пристрій у вашому обліковому записі.\",\"errSiderGPT4HighLoad\":\"Сервер OpenAI зараз зайнятий. Будь-ласка спробуйте пізніше.\",\"errSiderGPT4LimitDevice\":\"Будь ласка, \u003cb\u003eувійдіть\u003c/b\u003e спочатку, і \u003camb\u003eзапросіть своїх друзів\u003c/amb\u003e або \u003cta\u003eоновіть до преміум\u003c/ta\u003e, щоб отримати більше розширених кредитів.\",\"errSiderGPT4LimitLogin\":\"Оновіть або запросіть друзів, щоб розблокувати більше розширених кредитів для отримання більш інформативних відповідей.\",\"errSiderGPT4LimitPremium\":\"Ви використали всі свої щомісячні Advanced Credits. Оновіть свій план для отримання більшої щомісячної квоти або придбайте пакет підсилення Advanced Credits для негайного використання!\",\"errSiderGPT4LimitPremiumDiscount\":\"Ваші розширені кредити на цей місяць використані. Оновіть зараз для необмежених кредитів зі знижкою \u003cb\u003e$1\u003c/b\u003e, або зачекайте до наступного місяця (дата підписки).\",\"errSiderHighTrafficError\":\"Через високий трафік повторіть спробу пізніше або перейдіть на преміум-акаунт для швидшого доступу.\",\"errSiderHighTrafficTip\":\"Розгляньте \u003ca\u003eоновлення до преміум-облікового запису\u003c/a\u003e для стабільного доступу та підтримки нашого розвитку.\",\"errSiderLoginExpired\":\"Ваш сеанс закінчився, будь ласка, увійдіть знову\",\"errSiderNeedLogin\":\"Будь ласка, увійдіть, щоб використовувати.\",\"errSiderO1Limit1\":\"Модель OpenAI o1 користується великим попитом і досягла свого ліміту квоти. Не хвилюйтеся, ви також можете безкоштовно ставити питання OpenAI o1 на нашому сайті запитань та відповідей, керованому спільнотою: \u003ca\u003eask.sider.ai\u003c/a\u003e\",\"errSiderOpenaiFault\":\"Сервер Openai зайнятий. Перейдіть на {model} під час збою OpenAI.\",\"errSiderPremiumRequired\":\"Ця функція доступна виключно для преміум-користувачів. Оновіть зараз, щоб розблокувати цю функцію.\",\"errSiderProcessing\":\"Лише одне повідомлення за раз. Перш ніж надсилати інше повідомлення, дочекайтеся завершення будь-якої іншої відповіді або трохи зачекайте.\",\"errSiderTimeout\":\"Час запиту вичерпано. Будь ласка спробуйте ще раз.\",\"errSiderUnlimitedLimit\":\"Ви досягли тимчасового ліміту ({timesToUse} разів / {periodTime} годин) на Advanced Credits. Ми намагаємося отримати більше кредитів для вас. Нові кредити будуть доступні о {resetTime}. Потрібно більше зараз? Спробуйте booster pack!\",\"errSiderUserBanned\":\"Ваш обліковий запис було пр
