\"errSiderHighTrafficError\":\"트래픽이 많기 때문에 나중에 다시 시도하거나 더 빠른 액세스를 위해 프리미엄 계정으로 업그레이드하십시오.\",\"errSiderHighTrafficTip\":\"안정적인 액세스와 개발 지원을 위해 \u003ca\u003e프리미엄 계정으로 업그레이드\u003c/a\u003e하는 것을 고려하십시오.\",\"errSiderLoginExpired\":\"로그인이 만료되었습니다. 다시 로그인해 주세요.\",\"errSiderNeedLogin\":\"이용하시려면 로그인해주세요.\",\"errSiderO1Limit1\":\"OpenAI o1 모델은 수요가 많아 할당량 한도에 도달했습니다. 걱정하지 마세요, 커뮤니티 주도 Q\u0026A 웹사이트에서 OpenAI o1에 대한 질문을 무료로 할 수 있습니다: \u003ca\u003eask.sider.ai\u003c/a\u003e\",\"errSiderOpenaiFault\":\"Openai 서버가 사용량이 많습니다. OpenAI 중단 중에 {model}로 전환하세요.\",\"errSiderPremiumRequired\":\"이 기능은 프리미엄 사용자에게만 제공됩니다. 이 기능을 잠금 해제하려면 지금 업그레이드하세요.\",\"errSiderProcessing\":\"한 번에 하나의 메시지만. 다른 메시지를 보내기 전에 다른 응답이 완료될 때까지 기다리거나 잠시 기다리십시오.\",\"errSiderTimeout\":\"요청 시간이 초과되었습니다. 다시 시도해 주세요.\",\"errSiderUnlimitedLimit\":\"고급 크레딧 사용에 대한 임시 제한에 도달했습니다 ({timesToUse}회 /{periodTime}시간). 더 많은 크레딧을 확보하기 위해 노력 중입니다. 새로운 크레딧은{resetTime}에 이용 가능합니다. 지금 더 필요하신가요? 부스터 팩을 시도해 보세요!\",\"errSiderUserBanned\":\"귀하의 계정은 감지된 비정상적인 활동(예: 규칙 위반 또는 계정 공유)으로 인해 정지되었습니다. 궁금한 점이 있으시면 계정 정보를 포함하여 care@sider.ai로 이메일을 보내주시기 바랍니다.\",\"errTrySiderAPI\":\"안정적인 액세스를 위해 \u003ci\u003eChatGPT 사이드바 API\u003c/i\u003e로 전환하세요(모든 사용자용).\",\"errTrySiderAPI2\":\"또는 \u003ca\u003e설정 페이지\u003c/a\u003e에서 자신의 API 키를 사용하세요(개발자용).\",\"error1139_1\":\"무제한 요금제를 사용해 주셔서 감사합니다! 고급 AI 모델을 계속 사용할 수 있습니다. 그러나, 일시적인 속도 제한에 도달했습니다. \u003ca\u003e속도 제한이 있는 이유와 우리가 어떻게 도와드릴 수 있는지\u003c/a\u003e를 확인하세요. 꼭 \u003cmx\u003e읽어보세요\u003c/mx\u003e.\",\"error1139_1_2\":\"무제한 요금제를 사용해 주셔서 감사합니다! 고급 AI 모델을 계속 사용할 수 있습니다. 그러나, 일시적인 속도 제한에 도달했고 모든 추가 고급 쿼리를 사용했습니다. \u003ca\u003e속도 제한이 있는 이유와 우리가 어떻게 도와드릴 수 있는지\u003c/a\u003e를 확인하세요. 꼭 \u003cmx\u003e읽어보세요\u003c/mx\u003e.\",\"error1139_1_3\":\"무제한 요금제를 사용해 주셔서 감사합니다! 고급 AI 모델을 계속 사용할 수 있습니다. 그러나, 일시적인 속도 제한에 도달했고 모든 선물 고급 쿼리를 사용했습니다. \u003ca\u003e속도 제한이 있는 이유와 우리가 어떻게 도와드릴 수 있는지\u003c/a\u003e를 확인하세요. 꼭 \u003cmx\u003e읽어보세요\u003c/mx\u003e.\",\"error1139_2\":\"현재 작업을 방해하지 않기 위해, 현재 속도 제한을 해제할 수 있도록 몇 가지 추가 고급 쿼리를 선물로 드렸습니다. \u003cb
